<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LIGHT &amp; DARK ORB</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;position:absolute;}
#c{image-rendering:pixelated;image-rendering:crisp-edges;}
#uic{pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="uic"></canvas>
<img id="logoImg" src="logo.png" style="display:none">
<script>
'use strict';
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const uic=document.getElementById('uic'),utx=uic.getContext('2d');
const logoImg=document.getElementById('logoImg');

const W=320,H=180;
const GY=H-30; // ground Y = 150
let uRatio=1;

function resize(){
    const sw=innerWidth,sh=innerHeight;
    const sc=Math.min(sw/W,sh/H);
    const dw=W*sc|0,dh=H*sc|0;
    const ox=(sw-dw)/2|0,oy=(sh-dh)/2|0;
    cv.style.cssText=`position:absolute;left:${ox}px;top:${oy}px;width:${dw}px;height:${dh}px;`;
    uic.style.cssText=`position:absolute;left:${ox}px;top:${oy}px;width:${dw}px;height:${dh}px;`;
    cv.width=W;cv.height=H;
    uRatio=devicePixelRatio||1;
    uic.width=W*uRatio|0;uic.height=H*uRatio|0;
}
window.addEventListener('resize',resize);
resize();

// ===== AUDIO =====
let _ac=null,_sfxGain=null;
function getAC(){
    try{
        if(!_ac||_ac.state==='closed'){_ac=new(AudioContext||webkitAudioContext)();_sfxGain=null;}
        if(_ac.state==='suspended')_ac.resume();
        if(!_sfxGain){_sfxGain=_ac.createGain();_sfxGain.gain.value=0.42;_sfxGain.connect(_ac.destination);}
        return _ac;
    }catch(e){return null;}
}
function getSfxDst(){return _sfxGain||(_ac&&_ac.destination)||null;}
function snd(f,d,v){
    const ac=getAC(),dst=getSfxDst();if(!ac||!dst)return;
    try{
        const now=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(dst);
        o.frequency.value=f;
        g.gain.setValueAtTime(.1*(v!==undefined?v:1),now);
        g.gain.exponentialRampToValueAtTime(.001,now+d);
        o.start(now);o.stop(now+d);
    }catch(e){}
}
function mkNoise(ac,dur){
    try{const sr=ac.sampleRate,len=Math.ceil(sr*dur),buf=ac.createBuffer(1,len,sr),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;return buf;}catch(e){return null;}
}
function sfx(type){
    const ac=getAC(),dst=getSfxDst();if(!ac||!dst)return;
    try{
        const now=ac.currentTime;
        if(type==='swing'){
            const o=ac.createOscillator();o.type='sawtooth';
            const g=ac.createGain();o.connect(g);g.connect(dst);
            o.frequency.setValueAtTime(420,now);o.frequency.exponentialRampToValueAtTime(130,now+.1);
            g.gain.setValueAtTime(.07,now);g.gain.exponentialRampToValueAtTime(.001,now+.12);
            o.start(now);o.stop(now+.12);
        }else if(type==='jump'){
            const o=ac.createOscillator();o.type='square';
            const g=ac.createGain();o.connect(g);g.connect(dst);
            o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(420,now+.1);
            g.gain.setValueAtTime(.055,now);g.gain.exponentialRampToValueAtTime(.001,now+.13);
            o.start(now);o.stop(now+.13);
        }else if(type==='hit'){
            const nb=mkNoise(ac,.15);if(!nb)return;
            const src=ac.createBufferSource();src.buffer=nb;
            const flt=ac.createBiquadFilter();flt.type='lowpass';flt.frequency.value=600;
            const g=ac.createGain();g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);
            src.connect(flt);flt.connect(g);g.connect(dst);src.start(now);src.stop(now+.18);
            const o=ac.createOscillator();o.type='sine';
            o.frequency.setValueAtTime(160,now);o.frequency.exponentialRampToValueAtTime(50,now+.13);
            const g2=ac.createGain();g2.gain.setValueAtTime(.25,now);g2.gain.exponentialRampToValueAtTime(.001,now+.14);
            o.connect(g2);g2.connect(dst);o.start(now);o.stop(now+.15);
        }else if(type==='kill'){
            [392,523,659].forEach((freq,i)=>{
                const o=ac.createOscillator();o.type='square';o.frequency.value=freq;
                const g=ac.createGain(),t0=now+i*.06;
                g.gain.setValueAtTime(0,t0);g.gain.setValueAtTime(.065,t0+.01);g.gain.exponentialRampToValueAtTime(.001,t0+.1);
                o.connect(g);g.connect(dst);o.start(t0);o.stop(t0+.12);
            });
        }else if(type==='coin'){
            [659,784].forEach((freq,i)=>{
                const o=ac.createOscillator();o.type='sine';o.frequency.value=freq;
                const g=ac.createGain(),t0=now+i*.07;
                g.gain.setValueAtTime(0,t0);g.gain.setValueAtTime(.08,t0+.01);g.gain.exponentialRampToValueAtTime(.001,t0+.1);
                o.connect(g);g.connect(dst);o.start(t0);o.stop(t0+.12);
            });
        }
    }catch(e){}
}

// ===== HELPERS =====
function px(x,y,w,h){ctx.fillRect(Math.floor(x),Math.floor(y),w,h);}
function txo(s,x,y,c,sz,al,alpha){
    const prev=utx.globalAlpha;
    if(alpha!==undefined)utx.globalAlpha=alpha;
    const ux=x*uRatio,uy=y*uRatio,usz=sz*uRatio;
    utx.font=`bold ${usz}px -apple-system,'Hiragino Sans','Noto Sans JP',Arial,sans-serif`;
    utx.textAlign=al||'center';
    utx.fillStyle='rgba(0,0,0,.95)';
    for(const[ox,oy]of[[-2,0],[2,0],[0,-2],[0,2],[-1,-2],[1,-2],[-1,2],[1,2]])
        utx.fillText(s,ux+ox,uy+oy);
    utx.fillStyle=c;utx.fillText(s,ux,uy);
    utx.globalAlpha=prev;
}

// ===== PARTICLES =====
let parts=[];
function spark(x,y,col,n){
    for(let i=0;i<n;i++)parts.push({
        x,y,col,
        vx:(Math.random()-.5)*3.5,
        vy:(Math.random()-.5)*3.5-1,
        life:0,maxLife:16+Math.random()*12
    });
}

// ===== STATE =====
let gs='splash',gTick=0,t=0;
let splashTimer=0;
let scroll=0,stage=1,score=0;
let best=parseInt(localStorage.getItem('ldo_best')||'0');
let shake=0,flash=0;

// ===== PLAYER =====
const GR=0.42,JMP=5.8;
let P={x:60,y:GY-22,w:12,h:22,vx:0,vy:0,onG:false,dj:false,hp:5,mhp:5,inv:0,fr:0,dir:1,atk:0,atkCd:0};

// ===== ENEMIES / OBJECTS =====
let enemies=[],items=[];
let spawnCd=60;

// ===== CONTROLS =====
const BTN={
    L:{x:22,y:H-22,r:15},
    R:{x:56,y:H-22,r:15},
    J:{x:W-22,y:H-22,r:15},
    A:{x:W-58,y:H-22,r:15}
};
let keys={L:false,R:false,J:false,A:false};
let tids={L:null,R:null,J:null,A:null};

function inBtn(cx,cy,b){return Math.hypot(cx-b.x,cy-b.y)<b.r;}
function cvCoords(cx,cy){const r=cv.getBoundingClientRect();return[(cx-r.left)*(W/r.width),(cy-r.top)*(H/r.height)];}

cv.addEventListener('touchstart',e=>{
    e.preventDefault();getAC();
    for(const tc of e.changedTouches){
        const[x,y]=cvCoords(tc.clientX,tc.clientY);
        if(gs!=='playing'){inp(x,y);continue;}
        if(inBtn(x,y,BTN.L)){keys.L=true;tids.L=tc.identifier;}
        else if(inBtn(x,y,BTN.R)){keys.R=true;tids.R=tc.identifier;}
        else if(inBtn(x,y,BTN.J)){tids.J=tc.identifier;doJump();}
        else if(inBtn(x,y,BTN.A)){tids.A=tc.identifier;doAtk();}
    }
},{passive:false});
cv.addEventListener('touchend',e=>{
    for(const tc of e.changedTouches){
        if(tc.identifier===tids.L){keys.L=false;tids.L=null;}
        if(tc.identifier===tids.R){keys.R=false;tids.R=null;}
        if(tc.identifier===tids.J)tids.J=null;
        if(tc.identifier===tids.A)tids.A=null;
    }
},{passive:true});
cv.addEventListener('touchcancel',()=>{keys.L=keys.R=false;Object.keys(tids).forEach(k=>tids[k]=null);},{passive:true});
document.addEventListener('keydown',e=>{
    getAC();
    if(e.key==='ArrowLeft')keys.L=true;
    if(e.key==='ArrowRight')keys.R=true;
    if(e.key==='ArrowUp'||e.key===' ')doJump();
    if(e.key==='z'||e.key==='Z'||e.key==='x'||e.key==='X')doAtk();
    if(gs!=='playing')inp();
});
document.addEventListener('keyup',e=>{
    if(e.key==='ArrowLeft')keys.L=false;
    if(e.key==='ArrowRight')keys.R=false;
});

function doJump(){
    if(gs!=='playing')return;
    if(P.onG){P.vy=-JMP;P.onG=false;P.dj=false;sfx('jump');}
    else if(!P.dj){P.vy=-JMP*.82;P.dj=true;sfx('jump');}
}
function doAtk(){
    if(gs!=='playing'||P.atkCd>0)return;
    P.atk=14;P.atkCd=22;sfx('swing');
}
function inp(cx,cy){
    if(gs==='splash'){splashTimer=200;return;}
    if(gs==='start'){gs='playing';resetGame();return;}
    if(gs==='gameover'){location.reload();}
}

// ===== RESET =====
function resetGame(){
    P.x=60;P.y=GY-P.h;P.vx=0;P.vy=0;P.onG=true;P.dj=false;
    P.hp=P.mhp;P.inv=0;P.fr=0;P.atk=0;P.atkCd=0;P.dir=1;
    enemies=[];items=[];parts=[];
    scroll=0;score=0;shake=0;flash=0;t=0;spawnCd=60;
}

// ===== BACKGROUNDS =====
let clouds=[];
for(let i=0;i<7;i++)clouds.push({sx:i*300+Math.random()*100,y:15+Math.random()*35,w:28+Math.random()*36,h:8+Math.random()*12,spd:.15+Math.random()*.1});

function drawBg(){
    // Sky
    const sg=ctx.createLinearGradient(0,0,0,GY);
    sg.addColorStop(0,'#3a80b8');sg.addColorStop(.6,'#70b0d8');sg.addColorStop(1,'#a8d0ec');
    ctx.fillStyle=sg;ctx.fillRect(0,0,W,GY);

    // Far mountains
    ctx.fillStyle='#6878a0';
    for(let i=0;i<6;i++){
        const mx=((i*110-scroll*.06+2000)%2000)-80;
        const mh=28+i%3*14;
        ctx.beginPath();ctx.moveTo(mx,GY-mh);ctx.lineTo(mx+44,GY);ctx.lineTo(mx-44,GY);ctx.closePath();ctx.fill();
    }
    ctx.fillStyle='#7888b0';
    for(let i=0;i<4;i++){
        const mx=((i*160+60-scroll*.09+2000)%2000)-80;
        const mh=20+i%2*10;
        ctx.beginPath();ctx.moveTo(mx,GY-mh);ctx.lineTo(mx+32,GY);ctx.lineTo(mx-32,GY);ctx.closePath();ctx.fill();
    }

    // Clouds
    ctx.fillStyle='rgba(255,255,255,.82)';
    clouds.forEach(cl=>{
        const cx=(cl.sx-scroll*cl.spd+3000)%3000-100;
        ctx.beginPath();ctx.ellipse(cx+cl.w*.5,cl.y+cl.h*.5,cl.w*.5,cl.h*.5,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(cx+cl.w*.3,cl.y+cl.h*.2,cl.w*.3,cl.h*.7,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(cx+cl.w*.7,cl.y+cl.h*.25,cl.w*.28,cl.h*.65,0,0,Math.PI*2);ctx.fill();
    });

    // Midground trees
    ctx.fillStyle='#2a6020';
    for(let i=0;i<12;i++){
        const tx=((i*180+40-scroll*.35+3000)%3000)-30;
        const th=22+i%3*8;
        ctx.beginPath();ctx.moveTo(tx,GY-th);ctx.lineTo(tx+12,GY);ctx.lineTo(tx-12,GY);ctx.closePath();ctx.fill();
        ctx.fillStyle='#3a7828';
        ctx.beginPath();ctx.moveTo(tx,GY-th-6);ctx.lineTo(tx+9,GY-th+8);ctx.lineTo(tx-9,GY-th+8);ctx.closePath();ctx.fill();
        ctx.fillStyle='#2a6020';
    }

    // Ground layers
    ctx.fillStyle='#4a8c30';px(0,GY,W,5);
    ctx.fillStyle='#3a7820';px(0,GY+2,W,2);
    ctx.fillStyle='#7a5030';px(0,GY+5,W,H-GY-5);
    ctx.fillStyle='#6a4028';
    for(let i=0;i<8;i++){const tx=((i*44-scroll*.4+2000)%2000);px(tx,GY+10,22,1);px(tx+22,GY+18,14,1);}

    // Foreground grass tufts
    ctx.fillStyle='#5aa038';
    for(let i=0;i<16;i++){
        const gx=((i*82+10-scroll*.8+4000)%4000)-10;
        px(gx,GY-2,2,3);px(gx+4,GY-3,2,4);px(gx+8,GY-1,2,2);
    }
}

// ===== DRAW HERO =====
function drawHero(x,y){
    const inv=P.inv>0&&Math.floor(P.inv/4)%2===0;
    if(inv)ctx.globalAlpha=0.4;
    const f=P.onG?(P.fr%18<9?0:1):0;
    const lOff=f?2:0;
    const dir=P.dir;

    // Cloak/cape (behind)
    if(dir>0){ctx.fillStyle='#3030a0';px(x,y+6,4,12);}
    else{ctx.fillStyle='#3030a0';px(x+8,y+6,4,12);}

    // Hair
    ctx.fillStyle='#e0c030';
    px(x+2,y,8,3);px(x+1,y+1,2,4);px(x+9,y+1,2,3);

    // Face
    ctx.fillStyle='#f0c888';px(x+2,y+3,8,5);
    ctx.fillStyle='#2850b0';
    px(x+(dir>0?3:7),y+5,1,1);px(x+(dir>0?5:9),y+5,1,1);

    // Armor body
    ctx.fillStyle='#4868c8';px(x+1,y+8,10,7);
    ctx.fillStyle='#6888e8';px(x+2,y+9,8,3);
    ctx.fillStyle='#cc2020';px(x+5,y+9,2,4);px(x+4,y+11,4,2);

    // Belt
    ctx.fillStyle='#805030';px(x+1,y+14,10,2);
    ctx.fillStyle='#c08040';px(x+5,y+14,2,2);

    // Legs
    ctx.fillStyle='#303880';
    px(x+2,y+16,3,4+lOff);
    px(x+7,y+16,3,4+(2-lOff));

    // Boots
    ctx.fillStyle='#402010';
    px(x+1,y+19,5,2);px(x+6,y+19,5,2);

    // Sword
    const atkProg=P.atk/14;
    const sOff=P.atk>0?Math.floor(atkProg*4):0;
    ctx.fillStyle='#c8d0e0';
    if(dir>0){
        px(x+11+sOff,y+9,12-sOff,2);
        ctx.fillStyle='#b09040';px(x+10,y+8,3,4);
        ctx.fillStyle='#c0a050';px(x+11,y+12,2,4);
    }else{
        px(x-11+sOff,y+9,12-sOff,2);
        ctx.fillStyle='#b09040';px(x-1,y+8,3,4);
        ctx.fillStyle='#c0a050';px(x-1,y+12,2,4);
    }

    // Orb glow (light orb on belt)
    ctx.globalAlpha=(inv?0.4:1)*(.7+Math.sin(gTick*.08)*.3);
    ctx.fillStyle='#ffe860';
    px(x+5,y+13,2,2);
    ctx.globalAlpha=1;
}

// ===== DRAW GOBLIN =====
function drawGoblin(en){
    const x=Math.floor(en.sx-scroll),y=Math.floor(en.sy);
    if(en.inv>0&&Math.floor(en.inv/4)%2===0){ctx.globalAlpha=0.4;}
    const f=en.fr%16<8?0:1;
    const dir=en.dir;

    ctx.fillStyle='#507838';px(x+1,y,8,6);
    ctx.fillStyle='#60a048';px(x+2,y+1,6,4);
    ctx.fillStyle='#dd1a1a';px(x+2,y+2,2,1);px(x+6,y+2,2,1);
    ctx.fillStyle='#c8c020';px(x+3,y+4,4,1);
    ctx.fillStyle='#406028';px(x+1,y+6,8,5);
    ctx.fillStyle='#2a3848';px(x+2,y+10,2,4+(f?0:1));px(x+6,y+10,2,4+(f?1:0));
    ctx.fillStyle='#3a2010';px(x+1,y+13,4,1);px(x+5,y+13,4,1);
    ctx.fillStyle='#604018';
    if(dir>0)px(x+9,y+6,2,6);else px(x-1,y+6,2,6);
    px(dir>0?x+9:x-2,y+5,3,2);
    ctx.globalAlpha=1;
}

// ===== DRAW ITEM =====
function drawItem(it){
    const x=Math.floor(it.sx-scroll),y=Math.floor(it.y);
    const bl=Math.floor(gTick/8)%2===0;
    if(it.type==='heart'){
        ctx.fillStyle='#ff2244';
        px(x,y+1,2,2);px(x+3,y+1,2,2);px(x,y+2,6,3);px(x+1,y+5,4,1);px(x+2,y+6,2,1);
        if(bl){ctx.fillStyle='#ff88aa';px(x+1,y+1,1,1);}
    }else if(it.type==='coin'){
        ctx.fillStyle='#e8c020';
        ctx.beginPath();ctx.arc(x+4,y+4,4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#f8e840';px(x+3,y+2,2,1);
        if(bl){ctx.fillStyle='#fff080';px(x+2,y+3,2,1);}
    }
}

// ===== UPDATE =====
function update(){
    gTick++;
    if(gs==='splash'){splashTimer++;if(splashTimer>=180)gs='start';return;}
    if(gs!=='playing')return;
    t++;

    // Player move
    const spd=1.6;
    if(keys.L){P.vx=-spd;P.dir=-1;}
    else if(keys.R){P.vx=spd;P.dir=1;}
    else P.vx*=.65;

    P.vy+=GR;P.vy=Math.min(P.vy,9);
    P.x+=P.vx;P.y+=P.vy;

    // Ground
    if(P.y+P.h>=GY){P.y=GY-P.h;P.vy=0;P.onG=true;P.dj=false;}
    else P.onG=false;

    // Bounds
    if(P.x<scroll)P.x=scroll;

    // Camera follow
    const target=P.x-W*.35+P.w/2;
    if(target>scroll)scroll=target;

    P.fr++;P.inv=Math.max(0,P.inv-1);P.atkCd=Math.max(0,P.atkCd-1);
    if(P.atk>0)P.atk--;

    // Attack hit
    if(P.atk>6){
        const aw=16,ax=P.dir>0?P.x+P.w:P.x-aw;
        enemies.forEach(en=>{
            if(en.dead||en.inv>0)return;
            const ex=en.sx-scroll;
            if(ax<ex+en.w&&ax+aw>ex&&P.y<en.sy+en.h&&P.y+P.h>en.sy){
                en.hp--;en.inv=20;
                spark(ex+en.w/2,en.sy+en.h/2,'#ffaa44',8);
                snd(260,.08,.6);
                if(en.hp<=0){en.dead=true;sfx('kill');score+=100;spark(ex+5,en.sy+4,'#ff8820',16);
                    if(Math.random()<.4)items.push({sx:en.sx,y:en.sy,w:8,h:8,type:'coin',life:300});}
            }
        });
    }

    // Enemy collision
    if(P.inv<=0){
        enemies.forEach(en=>{
            if(en.dead)return;
            const ex=en.sx-scroll;
            if(P.x<ex+en.w&&P.x+P.w>ex&&P.y<en.sy+en.h&&P.y+P.h>en.sy){
                P.hp--;P.inv=55;shake=6;flash=14;sfx('hit');P.vy=-3;
                if(P.hp<=0){if(score>best){best=score;localStorage.setItem('ldo_best',best);}gs='gameover';}
            }
        });
    }

    // Items
    items.forEach(it=>{
        it.life--;
        const ix=it.sx-scroll;
        if(P.x<ix+it.w&&P.x+P.w>ix&&P.y<it.y+it.h&&P.y+P.h>it.y){
            it.life=0;
            if(it.type==='heart'){P.hp=Math.min(P.mhp,P.hp+1);spark(ix+4,it.y,'#ff4466',10);snd(660,.15);}
            else if(it.type==='coin'){score+=50;spark(ix+4,it.y,'#ffe840',8);sfx('coin');}
        }
    });
    items=items.filter(it=>it.life>0&&it.sx>scroll-40);

    // Update enemies
    enemies.forEach(en=>{
        if(en.dead){en.fr++;return;}
        en.fr++;en.inv=Math.max(0,en.inv-1);
        en.sx+=en.vx;
        if(en.sy+en.h<GY){en.vy+=GR;en.sy+=en.vy;}else{en.sy=GY-en.h;en.vy=0;}
        const pdx=(P.x+scroll)-(en.sx+en.w/2);
        if(Math.abs(pdx)>4){en.vx=(pdx>0?.55:-.55);en.dir=pdx>0?1:-1;}
        else en.vx=0;
    });
    enemies=enemies.filter(en=>(!en.dead||en.fr<25)&&en.sx>scroll-100&&en.sx<scroll+W+100);

    // Spawn
    spawnCd--;
    if(spawnCd<=0){
        spawnCd=100+Math.floor(Math.random()*80);
        enemies.push({sx:scroll+W+10,sy:GY-14,w:10,h:14,hp:2,maxHp:2,vx:-.5,vy:0,dir:-1,fr:0,inv:0,dead:false,type:'goblin'});
        if(t>600&&Math.random()<.35)
            items.push({sx:scroll+W+50,y:GY-8,w:8,h:8,type:'heart',life:400});
    }

    // Particles
    parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life++;});
    parts=parts.filter(p=>p.life<p.maxLife);

    shake=Math.max(0,shake-1);flash=Math.max(0,flash-1);
    if(t%90===0)score+=stage*5;
}

// ===== DRAW =====
function draw(){
    utx.clearRect(0,0,uic.width,uic.height);
    const sx=Math.round((Math.random()-.5)*shake),sy=Math.round((Math.random()-.5)*shake);
    ctx.save();ctx.translate(sx,sy);
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

    // Splash
    if(gs==='splash'){
        ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
        const fade=splashTimer<30?splashTimer/30:splashTimer>130?Math.max(0,1-(splashTimer-130)/30):1;
        if(logoImg.complete&&logoImg.naturalWidth>0){
            const lw=90,lh=lw*(logoImg.naturalHeight/logoImg.naturalWidth);
            ctx.globalAlpha=fade;
            ctx.drawImage(logoImg,(W-lw)/2,(H-lh)/2-4,lw,lh);
            ctx.globalAlpha=1;
        }else{
            ctx.globalAlpha=fade;
            txo('内無双GAMES',W/2,H/2,'#ffffff',9);
            ctx.globalAlpha=1;
        }
        ctx.restore();return;
    }

    drawBg();

    // Items
    items.forEach(it=>{const ix=it.sx-scroll;if(ix<-10||ix>W+10)return;drawItem(it);});

    // Enemies
    enemies.forEach(en=>{
        if(en.dead&&en.fr>20)return;
        const ex=en.sx-scroll;if(ex<-20||ex>W+20)return;
        if(en.type==='goblin')drawGoblin(en);
    });

    // Player
    drawHero(P.x,P.y);

    // Particles
    parts.forEach(p=>{
        ctx.globalAlpha=Math.max(0,1-p.life/p.maxLife)*.9;
        ctx.fillStyle=p.col;ctx.fillRect(Math.floor(p.x),Math.floor(p.y),2,2);
    });
    ctx.globalAlpha=1;

    // Buttons
    if(gs==='playing'){
        const bDefs=[
            {b:BTN.L,lbl:'◀',on:keys.L},{b:BTN.R,lbl:'▶',on:keys.R},
            {b:BTN.J,lbl:'↑',on:tids.J!==null},{b:BTN.A,lbl:'⚔',on:P.atk>0}
        ];
        bDefs.forEach(({b,lbl,on})=>{
            ctx.globalAlpha=on?.52:.22;
            ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=on?.7:.4;
            ctx.strokeStyle='#ffffff';ctx.lineWidth=1;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();
            ctx.globalAlpha=1;
            txo(lbl,b.x,b.y+3.5,'#111111',7);
        });
    }

    // HUD
    if(gs==='playing'){
        ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,13);
        txo('HP',9,9,'#ffffff',5.5,'left');
        for(let i=0;i<P.mhp;i++)txo(i<P.hp?'♥':'♡',22+i*10,9,i<P.hp?'#ff3355':'#553344',6);
        txo('SCORE '+score,W-4,9,'#ffee44',6,'right');
    }

    // Flash
    if(flash>0){ctx.globalAlpha=(flash/14)*.4;ctx.fillStyle='#ff0000';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;flash--;}
    ctx.restore();

    // Start screen
    if(gs==='start'){
        ctx.fillStyle='rgba(0,0,5,.9)';ctx.fillRect(0,0,W,H);
        // Stars
        for(let i=0;i<40;i++){
            ctx.fillStyle=`rgba(255,255,255,${.2+Math.sin(gTick*.03+i)*.15})`;
            ctx.fillRect((i*73+11)%W,(i*47+7)%70,1,1);
        }
        // Orbs
        const pulse=Math.sin(gTick*.06)*.15;
        ctx.globalAlpha=.75+pulse;
        ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(W/2-28,H/2-8,10,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(W/2+28,H/2-8,10,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=.18+pulse*.5;
        ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(W/2-28,H/2-8,18,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(W/2+28,H/2-8,18,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
        txo('LIGHT',W/2-28,H/2-8+4,'#ffe840',8);
        txo('DARK',W/2+28,H/2-8+4,'#cc88ff',8);
        txo('&',W/2,H/2-8+4,'#ffffff',7);
        txo('ORB',W/2,H/2+14,'#ffffff',14);
        if(Math.floor(gTick/28)%2===0)txo('タップでスタート',W/2,H/2+40,'#44ff88',7);
        if(best>0)txo('ベスト: '+best+' pt',W/2,H/2+54,'#ffaa44',6);
    }

    // Gameover screen
    if(gs==='gameover'){
        ctx.fillStyle='rgba(0,0,0,.92)';ctx.fillRect(0,0,W,H);
        ctx.strokeStyle='#ff3333';ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(W/2-14,H/2-55);ctx.lineTo(W/2+14,H/2-35);ctx.stroke();
        ctx.beginPath();ctx.moveTo(W/2+14,H/2-55);ctx.lineTo(W/2-14,H/2-35);ctx.stroke();
        txo('GAME OVER',W/2,H/2-16,'#ff4444',11);
        txo('スコア: '+score,W/2,H/2+6,'#ffff44',8);
        txo('ベスト: '+best,W/2,H/2+22,'#ffaa44',7);
        if(Math.floor(gTick/28)%2===0)txo('タップでリトライ',W/2,H/2+44,'#44ff44',7);
    }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>

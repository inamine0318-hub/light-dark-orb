'use strict';
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const uic=document.getElementById('uic'),utx=uic.getContext('2d');
const logoImg=document.getElementById('logoImg');

const W=320,H=180;
const GY=H-30; // ground Y = 150
let uRatio=1;

function resize(){
    const sw=innerWidth,sh=innerHeight;
    const sc=Math.min(sw/W,sh/H);
    const dw=W*sc|0,dh=H*sc|0;
    const ox=(sw-dw)/2|0,oy=(sh-dh)/2|0;
    cv.style.cssText=`position:absolute;left:${ox}px;top:${oy}px;width:${dw}px;height:${dh}px;`;
    uic.style.cssText=`position:absolute;left:${ox}px;top:${oy}px;width:${dw}px;height:${dh}px;`;
    cv.width=W;cv.height=H;
    uRatio=devicePixelRatio||1;
    uic.width=W*uRatio|0;uic.height=H*uRatio|0;
}
window.addEventListener('resize',resize);
resize();

// ===== AUDIO =====
let _ac=null,_sfxGain=null;
function getAC(){
    try{
        if(!_ac||_ac.state==='closed'){_ac=new(AudioContext||webkitAudioContext)();_sfxGain=null;}
        if(_ac.state==='suspended')_ac.resume();
        if(!_sfxGain){_sfxGain=_ac.createGain();_sfxGain.gain.value=0.42;_sfxGain.connect(_ac.destination);}
        return _ac;
    }catch(e){return null;}
}
function getSfxDst(){return _sfxGain||(_ac&&_ac.destination)||null;}
function snd(f,d,v){
    const ac=getAC(),dst=getSfxDst();if(!ac||!dst)return;
    try{
        const now=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(dst);
        o.frequency.value=f;
        g.gain.setValueAtTime(.1*(v!==undefined?v:1),now);
        g.gain.exponentialRampToValueAtTime(.001,now+d);
        o.start(now);o.stop(now+d);
    }catch(e){}
}
function mkNoise(ac,dur){
    try{const sr=ac.sampleRate,len=Math.ceil(sr*dur),buf=ac.createBuffer(1,len,sr),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;return buf;}catch(e){return null;}
}
function sfx(type){
    const ac=getAC(),dst=getSfxDst();if(!ac||!dst)return;
    try{
        const now=ac.currentTime;
        if(type==='swing'){
            const o=ac.createOscillator();o.type='sawtooth';
            const g=ac.createGain();o.connect(g);g.connect(dst);
            o.frequency.setValueAtTime(420,now);o.frequency.exponentialRampToValueAtTime(130,now+.1);
            g.gain.setValueAtTime(.07,now);g.gain.exponentialRampToValueAtTime(.001,now+.12);
            o.start(now);o.stop(now+.12);
        }else if(type==='jump'){
            const o=ac.createOscillator();o.type='square';
            const g=ac.createGain();o.connect(g);g.connect(dst);
            o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(420,now+.1);
            g.gain.setValueAtTime(.055,now);g.gain.exponentialRampToValueAtTime(.001,now+.13);
            o.start(now);o.stop(now+.13);
        }else if(type==='hit'){
            const nb=mkNoise(ac,.15);if(!nb)return;
            const src=ac.createBufferSource();src.buffer=nb;
            const flt=ac.createBiquadFilter();flt.type='lowpass';flt.frequency.value=600;
            const g=ac.createGain();g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);
            src.connect(flt);flt.connect(g);g.connect(dst);src.start(now);src.stop(now+.18);
            const o=ac.createOscillator();o.type='sine';
            o.frequency.setValueAtTime(160,now);o.frequency.exponentialRampToValueAtTime(50,now+.13);
            const g2=ac.createGain();g2.gain.setValueAtTime(.25,now);g2.gain.exponentialRampToValueAtTime(.001,now+.14);
            o.connect(g2);g2.connect(dst);o.start(now);o.stop(now+.15);
        }else if(type==='kill'){
            [392,523,659].forEach((freq,i)=>{
                const o=ac.createOscillator();o.type='square';o.frequency.value=freq;
                const g=ac.createGain(),t0=now+i*.06;
                g.gain.setValueAtTime(0,t0);g.gain.setValueAtTime(.065,t0+.01);g.gain.exponentialRampToValueAtTime(.001,t0+.1);
                o.connect(g);g.connect(dst);o.start(t0);o.stop(t0+.12);
            });
        }else if(type==='coin'){
            [659,784].forEach((freq,i)=>{
                const o=ac.createOscillator();o.type='sine';o.frequency.value=freq;
                const g=ac.createGain(),t0=now+i*.07;
                g.gain.setValueAtTime(0,t0);g.gain.setValueAtTime(.08,t0+.01);g.gain.exponentialRampToValueAtTime(.001,t0+.1);
                o.connect(g);g.connect(dst);o.start(t0);o.stop(t0+.12);
            });
        }else if(type==='darkorb'){
            const o=ac.createOscillator();o.type='sawtooth';
            const g=ac.createGain();o.connect(g);g.connect(dst);
            o.frequency.setValueAtTime(180,now);o.frequency.exponentialRampToValueAtTime(80,now+.15);
            g.gain.setValueAtTime(.07,now);g.gain.exponentialRampToValueAtTime(.001,now+.18);
            o.start(now);o.stop(now+.18);
        }
    }catch(e){}
}

// ===== BGM =====
let bgmAc=null,bgmGain=null,bgmSeq=null;
const N={
    // 音名→周波数マップ
    C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,
    C5:523,D5:587,E5:659,F5:698,G5:784,A5:880,B5:988,
    _:0 // 休符
};
// Stage1: 明るいファンタジー冒険
const BGM1=[[N.E5,.15],[N._,.05],[N.G5,.15],[N.A5,.2],[N._,.1],[N.G5,.15],[N.E5,.15],[N.D5,.3],[N._,.2],
    [N.C5,.15],[N.E5,.15],[N.G5,.15],[N.E5,.3],[N._,.2],[N.D5,.15],[N.C5,.15],[N.D5,.4],[N._,.3],
    [N.A4,.15],[N.C5,.15],[N.E5,.15],[N.G5,.3],[N._,.15],[N.E5,.15],[N.D5,.15],[N.C5,.4],[N._,.3],
    [N.G4,.2],[N.A4,.2],[N.C5,.2],[N.E5,.4],[N.D5,.2],[N.C5,.2],[N.D5,.6],[N._,.4]];
// Stage2: 洞窟・ダンジョン（短調）
const BGM2=[[N.A4,.2],[N._,.1],[N.G4,.15],[N.A4,.2],[N._,.15],[N.F4,.15],[N.G4,.3],[N._,.2],
    [N.E4,.15],[N.F4,.15],[N.E4,.2],[N.D4,.2],[N._,.2],[N.E4,.15],[N.D4,.15],[N.C4,.4],[N._,.3],
    [N.A4,.15],[N._,.1],[N.A4,.15],[N.B4,.15],[N.A4,.2],[N._,.15],[N.G4,.2],[N.A4,.35],[N._,.3],
    [N.F4,.2],[N.E4,.2],[N.D4,.2],[N.E4,.4],[N.D4,.2],[N.C4,.2],[N.A4,.6],[N._,.4]];

// ===== CAROUSEL CHAR SELECT =====
function drawCharPreview(idx,cx,cy,scale){
    ctx.save();
    ctx.translate(cx,cy);
    ctx.scale(scale,scale);
    // 実際のdraw関数を流用（P.invなどは一時的に退避）
    const si=P.inv,sa=P.atk,sc=P.atkCd,sd=P.dir,sf=P.fr,sg=P.onG,svx=P.vx;
    P.inv=0;P.atk=0;P.atkCd=0;P.dir=1;P.fr=8;P.onG=true;P.vx=0;
    const drawFnsP=[drawHero,drawDemonLord,drawMage,drawElf,drawDragon,drawGoblinPC,drawGolem,drawSlime];
    drawFnsP[idx](-6,-13);
    P.inv=si;P.atk=sa;P.atkCd=sc;P.dir=sd;P.fr=sf;P.onG=sg;P.vx=svx;
    ctx.restore();
}

function drawCarousel(){
    const CY=112; // カルーセル中央Y
    // ← → ボタン
    ['←','→'].forEach((arrow,i)=>{
        const bx=i===0?16:W-16;
        ctx.fillStyle='rgba(255,255,255,.12)';
        ctx.beginPath();ctx.arc(bx,CY,14,0,Math.PI*2);ctx.fill();
        txo(arrow,bx,CY+4,'#ffffff',9);
    });

    // 左キャラ（前）
    const prevIdx=(selectedChar-1+CHARS.length)%CHARS.length;
    const nextIdx=(selectedChar+1)%CHARS.length;
    const prevLocked=CHARS[prevIdx].locked;
    const nextLocked=CHARS[nextIdx].locked;

    ctx.globalAlpha=prevLocked?.25:.55;
    drawCharPreview(prevIdx,W/2-70,CY,1.4);
    ctx.globalAlpha=nextLocked?.25:.55;
    drawCharPreview(nextIdx,W/2+70,CY,1.4);
    ctx.globalAlpha=1;

    // 中央（選択中）
    const pulse=Math.sin(gTick*.07)*.05;
    ctx.globalAlpha=1;
    const ch=CHARS[selectedChar];
    // 光輪
    ctx.fillStyle=ch.col;ctx.globalAlpha=.15+pulse;
    ctx.beginPath();ctx.arc(W/2,CY,32,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // パネル枠
    ctx.strokeStyle=ch.col;ctx.lineWidth=1.5;
    ctx.strokeRect(W/2-28,CY-36,56,60);
    ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(W/2-28,CY-36,56,60);
    // キャラ描画
    drawCharPreview(selectedChar,W/2,CY,2.2);
    // テキスト
    txo(ch.name,W/2,CY+32,ch.col,8);
    txo(ch.desc,W/2,CY+43,'#aaaaaa',5.5);
    // HP表示
    txo('HP',W/2-16,CY+54,'#88ff88',5);
    for(let i=0;i<ch.mhp;i++){
        ctx.fillStyle=i<4?'#44ff44':'#ffaa00';
        ctx.fillRect(W/2-8+i*5,CY+49,4,4);
    }
    // 点インジケータ
    const unlocked=CHARS.filter(c=>!c.locked);
    const uidx=unlocked.findIndex(c=>c===ch);
    const dotTotal=unlocked.length;
    const dotY=CY+60;
    unlocked.forEach((_,di)=>{
        ctx.fillStyle=di===uidx?ch.col:'rgba(255,255,255,.25)';
        ctx.beginPath();ctx.arc(W/2-((dotTotal-1)*5)+di*10,dotY,2.5,0,Math.PI*2);ctx.fill();
    });

    if(Math.floor(gTick/28)%2===0)
        txo('中央タップでスタート',W/2,H-8,'#44ff88',6);
}

function startBgm(st){
    stopBgm();
    try{
        bgmAc=new(AudioContext||webkitAudioContext)();
        bgmGain=bgmAc.createGain();bgmGain.gain.value=0.14;bgmGain.connect(bgmAc.destination);
        const seq=st===2?BGM2:BGM1;
        let idx=0,time=bgmAc.currentTime+.05;
        function sched(){
            while(time<bgmAc.currentTime+.6){
                const[f,d]=seq[idx%seq.length];
                if(f>0){
                    const o=bgmAc.createOscillator();o.type='square';o.frequency.value=f;
                    const g=bgmAc.createGain();
                    g.gain.setValueAtTime(0,time);g.gain.setValueAtTime(.4,time+.01);
                    g.gain.setValueAtTime(.4,time+d*.65);g.gain.exponentialRampToValueAtTime(.001,time+d*.9);
                    o.connect(g);g.connect(bgmGain);o.start(time);o.stop(time+d);
                }
                time+=d;idx++;
            }
            bgmSeq=setTimeout(sched,200);
        }
        sched();
    }catch(e){}
}
function stopBgm(){
    clearTimeout(bgmSeq);bgmSeq=null;
    try{if(bgmAc)bgmAc.close();}catch(e){}
    bgmAc=null;bgmGain=null;
}

// ===== HELPERS =====
function px(x,y,w,h){ctx.fillRect(Math.floor(x),Math.floor(y),w,h);}
function txo(s,x,y,c,sz,al,alpha){
    const prev=utx.globalAlpha;
    if(alpha!==undefined)utx.globalAlpha=alpha;
    const ux=x*uRatio,uy=y*uRatio,usz=sz*uRatio;
    utx.font=`bold ${usz}px -apple-system,'Hiragino Sans','Noto Sans JP',Arial,sans-serif`;
    utx.textAlign=al||'center';
    utx.fillStyle='rgba(0,0,0,.95)';
    for(const[ox,oy]of[[-2,0],[2,0],[0,-2],[0,2],[-1,-2],[1,-2],[-1,2],[1,2]])
        utx.fillText(s,ux+ox,uy+oy);
    utx.fillStyle=c;utx.fillText(s,ux,uy);
    utx.globalAlpha=prev;
}

// ===== PARTICLES =====
let parts=[];
function spark(x,y,col,n){
    for(let i=0;i<n;i++)parts.push({
        x,y,col,
        vx:(Math.random()-.5)*3.5,
        vy:(Math.random()-.5)*3.5-1,
        life:0,maxLife:16+Math.random()*12
    });
}

// ===== STATE =====
let gs='splash',gTick=0,t=0;
let splashTimer=0,clearTimer=0;
let scroll=0,stage=1,score=0;
let best=parseInt(localStorage.getItem('ldo_best')||'0');
let shake=0,flash=0;
let selectedChar=0;
let orbs=[]; // プレイヤー飛び道具（type:'dark'|'fire'）

// 全キャラ定義 spd=移動速度 jmp=ジャンプ力 gr=重力倍率 dj=二段ジャンプ
const CHARS=[
    {name:'勇者',    desc:'剣・二段ジャンプ', col:'#ffe840', mhp:5, locked:false, spd:1.8, jmp:5.8, gr:1.0,  dj:true},
    {name:'魔王',    desc:'闇魔法・浮遊',     col:'#8822ff', mhp:4, locked:false, spd:1.5, jmp:4.2, gr:0.55, dj:false},
    {name:'魔法使い',desc:'炎魔法・遠距離',   col:'#ff8820', mhp:3, locked:false, spd:1.7, jmp:5.5, gr:1.0,  dj:false},
    {name:'エルフ',  desc:'弓・高ジャンプ',   col:'#44ff88', mhp:4, locked:false, spd:2.2, jmp:7.0, gr:1.0,  dj:true},
    {name:'ドラゴン',desc:'炎ブレス・飛行',   col:'#ff4420', mhp:6, locked:false, spd:1.6, jmp:5.2, gr:0.65, dj:true},
    {name:'ゴブリン',desc:'素早い・ダッシュ', col:'#60cc30', mhp:3, locked:false, spd:2.8, jmp:5.0, gr:1.0,  dj:false},
    {name:'ゴーレム',desc:'超耐久・衝撃波',   col:'#b0b8c0', mhp:8, locked:false, spd:1.0, jmp:4.5, gr:1.3,  dj:false},
    {name:'スライム',desc:'バウンド・変形',    col:'#44aaff', mhp:4, locked:false, spd:1.9, jmp:6.2, gr:0.85, dj:true},
];

// ===== PLAYER =====
const GR=0.42,JMP=5.8;
let P={x:60,y:GY-22,w:12,h:22,vx:0,vy:0,onG:false,dj:false,hp:5,mhp:5,inv:0,fr:0,dir:1,atk:0,atkCd:0};

// ===== ENEMIES / OBJECTS =====
let enemies=[],items=[],arrows=[],platforms=[];
let spawnCd=60,platSpawnCd=120;
let boss=null,bossActive=false,bossDefeated=false;
const BOSS_TRIGGER=2800; // scrollがこの値を超えたらボス出現

// ===== CONTROLS =====
const BTN={
    L:{x:22,y:H-22,r:15},
    R:{x:56,y:H-22,r:15},
    J:{x:W-22,y:H-22,r:15},
    A:{x:W-58,y:H-22,r:15}
};
let keys={L:false,R:false,J:false,A:false};
let tids={L:null,R:null,J:null,A:null};

function inBtn(cx,cy,b){return Math.hypot(cx-b.x,cy-b.y)<b.r;}
function cvCoords(cx,cy){const r=cv.getBoundingClientRect();return[(cx-r.left)*(W/r.width),(cy-r.top)*(H/r.height)];}

cv.addEventListener('touchstart',e=>{
    e.preventDefault();getAC();
    for(const tc of e.changedTouches){
        const[x,y]=cvCoords(tc.clientX,tc.clientY);
        if(gs==='start'){inp(x,y);continue;}
        if(gs==='stageclear'||gs==='gameover'){inp(x,y);continue;}
        if(inBtn(x,y,BTN.L)){keys.L=true;tids.L=tc.identifier;}
        else if(inBtn(x,y,BTN.R)){keys.R=true;tids.R=tc.identifier;}
        else if(inBtn(x,y,BTN.J)){tids.J=tc.identifier;doJump();}
        else if(inBtn(x,y,BTN.A)){tids.A=tc.identifier;doAtk();}
    }
},{passive:false});
cv.addEventListener('touchend',e=>{
    for(const tc of e.changedTouches){
        if(tc.identifier===tids.L){keys.L=false;tids.L=null;}
        if(tc.identifier===tids.R){keys.R=false;tids.R=null;}
        if(tc.identifier===tids.J)tids.J=null;
        if(tc.identifier===tids.A)tids.A=null;
    }
},{passive:true});
cv.addEventListener('touchcancel',()=>{keys.L=keys.R=false;Object.keys(tids).forEach(k=>tids[k]=null);},{passive:true});
document.addEventListener('keydown',e=>{
    getAC();
    if(e.key==='ArrowLeft')keys.L=true;
    if(e.key==='ArrowRight')keys.R=true;
    if(e.key==='ArrowUp'||e.key===' ')doJump();
    if(e.key==='z'||e.key==='Z'||e.key==='x'||e.key==='X')doAtk();
    if(gs!=='playing')inp();
});
document.addEventListener('keyup',e=>{
    if(e.key==='ArrowLeft')keys.L=false;
    if(e.key==='ArrowRight')keys.R=false;
});

function doJump(){
    if(gs!=='playing')return;
    const cj=CHARS[selectedChar].jmp;
    if(P.onG){P.vy=-cj;P.onG=false;P.dj=false;sfx('jump');}
    else if(!P.dj&&CHARS[selectedChar].dj){P.vy=-cj*.82;P.dj=true;sfx('jump');}
}
function doAtk(){
    if(gs!=='playing'||P.atkCd>0)return;
    const ox=P.x+scroll+(P.dir>0?P.w:0);
    if(selectedChar===0){P.atk=14;P.atkCd=22;sfx('swing');}
    else if(selectedChar===1){
        orbs.push({sx:ox,sy:P.y+8,vx:P.dir*4.2,vy:0,life:0,maxLife:60,type:'dark'});
        P.atkCd=25;sfx('darkorb');
    }else if(selectedChar===2){
        orbs.push({sx:ox,sy:P.y+6,vx:P.dir*5.5,vy:0,life:0,maxLife:50,type:'fire'});
        P.atkCd=18;sfx('darkorb');
    }else if(selectedChar===3){// エルフ：高速の矢
        orbs.push({sx:ox,sy:P.y+5,vx:P.dir*8,vy:0,life:0,maxLife:50,type:'arrow'});
        P.atkCd=20;sfx('swing');
    }else if(selectedChar===4){// ドラゴン：炎ブレス3方向
        for(let i=0;i<3;i++){
            orbs.push({sx:ox,sy:P.y+9,vx:P.dir*(2.5+i*1.8),vy:(i-1)*.9,life:0,maxLife:38,type:'flame'});
        }
        P.atkCd=35;sfx('darkorb');
    }else if(selectedChar===5){// ゴブリン：ダッシュ斬り
        P.atk=22;P.atkCd=30;P.vx=P.dir*5;sfx('swing');
    }else if(selectedChar===6){// ゴーレム：地面衝撃波
        orbs.push({sx:ox,sy:GY-5,vx:P.dir*2.5,vy:0,life:0,maxLife:70,type:'shock'});
        P.atkCd=50;sfx('darkorb');
    }else if(selectedChar===7){// スライム：バウンド弾
        orbs.push({sx:ox,sy:P.y+8,vx:P.dir*3.8,vy:-3.5,life:0,maxLife:80,type:'bounce'});
        P.atkCd=22;sfx('jump');
    }
}
function inp(cx,cy){
    if(gs==='splash'){splashTimer=200;return;}
    if(gs==='start'){
        if(cx!==undefined){
            // ← ボタン
            if(cx<44&&cy>50&&cy<H-20){
                let n=selectedChar-1;
                while(n>=0&&CHARS[n].locked)n--;
                if(n>=0)selectedChar=n;
                return;
            }
            // → ボタン
            if(cx>W-44&&cy>50&&cy<H-20){
                let n=selectedChar+1;
                while(n<CHARS.length&&CHARS[n].locked)n++;
                if(n<CHARS.length)selectedChar=n;
                return;
            }
            // 中央タップでもキャラ変更（左右でprev/next）
            if(cy>50&&cy<H-20){
                if(!CHARS[selectedChar].locked){gs='playing';resetGame();}
                return;
            }
        }
        if(cx===undefined){gs='playing';resetGame();}
        return;
    }
    if(gs==='stageclear'){if(clearTimer>60){stage++;gs='playing';resetGame();}return;}
    if(gs==='gameover'){location.reload();}
}

// ===== RESET =====
function resetGame(){
    P.x=60;P.y=GY-P.h;P.vx=0;P.vy=0;P.onG=true;P.dj=false;
    P.mhp=CHARS[selectedChar].mhp;P.hp=P.mhp;P.inv=0;P.fr=0;P.atk=0;P.atkCd=0;P.dir=1;
    enemies=[];items=[];arrows=[];platforms=[];orbs=[];parts=[];
    scroll=0;score=0;shake=0;flash=0;t=0;spawnCd=60;platSpawnCd=120;
    boss=null;bossActive=false;bossDefeated=false;clearTimer=0;
    startBgm(stage);
}

// ===== BACKGROUNDS =====
let clouds=[];
for(let i=0;i<7;i++)clouds.push({sx:i*300+Math.random()*100,y:15+Math.random()*35,w:28+Math.random()*36,h:8+Math.random()*12,spd:.15+Math.random()*.1});

function drawBg(){
    // Sky
    const sg=ctx.createLinearGradient(0,0,0,GY);
    sg.addColorStop(0,'#3a80b8');sg.addColorStop(.6,'#70b0d8');sg.addColorStop(1,'#a8d0ec');
    ctx.fillStyle=sg;ctx.fillRect(0,0,W,GY);

    // Far mountains
    ctx.fillStyle='#6878a0';
    for(let i=0;i<6;i++){
        const mx=((i*110-scroll*.06+2000)%2000)-80;
        const mh=28+i%3*14;
        ctx.beginPath();ctx.moveTo(mx,GY-mh);ctx.lineTo(mx+44,GY);ctx.lineTo(mx-44,GY);ctx.closePath();ctx.fill();
    }
    ctx.fillStyle='#7888b0';
    for(let i=0;i<4;i++){
        const mx=((i*160+60-scroll*.09+2000)%2000)-80;
        const mh=20+i%2*10;
        ctx.beginPath();ctx.moveTo(mx,GY-mh);ctx.lineTo(mx+32,GY);ctx.lineTo(mx-32,GY);ctx.closePath();ctx.fill();
    }

    // Clouds
    ctx.fillStyle='rgba(255,255,255,.82)';
    clouds.forEach(cl=>{
        const cx=(cl.sx-scroll*cl.spd+3000)%3000-100;
        ctx.beginPath();ctx.ellipse(cx+cl.w*.5,cl.y+cl.h*.5,cl.w*.5,cl.h*.5,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(cx+cl.w*.3,cl.y+cl.h*.2,cl.w*.3,cl.h*.7,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(cx+cl.w*.7,cl.y+cl.h*.25,cl.w*.28,cl.h*.65,0,0,Math.PI*2);ctx.fill();
    });

    // Midground trees
    ctx.fillStyle='#2a6020';
    for(let i=0;i<12;i++){
        const tx=((i*180+40-scroll*.35+3000)%3000)-30;
        const th=22+i%3*8;
        ctx.beginPath();ctx.moveTo(tx,GY-th);ctx.lineTo(tx+12,GY);ctx.lineTo(tx-12,GY);ctx.closePath();ctx.fill();
        ctx.fillStyle='#3a7828';
        ctx.beginPath();ctx.moveTo(tx,GY-th-6);ctx.lineTo(tx+9,GY-th+8);ctx.lineTo(tx-9,GY-th+8);ctx.closePath();ctx.fill();
        ctx.fillStyle='#2a6020';
    }

    // Ground layers
    ctx.fillStyle='#4a8c30';px(0,GY,W,5);
    ctx.fillStyle='#3a7820';px(0,GY+2,W,2);
    ctx.fillStyle='#7a5030';px(0,GY+5,W,H-GY-5);
    ctx.fillStyle='#6a4028';
    for(let i=0;i<8;i++){const tx=((i*44-scroll*.4+2000)%2000);px(tx,GY+10,22,1);px(tx+22,GY+18,14,1);}

    // Foreground grass tufts
    ctx.fillStyle='#5aa038';
    for(let i=0;i<16;i++){
        const gx=((i*82+10-scroll*.8+4000)%4000)-10;
        px(gx,GY-2,2,3);px(gx+4,GY-3,2,4);px(gx+8,GY-1,2,2);
    }
}

// ===== DRAW HERO =====
function drawHero(x,y){
    const inv=P.inv>0&&Math.floor(P.inv/4)%2===0;
    if(inv)ctx.globalAlpha=0.4;
    const cx=Math.floor(x)+6;
    const wa=P.onG?Math.sin(P.fr*.3):0;
    const bob=P.onG?-Math.abs(Math.round(wa)):0;
    y+=bob;
    const loff=Math.round(wa*4);
    const rSw=Math.round(wa*3);
    const lSw=Math.round(-wa*2);

    // マント（後ろ）
    ctx.fillStyle='#2828a8';
    if(P.dir>0){ctx.beginPath();ctx.moveTo(cx-2,y+11);ctx.lineTo(cx-8,y+24);ctx.lineTo(cx+2,y+21);ctx.closePath();ctx.fill();}
    else{ctx.beginPath();ctx.moveTo(cx+2,y+11);ctx.lineTo(cx+8,y+24);ctx.lineTo(cx-2,y+21);ctx.closePath();ctx.fill();}
    ctx.fillStyle='#3838cc';
    if(P.dir>0){ctx.beginPath();ctx.moveTo(cx-1,y+11);ctx.lineTo(cx-6,y+23);ctx.lineTo(cx+1,y+20);ctx.closePath();ctx.fill();}
    else{ctx.beginPath();ctx.moveTo(cx+1,y+11);ctx.lineTo(cx+6,y+23);ctx.lineTo(cx-1,y+20);ctx.closePath();ctx.fill();}

    // 後ろ腕
    ctx.fillStyle='#3a6090';px(P.dir>0?cx-5:cx+2,y+13,3,6);
    ctx.fillStyle='#c4906a';px(P.dir>0?cx-5+lSw:cx+2-lSw,y+18,3,3);

    // 盾（後ろ腕側）
    if(P.dir>0){
        ctx.fillStyle='#6070c0';px(cx-7,y+11,4,10);
        ctx.fillStyle='#4858a8';px(cx-7,y+11,1,10);ctx.fillStyle='#8090d8';px(cx-6,y+12,2,2);
        ctx.fillStyle='#cc2828';px(cx-6,y+14,2,5);px(cx-8,y+16,5,2);
    }else{
        ctx.fillStyle='#6070c0';px(cx+3,y+11,4,10);
        ctx.fillStyle='#8090d8';px(cx+4,y+12,2,2);
        ctx.fillStyle='#cc2828';px(cx+4,y+14,2,5);px(cx+3,y+16,5,2);
    }

    // 体（鎧）
    ctx.fillStyle='#2a4060';px(cx-4,y+11,8,11); // shadow
    ctx.fillStyle='#3a6090';px(cx-3,y+11,7,11); // base
    ctx.fillStyle='#5090c8';px(cx-2,y+12,5,5);  // highlight
    // 胸バッジ（星）
    ctx.fillStyle='#ffe840';px(cx-1,y+12,2,4);px(cx-2,y+13,4,2);
    // ベルト
    ctx.fillStyle='#4a3010';px(cx-4,y+21,9,2);ctx.fillStyle='#c8a830';px(cx-1,y+21,3,2);

    // 前腕
    ctx.fillStyle='#3a6090';px(P.dir>0?cx+3:cx-6,y+13,3,6);
    // 剣・攻撃
    if(P.atk>0){
        ctx.fillStyle='#d0e0f0';
        if(P.dir>0){px(cx+5,y+7,2,18);}else{px(cx-7,y+7,2,18);}
        ctx.fillStyle='#c0a020';
        if(P.dir>0){px(cx+4,y+16,5,2);}else{px(cx-9,y+16,5,2);}
        ctx.fillStyle='#808898';
        if(P.dir>0){px(cx+3,y+16,2,4);}else{px(cx-5,y+16,2,4);}
    }else{
        ctx.fillStyle='#d4aa66';px(P.dir>0?cx+4+rSw:cx-7+rSw,y+18,3,3);
        ctx.fillStyle='#c8d8e8';px(P.dir>0?cx+5:cx-7,y+11,2,10);
        ctx.fillStyle='#c0a020';px(P.dir>0?cx+4:cx-8,y+16,4,2);
    }

    // 顔
    ctx.fillStyle='#d4aa66';ctx.beginPath();ctx.arc(cx,y+7,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#c4906a';px(cx-2,y+12,4,2);

    // ヘルメット
    ctx.fillStyle='#3060a0';ctx.beginPath();ctx.arc(cx,y+6,7,Math.PI,0);ctx.closePath();ctx.fill();
    ctx.fillStyle='#204070';px(cx-3,y+1,6,3);
    ctx.fillStyle='#60a0d8';px(cx-2,y+2,4,2); // ハイライト
    ctx.fillStyle='#182838';px(cx-7,y+8,15,2); // ブリム
    ctx.fillStyle='#182838';px(cx-4,y+8,8,3); // バイザー
    ctx.fillStyle='#1840a0';px(cx-3,y+9,6,1); // バイザー光
    ctx.fillStyle='#d8e848';px(cx-2,y+9,2,1);px(cx+1,y+9,2,1); // 目

    // 脚
    ctx.fillStyle='#203040';px(cx-4+loff,y+23,4,5);px(cx-5+loff,y+27,6,2);
    ctx.fillStyle='#102030';px(cx-5+loff,y+27,6,2);
    ctx.fillStyle='#283848';px(cx-1-loff,y+23,4,5);px(cx-2-loff,y+27,6,2);
    ctx.fillStyle='#101828';px(cx-2-loff,y+27,6,2);

    ctx.globalAlpha=1;
}

// ===== DRAW GOBLIN =====
function drawGoblin(en){
    const x=Math.floor(en.sx-scroll),y=Math.floor(en.sy);
    if(en.inv>0&&Math.floor(en.inv/4)%2===0){ctx.globalAlpha=0.4;}
    const f=en.fr%16<8?0:1;
    const dir=en.dir;

    ctx.fillStyle='#507838';px(x+1,y,8,6);
    ctx.fillStyle='#60a048';px(x+2,y+1,6,4);
    ctx.fillStyle='#dd1a1a';px(x+2,y+2,2,1);px(x+6,y+2,2,1);
    ctx.fillStyle='#c8c020';px(x+3,y+4,4,1);
    ctx.fillStyle='#406028';px(x+1,y+6,8,5);
    ctx.fillStyle='#2a3848';px(x+2,y+10,2,4+(f?0:1));px(x+6,y+10,2,4+(f?1:0));
    ctx.fillStyle='#3a2010';px(x+1,y+13,4,1);px(x+5,y+13,4,1);
    ctx.fillStyle='#604018';
    if(dir>0)px(x+9,y+6,2,6);else px(x-1,y+6,2,6);
    px(dir>0?x+9:x-2,y+5,3,2);
    ctx.globalAlpha=1;
}

// ===== DRAW ITEM =====
function drawItem(it){
    const x=Math.floor(it.sx-scroll),y=Math.floor(it.y);
    const bl=Math.floor(gTick/8)%2===0;
    if(it.type==='heart'){
        ctx.fillStyle='#ff2244';
        px(x,y+1,2,2);px(x+3,y+1,2,2);px(x,y+2,6,3);px(x+1,y+5,4,1);px(x+2,y+6,2,1);
        if(bl){ctx.fillStyle='#ff88aa';px(x+1,y+1,1,1);}
    }else if(it.type==='coin'){
        ctx.fillStyle='#e8c020';
        ctx.beginPath();ctx.arc(x+4,y+4,4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#f8e840';px(x+3,y+2,2,1);
        if(bl){ctx.fillStyle='#fff080';px(x+2,y+3,2,1);}
    }else if(it.type==='orbfrag'){
        const pulse=.7+Math.sin(gTick*.1)*.3;
        ctx.globalAlpha=pulse;
        ctx.fillStyle='#ffe840';
        ctx.beginPath();ctx.arc(x+5,y+5,5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8822ff';
        ctx.beginPath();ctx.arc(x+5,y+5,3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffffff';px(x+4,y+4,2,2);
        ctx.globalAlpha=.2*pulse;ctx.fillStyle='#ffe840';
        ctx.beginPath();ctx.arc(x+5,y+5,9,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
    }
}

// ===== DRAW DEMON LORD =====
function drawDemonLord(x,y){
    const inv=P.inv>0&&Math.floor(P.inv/4)%2===0;
    if(inv)ctx.globalAlpha=0.4;
    const cx=Math.floor(x)+6;
    const hov=Math.round(Math.sin(gTick*.08)*2); // 浮遊ゆらぎ
    y+=hov;

    // アウラ
    ctx.globalAlpha=(.1+Math.sin(gTick*.06)*.05)*(inv?.4:1);
    ctx.fillStyle='#6600aa';ctx.beginPath();ctx.arc(cx,y+14,18,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=inv?.4:1;

    // マント（後ろ・大きく流れる）
    ctx.fillStyle='#180028';
    if(P.dir>0){ctx.beginPath();ctx.moveTo(cx-3,y+8);ctx.lineTo(cx-12,y+28);ctx.lineTo(cx+4,y+25);ctx.closePath();ctx.fill();}
    else{ctx.beginPath();ctx.moveTo(cx+3,y+8);ctx.lineTo(cx+12,y+28);ctx.lineTo(cx-4,y+25);ctx.closePath();ctx.fill();}
    ctx.fillStyle='#2a0044';
    if(P.dir>0){ctx.beginPath();ctx.moveTo(cx-2,y+8);ctx.lineTo(cx-9,y+26);ctx.lineTo(cx+3,y+23);ctx.closePath();ctx.fill();}
    else{ctx.beginPath();ctx.moveTo(cx+2,y+8);ctx.lineTo(cx+9,y+26);ctx.lineTo(cx-3,y+23);ctx.closePath();ctx.fill();}

    // ローブ（体）
    ctx.fillStyle='#180028';px(cx-4,y+8,9,18);
    ctx.fillStyle='#2a0044';px(cx-3,y+9,8,16);
    ctx.fillStyle='#3a0060';px(cx-2,y+10,5,6); // ハイライト
    ctx.fillStyle='#180028';px(cx-5,y+22,11,5); // 裾広がり
    ctx.fillStyle='#0e001e';px(cx-5,y+25,11,3);

    // 腕（白い手）
    ctx.fillStyle='#2a0044';px(cx-6,y+10,3,8);px(cx+3,y+10,3,8);
    ctx.fillStyle='#e8d8f8';px(cx-6,y+17,3,3);px(cx+3,y+17,3,3);
    // オーブ攻撃エフェクト
    if(P.atkCd>18){
        const ox=P.dir>0?cx+8:cx-8;
        ctx.globalAlpha=.7+Math.sin(gTick*.2)*.3;
        ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(ox,y+17,5,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=.3;ctx.fillStyle='#cc88ff';ctx.beginPath();ctx.arc(ox,y+17,9,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=inv?.4:1;
    }

    // 顔（青白い）
    ctx.fillStyle='#e0d0f8';ctx.beginPath();ctx.arc(cx,y+5,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#c8b8e8';px(cx-2,y+10,4,2);

    // 王冠
    ctx.fillStyle='#180028';px(cx-5,y-4,11,5);ctx.fillStyle='#2a0044';px(cx-4,y-3,9,4);
    ctx.fillStyle='#180028';
    ctx.beginPath();ctx.moveTo(cx-5,y-4);ctx.lineTo(cx-3,y-9);ctx.lineTo(cx-1,y-4);ctx.fill();
    ctx.beginPath();ctx.moveTo(cx-1,y-4);ctx.lineTo(cx+1,y-10);ctx.lineTo(cx+3,y-4);ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+3,y-4);ctx.lineTo(cx+5,y-9);ctx.lineTo(cx+7,y-4);ctx.fill();
    ctx.fillStyle='#aa0000';px(cx-4,y-2,2,2);ctx.fillStyle='#8822ff';px(cx,y-3,2,2);ctx.fillStyle='#aa0000';px(cx+4,y-2,2,2);

    // 目（輝く赤）
    ctx.fillStyle='#ff0808';px(cx-3,y+4,3,2);px(cx+1,y+4,3,2);
    ctx.globalAlpha=.5*(inv?.5:1);
    ctx.fillStyle='#ff4444';ctx.beginPath();ctx.arc(cx-2,y+4,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+3,y+4,3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
}

// ===== DRAW MAGE =====
function drawMage(x,y){
    const inv=P.inv>0&&Math.floor(P.inv/4)%2===0;
    if(inv)ctx.globalAlpha=0.4;
    const cx=Math.floor(x)+6;
    const wa=P.onG?Math.sin(P.fr*.28):0;
    const bob=P.onG?-Math.abs(Math.round(wa)):0;
    y+=bob;
    const loff=Math.round(wa*3);
    const rSw=Math.round(wa*2);
    const lSw=Math.round(-wa*2);

    // 杖（後ろ腕側）
    const stx=P.dir>0?cx-6:cx+4;
    ctx.fillStyle='#4a2a10';px(stx,y-7,2,28);ctx.fillStyle='#6a3a18';px(stx-1,y-7,1,26);
    ctx.fillStyle='#2040c0';ctx.beginPath();ctx.arc(stx,y-8,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#4060e8';ctx.beginPath();ctx.arc(stx,y-8,3,0,Math.PI*2);ctx.fill();
    const stGlow=.25+Math.sin(gTick*.14)*.15;
    ctx.globalAlpha=stGlow*(inv?.4:1);ctx.fillStyle='#80a0ff';
    ctx.beginPath();ctx.arc(stx,y-8,8,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=inv?.4:1;

    // 後ろ腕
    ctx.fillStyle='#142560';px(P.dir>0?cx-5:cx+2,y+13,3,7);
    ctx.fillStyle='#d4aa66';px(P.dir>0?cx-5+lSw:cx+2-lSw,y+19,3,3);

    // ローブ（体）
    ctx.fillStyle='#0e1840';px(cx-4,y+11,9,14); // shadow
    ctx.fillStyle='#1e3890';px(cx-3,y+11,8,13); // base
    ctx.fillStyle='#2848b8';px(cx-2,y+12,5,5);  // highlight
    ctx.fillStyle='#0e1840';px(cx-5,y+21,11,5); // 裾広がり
    ctx.fillStyle='#080e28';px(cx-5,y+24,11,2);
    ctx.fillStyle='#c8a020';px(cx-4,y+20,9,2);  // 帯

    // 前腕
    ctx.fillStyle='#1e3890';px(P.dir>0?cx+2:cx-5,y+13,3,7);
    if(P.atkCd>12){
        const hx=P.dir>0?cx+8:cx-8;
        ctx.globalAlpha=.65+Math.random()*.25;
        ctx.fillStyle='#ff8020';ctx.beginPath();ctx.arc(hx,y+18,5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffcc40';ctx.beginPath();ctx.arc(hx,y+18,2,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=inv?.4:1;
    }
    ctx.fillStyle='#d4aa66';px(P.dir>0?cx+3+rSw:cx-6+rSw,y+19,3,3);

    // 顔
    ctx.fillStyle='#d4aa66';ctx.beginPath();ctx.arc(cx,y+6,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#c4906a';px(cx-2,y+10,3,2);
    // ひげ
    ctx.fillStyle='#e8e0d0';px(cx-2,y+8,5,2);
    // 目
    ctx.fillStyle='#224488';px(cx-2,y+5,2,2);px(cx+1,y+5,2,2);
    ctx.fillStyle='#aaccff';px(cx-1,y+5,1,1);px(cx+2,y+5,1,1);

    // 帽子（三角・高い）
    ctx.fillStyle='#0e1840';px(cx-7,y-1,14,3); // ツバ
    ctx.fillStyle='#1a2e6e';px(cx-6,y,12,2);
    ctx.fillStyle='#1e3890';ctx.beginPath();ctx.moveTo(cx,y-13);ctx.lineTo(cx-6,y);ctx.lineTo(cx+7,y);ctx.closePath();ctx.fill();
    ctx.fillStyle='#2848b8';ctx.beginPath();ctx.moveTo(cx+1,y-12);ctx.lineTo(cx-1,y-6);ctx.lineTo(cx+5,y-6);ctx.closePath();ctx.fill();
    ctx.fillStyle='#ffdd00';px(cx-1,y-6,2,2); // 星

    // 脚
    ctx.fillStyle='#0a1030';
    px(cx-3+loff,y+26,3,4);px(cx-4+loff,y+29,5,2);
    px(cx-1-loff,y+26,3,4);px(cx-1-loff,y+29,5,2);

    ctx.globalAlpha=1;
}

// ===== DRAW ELF =====
function drawElf(x,y){
    const inv=P.inv>0&&Math.floor(P.inv/4)%2===0;
    if(inv)ctx.globalAlpha=0.4;
    const cx=Math.floor(x)+6;
    const wa=P.onG?Math.sin(P.fr*.32):0;
    const bob=P.onG?-Math.abs(Math.round(wa)):0;
    y+=bob;
    const loff=Math.round(wa*4);
    const rSw=Math.round(wa*3);
    const lSw=Math.round(-wa*2);

    // 弓（後ろ腕側）
    const bx=P.dir>0?cx-7:cx+5;
    ctx.strokeStyle='#9a5828';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(bx,y+11,10,-.7,.7);ctx.stroke();
    ctx.fillStyle='#7a4820';px(bx-1,y+1,2,20);
    if(P.atkCd>14){
        ctx.strokeStyle='#eee8c0';ctx.lineWidth=.7;
        ctx.beginPath();ctx.moveTo(bx,y+3);ctx.lineTo(P.dir>0?cx+9:cx-9,y+11);ctx.lineTo(bx,y+19);ctx.stroke();
    }

    // 後ろ腕
    ctx.fillStyle='#1e5818';px(P.dir>0?cx-5:cx+2,y+13,3,7);
    ctx.fillStyle='#e8c888';px(P.dir>0?cx-5+lSw:cx+2-lSw,y+19,3,3);

    // チュニック（体）
    ctx.fillStyle='#164010';px(cx-4,y+11,8,12); // shadow
    ctx.fillStyle='#286820';px(cx-3,y+11,7,12); // base
    ctx.fillStyle='#3a8030';px(cx-2,y+12,4,6);  // highlight
    ctx.fillStyle='#7a4820';px(cx-4,y+21,9,2);  // ベルト
    ctx.fillStyle='#c88030';px(cx-1,y+21,3,2);  // バックル

    // 前腕
    ctx.fillStyle='#1e5818';px(P.dir>0?cx+2:cx-5,y+13,3,7);
    ctx.fillStyle='#e8c888';px(P.dir>0?cx+3+rSw:cx-6+rSw,y+19,3,3);

    // 顔
    ctx.fillStyle='#e8c888';ctx.beginPath();ctx.arc(cx,y+6,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#d8b878';px(cx-2,y+11,3,2);

    // 金髪（流れる）
    ctx.fillStyle='#e8c030';
    ctx.beginPath();ctx.arc(cx,y+4,7,Math.PI,0);ctx.fill(); // 前髪
    px(cx-9,y+2,4,11); // 左に流れる長髪
    px(cx+6,y+2,4,11); // 右
    ctx.fillStyle='#d0a820';px(cx-8,y+4,3,9);px(cx+7,y+4,3,8);

    // エルフの耳（尖り）
    ctx.fillStyle='#e8c888';
    ctx.beginPath();ctx.moveTo(cx-7,y+6);ctx.lineTo(cx-11,y+3);ctx.lineTo(cx-7,y+10);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+7,y+6);ctx.lineTo(cx+11,y+3);ctx.lineTo(cx+7,y+10);ctx.closePath();ctx.fill();

    ctx.beginPath();ctx.moveTo(cx-7,y+7);ctx.lineTo(cx-10,y+5);ctx.lineTo(cx-7,y+10);ctx.closePath();ctx.fill();

// ===== DRAW DRAGON =====
function drawDragon(x,y){
    const inv=P.inv>0&&Math.floor(P.inv/4)%2===0;
    if(inv)ctx.globalAlpha=0.4;
    const cx=Math.floor(x)+6;
    const wa=P.onG?Math.sin(P.fr*.28):0;
    const bob=P.onG?-Math.abs(Math.round(wa)):0;
    y+=bob;
    const loff=Math.round(wa*3);
    const wingFlap=Math.round(Math.sin(gTick*.15)*4);

    // 尾（後ろ）
    ctx.fillStyle='#a01808';
    if(P.dir>0){
        ctx.beginPath();ctx.moveTo(cx-3,y+18);ctx.lineTo(cx-14,y+14+Math.abs(loff));ctx.lineTo(cx-10,y+24);ctx.closePath();ctx.fill();
    }else{
        ctx.beginPath();ctx.moveTo(cx+3,y+18);ctx.lineTo(cx+14,y+14+Math.abs(loff));ctx.lineTo(cx+10,y+24);ctx.closePath();ctx.fill();
    }

    // 翼（2枚・羽ばたき）
    ctx.fillStyle='#901408';
    if(P.dir>0){
        ctx.beginPath();ctx.moveTo(cx-2,y+8);ctx.lineTo(cx-17,y-2+wingFlap);ctx.lineTo(cx-12,y+18);ctx.closePath();ctx.fill();
        ctx.beginPath();ctx.moveTo(cx-2,y+13);ctx.lineTo(cx-14,y+7+wingFlap);ctx.lineTo(cx-8,y+20);ctx.closePath();ctx.fill();
    }else{
        ctx.beginPath();ctx.moveTo(cx+2,y+8);ctx.lineTo(cx+17,y-2+wingFlap);ctx.lineTo(cx+12,y+18);ctx.closePath();ctx.fill();
        ctx.beginPath();ctx.moveTo(cx+2,y+13);ctx.lineTo(cx+14,y+7+wingFlap);ctx.lineTo(cx+8,y+20);ctx.closePath();ctx.fill();
    }
    // 翼の骨
    ctx.strokeStyle='#701008';ctx.lineWidth=.8;
    if(P.dir>0){ctx.beginPath();ctx.moveTo(cx-2,y+8);ctx.lineTo(cx-17,y-2+wingFlap);ctx.stroke();}
    else{ctx.beginPath();ctx.moveTo(cx+2,y+8);ctx.lineTo(cx+17,y-2+wingFlap);ctx.stroke();}

    // 体（スケール）
    ctx.fillStyle='#901408';px(cx-5,y+8,10,16); // shadow
    ctx.fillStyle='#cc2010';px(cx-4,y+8,9,15);  // base
    // スケールパターン
    ctx.fillStyle='#a01808';
    for(let si=0;si<3;si++)for(let sj=0;sj<2;sj++)ctx.fillRect(cx-3+sj*4,y+10+si*4,3,2);
    // 腹（黄）
    ctx.fillStyle='#e0b020';px(cx-2,y+10,5,12);ctx.fillStyle='#f0c830';px(cx-1,y+11,3,5);

    // 腕
    ctx.fillStyle='#b01c10';px(cx-6,y+9,4,8);px(cx+3,y+9,4,8);
    ctx.fillStyle='#cc2010';px(cx-5,y+16,4,3);px(cx+4,y+16,4,3);
    ctx.fillStyle='#e8d8c0';px(cx-7,y+18,2,3);px(cx-5,y+19,2,2);
    ctx.fillStyle='#e8d8c0';px(cx+4,y+18,2,3);px(cx+6,y+19,2,2);

    // 炎ブレス
    if(P.atkCd>25){
        const fx=P.dir>0?cx+9:cx-9;
        ctx.globalAlpha=.7+Math.random()*.2;
        ctx.fillStyle='#ff8020';ctx.beginPath();ctx.arc(fx,y+4,6,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffcc40';ctx.beginPath();ctx.arc(fx,y+4,3,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=.3;ctx.fillStyle='#ff4000';ctx.beginPath();ctx.arc(fx+P.dir*4,y+4,9,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=inv?.4:1;
    }

    // 頭
    ctx.fillStyle='#a01408';px(cx-4,y+0,10,8);ctx.fillStyle='#cc2010';px(cx-3,y+1,9,7);
    ctx.fillStyle='#b01808';px(cx-3,y+2,7,4); // highlight
    // 角
    ctx.fillStyle='#e8c020';
    ctx.beginPath();ctx.moveTo(cx-3,y+0);ctx.lineTo(cx-2,y-7);ctx.lineTo(cx+0,y+0);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+2,y+0);ctx.lineTo(cx+4,y-7);ctx.lineTo(cx+6,y+0);ctx.closePath();ctx.fill();
    // 鼻面
    const nxd=P.dir>0?cx+3:cx-7;
    ctx.fillStyle='#b01808';px(nxd,y+3,6,5);ctx.fillStyle='#cc2010';px(nxd+1,y+4,4,3);
    ctx.fillStyle='#e8d0c0';px(P.dir>0?cx+7:cx-5,y+6,2,3); // 牙
    ctx.fillStyle='#601008';px(P.dir>0?cx+5:cx-4,y+4,1,1);px(P.dir>0?cx+7:cx-2,y+4,1,1);
    // 目
    ctx.fillStyle='#ff8800';px(cx-2,y+2,3,2);px(cx+2,y+2,3,2);
    ctx.fillStyle='#221008';px(cx-1,y+2,1,2);px(cx+3,y+2,1,2);
    ctx.globalAlpha=.35*(inv?.4:1);ctx.fillStyle='#ffcc00';
    ctx.beginPath();ctx.arc(cx-1,y+2,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+3,y+2,2.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=inv?.4:1;

    // 脚
    ctx.fillStyle='#901408';px(cx-4+loff,y+23,4,5);ctx.fillStyle='#701008';px(cx-5+loff,y+27,6,2);
    ctx.fillStyle='#a01810';px(cx-1-loff,y+23,4,5);ctx.fillStyle='#801008';px(cx-2-loff,y+27,6,2);

    ctx.globalAlpha=1;
}

// ===== DRAW GOBLIN PC (player) =====
function drawGoblinPC(x,y){
    const inv=P.inv>0&&Math.floor(P.inv/4)%2===0;
    if(inv)ctx.globalAlpha=0.4;
    const cx=Math.floor(x)+6;
    const wa=P.onG?Math.sin(P.fr*.38):0; // 速い走りモーション
    const bob=P.onG?-Math.abs(Math.round(wa)):0;
    y+=bob;
    const loff=Math.round(wa*4);
    const rSw=Math.round(wa*3);
    const lSw=Math.round(-wa*3);

    // 後ろ腕（緑の短い腕）
    ctx.fillStyle='#2e6808';px(P.dir>0?cx-5:cx+2,y+14,3,5);
    ctx.fillStyle='#3a8010';px(P.dir>0?cx-5+lSw:cx+2-lSw,y+18,3,3);

    // 体（革鎧）

    ctx.fillStyle='#7a4820';px(cx-3,y+13,8,10); // base
    ctx.fillStyle='#9a6030';px(cx-2,y+14,4,5);  // highlight
    // リベット
    ctx.fillStyle='#cc9030';px(cx-2,y+14,1,1);px(cx+2,y+14,1,1);px(cx-2,y+18,1,1);px(cx+2,y+18,1,1);
    ctx.fillStyle='#3a2008';px(cx-4,y+21,9,2); // ベルト
    ctx.fillStyle='#cc9030';px(cx-1,y+21,3,2);

    // 前腕＋ダガー
    ctx.fillStyle='#2e6808';px(P.dir>0?cx+2:cx-5,y+14,3,5);
    if(P.atk>0){
        ctx.fillStyle='#a0a0a8';
        if(P.dir>0){px(cx+5,y+11,2,14);}else{px(cx-7,y+11,2,14);}
        ctx.fillStyle='#606878';if(P.dir>0){px(cx+4,y+17,5,2);}else{px(cx-9,y+17,5,2);}
    }else{
        ctx.fillStyle='#3a8010';px(P.dir>0?cx+3+rSw:cx-6+rSw,y+18,3,3);
        ctx.fillStyle='#a0a0a8';px(P.dir>0?cx+5:cx-8,y+14,2,10);
        ctx.fillStyle='#c0c0a8';px(P.dir>0?cx+4:cx-9,y+18,4,2);
    }

    // 頭（大きめ・緑）
    ctx.fillStyle='#2e6808';ctx.beginPath();ctx.arc(cx,y+8,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3a8010';ctx.beginPath();ctx.arc(cx,y+7,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#c4906a';px(cx-2,y+13,4,2); // 首
    // ヘルメット（鉄・歪み）
    ctx.fillStyle='#808898';ctx.beginPath();ctx.arc(cx,y+6,7,Math.PI,0);ctx.fill();
    ctx.fillStyle='#606878';px(cx-4,y+0,8,3);ctx.fillStyle='#a0a8b8';px(cx-3,y+1,4,2);
    ctx.fillStyle='#404850';px(cx-7,y+8,15,2);
    // 耳（大きい、ヘルメットから出る）
    ctx.fillStyle='#2e6808';
    ctx.beginPath();ctx.moveTo(cx-7,y+5);ctx.lineTo(cx-11,y+2);ctx.lineTo(cx-7,y+10);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+7,y+5);ctx.lineTo(cx+11,y+2);ctx.lineTo(cx+7,y+10);ctx.closePath();ctx.fill();
    ctx.fillStyle='#489010';
    ctx.beginPath();ctx.moveTo(cx-7,y+6);ctx.lineTo(cx-10,y+4);ctx.lineTo(cx-7,y+10);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+7,y+6);ctx.lineTo(cx+10,y+4);ctx.lineTo(cx+7,y+10);ctx.closePath();ctx.fill();
    // 目（ギラギラ黄）
    ctx.fillStyle='#ffcc00';px(cx-3,y+7,3,2);px(cx+1,y+7,3,2);
    ctx.fillStyle='#ff4400';px(cx-2,y+7,2,2);px(cx+2,y+7,2,2);
    ctx.fillStyle='#111';px(cx-2,y+8,1,1);px(cx+2,y+8,1,1);
    // 牙
    ctx.fillStyle='#eeeebb';px(cx-2,y+12,1,3);px(cx+2,y+12,1,3);

    // 脚（短い・素早そう）
    ctx.fillStyle='#3a2008';px(cx-4+loff,y+23,4,5);ctx.fillStyle='#181008';px(cx-5+loff,y+27,6,2);
    ctx.fillStyle='#4a2810';px(cx-1-loff,y+23,4,5);ctx.fillStyle='#181008';px(cx-2-loff,y+27,6,2);

    ctx.globalAlpha=1;
}

// ===== DRAW GOLEM =====
function drawGolem(x,y){
    const inv=P.inv>0&&Math.floor(P.inv/4)%2===0;
    if(inv)ctx.globalAlpha=0.4;
    const cx=Math.floor(x)+6;
    const wa=P.onG&&Math.abs(P.vx)>.2?Math.sin(P.fr*.2):0; // 重い歩き
    const loff=Math.round(wa*2);

    // 体���大きな石ブロック）
    ctx.fillStyle='#3a4858';px(cx-6,y+6,13,18); // outer shadow
    ctx.fillStyle='#5a6880';px(cx-5,y+7,12,17); // base
    ctx.fillStyle='#7080a0';px(cx-4,y+8,9,8);   // highlight panel
    ctx.fillStyle='#3a4858';px(cx-4,y+7,1,18);  // left edge shadow
    // 石のひび
    ctx.fillStyle='#2e3848';
    ctx.fillRect(cx-1,y+10,1,7);ctx.fillRect(cx+4,y+12,1,6);ctx.fillRect(cx+1,y+16,6,1);
    ctx.fillRect(cx-3,y+18,4,1);
    // 苔
    ctx.fillStyle='#408040';px(cx-4,y+8,3,2);px(cx+3,y+14,3,2);px(cx-3,y+20,4,1);

    // コア（胸の宝石・発光）
    const coreGlow=.6+Math.sin(gTick*.1)*.4;
    ctx.globalAlpha=coreGlow*(inv?.3:1);
    ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(cx,y+15,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffaa20';ctx.beginPath();ctx.arc(cx,y+15,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff0d0';ctx.beginPath();ctx.arc(cx,y+15,1.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=.1*coreGlow*(inv?.3:1);ctx.fillStyle='#ff8800';
    ctx.beginPath();ctx.arc(cx,y+15,13,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=inv?.4:1;

    // 腕（重い・大きい）
    ctx.fillStyle='#3a4858';px(cx-9,y+8,5,12);px(cx+5,y+8,5,12);
    ctx.fillStyle='#5a6880';px(cx-8,y+9,4,10);px(cx+6,y+9,4,10);
    ctx.fillStyle='#3a4858';px(cx-10,y+18,6,7);px(cx+5,y+18,7,7); // 拳
    ctx.fillStyle='#5a6880';px(cx-9,y+19,4,5);px(cx+6,y+19,5,5);
    // 指のライン
    ctx.fillStyle='#404858';ctx.fillRect(cx-9,y+21,4,1);ctx.fillRect(cx+6,y+21,5,1);
    ctx.fillRect(cx-9,y+23,4,1);ctx.fillRect(cx+6,y+23,5,1);
    // 攻撃時衝撃波
    if(P.atk>0){
        const fx=P.dir>0?cx+12:cx-12;
        ctx.globalAlpha=.4*(inv?.4:1);ctx.fillStyle='#ffdd88';
        ctx.beginPath();ctx.arc(fx,y+17,10,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=inv?.4:1;
    }

    // 頭（四角い石）
    ctx.fillStyle='#3a4858';px(cx-5,y-2,11,9);
    ctx.fillStyle='#5a6880';px(cx-4,y-1,10,8);
    ctx.fillStyle='#7080a0';px(cx-3,y+0,6,3); // ハイライト
    ctx.fillStyle='#2e3848';px(cx-2,y+2,1,4);ctx.fillRect(cx+2,y+4,5,1); // ひび

    // 眼（赤く光る）
    ctx.globalAlpha=.7+Math.sin(gTick*.12)*.3;
    ctx.fillStyle='#ff3300';px(cx-3,y+2,3,3);px(cx+1,y+2,3,3);
    ctx.fillStyle='#ff6600';px(cx-2,y+3,2,2);px(cx+2,y+3,2,2);
    ctx.globalAlpha=.2*(inv?.4:1);ctx.fillStyle='#ff4400';
    ctx.beginPath();ctx.arc(cx-1,y+3,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+3,y+3,4,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=inv?.4:1;

    // 脚（柱のような）
    ctx.fillStyle='#3a4858';px(cx-5+loff,y+24,5,6);ctx.fillStyle='#2a3040';px(cx-6+loff,y+29,7,2);
    ctx.fillStyle='#485868';px(cx-1-loff,y+24,5,6);ctx.fillStyle='#2a3040';px(cx-1-loff,y+29,7,2);

    ctx.globalAlpha=1;
}

// ===== DRAW SLIME =====
function drawSlime(x,y){
    const inv=P.inv>0&&Math.floor(P.inv/4)%2===0;
    if(inv)ctx.globalAlpha=0.4;
    const cx=Math.floor(x)+6;
    const bounce=P.onG?Math.abs(Math.sin(P.fr*.3))*2:0;
    const sqX=Math.round(bounce);const sqY=Math.round(-bounce*.6);

    // 地面影
    if(P.onG){
        ctx.globalAlpha=.18*(inv?.4:1);ctx.fillStyle='#000044';
        ctx.beginPath();ctx.ellipse(cx,y+22,9+sqX,2,0,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=inv?.4:1;
    }

    // 触手（上部・揺れる）
    const t1=Math.round(Math.sin(gTick*.14)*3);const t2=Math.round(Math.sin(gTick*.11+1)*3);
    ctx.fillStyle='#1268a8';
    ctx.beginPath();ctx.moveTo(cx-5,y+8);ctx.lineTo(cx-7+t1,y-3);ctx.lineTo(cx-2,y+8);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+2,y+8);ctx.lineTo(cx+5+t2,y-3);ctx.lineTo(cx+8,y+8);ctx.closePath();ctx.fill();
    ctx.fillStyle='#2298e8';
    ctx.beginPath();ctx.moveTo(cx-5,y+9);ctx.lineTo(cx-6+t1,y-2);ctx.lineTo(cx-2,y+9);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+3,y+9);ctx.lineTo(cx+5+t2,y-2);ctx.lineTo(cx+7,y+9);ctx.closePath();ctx.fill();

    // 本体（楕円・3層）
    ctx.fillStyle='#0e5888';ctx.beginPath();ctx.ellipse(cx,y+14+sqY,10+sqX,10-sqY,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2298e8';ctx.beginPath();ctx.ellipse(cx,y+13+sqY,9+sqX,9-sqY,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#38b8ff';ctx.beginPath();ctx.ellipse(cx-2,y+10+sqY,5,4,-.3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=.35*(inv?.4:1);ctx.fillStyle='#aaeeff';
    ctx.beginPath();ctx.ellipse(cx-3,y+9+sqY,3,2,-.4,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=inv?.4:1;
    // 底部ドロドロ
    ctx.fillStyle='#0e5888';ctx.beginPath();ctx.ellipse(cx,y+21+sqY,9+sqX,3,0,0,Math.PI);ctx.fill();

    // 目（大きくてかわいい・黒縁）
    ctx.fillStyle='#0c2840';ctx.beginPath();ctx.arc(cx-3,y+12+sqY,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0c2840';ctx.beginPath();ctx.arc(cx+4,y+12+sqY,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(cx-3,y+12+sqY,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(cx+4,y+12+sqY,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1268a8';ctx.beginPath();ctx.arc(cx-3,y+12+sqY,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1268a8';ctx.beginPath();ctx.arc(cx+4,y+12+sqY,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0c2840';ctx.beginPath();ctx.arc(cx-2,y+12+sqY,1.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0c2840';ctx.beginPath();ctx.arc(cx+5,y+12+sqY,1.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(cx-1,y+11+sqY,1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(cx+6,y+11+sqY,1,0,Math.PI*2);ctx.fill();

    // 口（笑顔）
    ctx.strokeStyle='#0e4870';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(cx+.5,y+17+sqY,3,.2,Math.PI-.2);ctx.stroke();

    ctx.globalAlpha=1;
}

// ===== STAGE 2 BACKGROUND (洞窟) =====
function drawBg2(){
    // 暗い洞窟天井・壁
    const bg=ctx.createLinearGradient(0,0,0,GY);
    bg.addColorStop(0,'#06040e');bg.addColorStop(.5,'#0e0818');bg.addColorStop(1,'#180c20');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,GY);

    // 岩壁テクスチャ
    ctx.fillStyle='#1a1228';
    for(let i=0;i<8;i++){
        const rx=((i*90+20-scroll*.05+3000)%3000)-60;
        ctx.fillRect(rx,0,12,GY);
    }

    // 鍾乳石（天井から）
    ctx.fillStyle='#2a1840';
    for(let i=0;i<10;i++){
        const sx=((i*120+15-scroll*.4+4000)%4000)-20;
        const sh=12+i%3*8;
        ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx+8,sh);ctx.lineTo(sx+16,0);ctx.fill();
        ctx.fillStyle='#1e1030';ctx.fillRect(sx+3,0,10,sh-4);
        ctx.fillStyle='#2a1840';
    }

    // 石筍（地面から）
    ctx.fillStyle='#281638';
    for(let i=0;i<7;i++){
        const sx=((i*160+80-scroll*.45+4000)%4000)-20;
        const sh=8+i%2*5;
        ctx.beginPath();ctx.moveTo(sx,GY);ctx.lineTo(sx+6,GY-sh);ctx.lineTo(sx+12,GY);ctx.fill();
    }

    // 松明（壁の光）
    for(let i=0;i<5;i++){
        const tx=((i*200+50-scroll*.5+4000)%4000)-30;
        const flicker=.6+Math.sin(gTick*.2+i*1.3)*.4;
        // 光の輪
        ctx.globalAlpha=.08*flicker;ctx.fillStyle='#ff8820';
        ctx.beginPath();ctx.arc(tx,GY-20,28,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=.15*flicker;ctx.fillStyle='#ffaa40';
        ctx.beginPath();ctx.arc(tx,GY-20,16,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
        // 松明本体
        ctx.fillStyle='#5a3010';ctx.fillRect(tx-2,GY-26,4,10);
        ctx.fillStyle=`rgba(255,${120+flicker*80|0},20,${.8+flicker*.2})`;
        ctx.beginPath();ctx.arc(tx,GY-26,3,0,Math.PI*2);ctx.fill();
    }

    // 地面（石畳）
    ctx.fillStyle='#383048';px(0,GY,W,5);
    ctx.fillStyle='#2a2438';px(0,GY+2,W,2);
    ctx.fillStyle='#1e1830';px(0,GY+5,W,H-GY-5);
    ctx.fillStyle='#302848';
    for(let i=0;i<14;i++){
        const tx=((i*30-scroll*.5+2000)%2000);
        ctx.fillRect(tx,GY+6,28,1);ctx.fillRect(tx+15,GY+12,20,1);
    }
}

// ===== DRAW SKELETON =====
function drawSkeleton(en){
    const x=Math.floor(en.sx-scroll),y=Math.floor(en.sy);
    if(en.inv>0&&Math.floor(en.inv/4)%2===0){ctx.globalAlpha=0.4;}
    const dir=en.dir;
    // skull
    ctx.fillStyle='#dde0d0';px(x+1,y,7,6);
    ctx.fillStyle='#000';px(x+2,y+2,2,2);px(x+6,y+2,2,2);
    // jaw
    ctx.fillStyle='#c8ccc0';px(x+2,y+5,5,3);
    ctx.fillStyle='#000';px(x+3,y+6,1,2);px(x+5,y+6,1,2);
    // ribs
    ctx.fillStyle='#c0c4b8';px(x+2,y+8,5,6);
    ctx.fillStyle='#000';px(x+3,y+9,1,4);px(x+5,y+9,1,4);
    // arms
    ctx.fillStyle='#c0c4b8';px(x,y+8,2,5);px(x+7,y+8,2,5);
    // bow
    ctx.fillStyle='#8b5e2a';
    if(dir>0){px(x+9,y+6,1,8);ctx.strokeStyle='#c8a050';ctx.lineWidth=.7;ctx.beginPath();ctx.arc(x+9,y+10,6,-.8,.8);ctx.stroke();}
    else{px(x-1,y+6,1,8);ctx.strokeStyle='#c8a050';ctx.lineWidth=.7;ctx.beginPath();ctx.arc(x,y+10,6,Math.PI-.8,Math.PI+.8);ctx.stroke();}
    // legs
    ctx.fillStyle='#c0c4b8';px(x+2,y+14,2,5);px(x+5,y+14,2,5);
    ctx.fillStyle='#888';px(x+1,y+18,4,1);px(x+4,y+18,4,1);
    ctx.globalAlpha=1;
}

// ===== DRAW BOSS (ゴブリンキング) =====
function drawBoss(b){
    const x=Math.floor(b.sx-scroll),y=Math.floor(b.sy);
    if(b.inv>0&&Math.floor(b.inv/4)%2===0){ctx.globalAlpha=0.4;}
    const f=b.fr%20<10?0:1;
    // crown
    ctx.fillStyle='#e8c020';px(x+4,y-4,14,3);px(x+3,y-6,3,3);px(x+9,y-6,3,3);px(x+15,y-6,3,3);
    // head (big goblin)
    ctx.fillStyle='#406830';px(x+2,y,18,14);
    ctx.fillStyle='#50883e';px(x+4,y+2,14,8);
    ctx.fillStyle='#ff2020';px(x+4,y+4,4,2);px(x+12,y+4,4,2);
    ctx.fillStyle='#fff';px(x+3,y+8,6,3);px(x+11,y+8,6,3);
    ctx.fillStyle='#e8d020';px(x+4,y+6,2,1);px(x+14,y+6,2,1); // tusks
    // body
    ctx.fillStyle='#304820';px(x+3,y+14,16,10);
    ctx.fillStyle='#40602a';px(x+5,y+15,12,6);
    // belt + weapon holder
    ctx.fillStyle='#5a3010';px(x+3,y+23,16,3);
    ctx.fillStyle='#8b4010';px(x+9,y+23,4,3);
    // arms
    ctx.fillStyle='#406830';px(x,y+14,3+f,8);px(x+19-f,y+14,3+f,8);
    // club
    ctx.fillStyle='#5a3010';
    if(b.dir>0){px(x+21,y+14,3,10);ctx.fillStyle='#3a2008';px(x+19,y+14,5,4);}
    else{px(x-2,y+14,3,10);ctx.fillStyle='#3a2008';px(x-2,y+14,5,4);}
    // legs
    ctx.fillStyle='#304820';px(x+4,y+24,5,8+(f?0:1));px(x+13,y+24,5,8+(f?1:0));
    ctx.fillStyle='#1a2810';px(x+3,y+31,7,2);px(x+12,y+31,7,2);
    // HP bar above boss
    const bw=40,bx=x+b.w/2-bw/2,by=y-10;
    ctx.fillStyle='#440000';ctx.fillRect(bx,by,bw,4);
    ctx.fillStyle='#ff2020';ctx.fillRect(bx,by,bw*(b.hp/b.maxHp),4);
    ctx.strokeStyle='#880000';ctx.lineWidth=.5;ctx.strokeRect(bx,by,bw,4);
    txo('BOSS',x+b.w/2,by-2,'#ff4444',5);
    ctx.globalAlpha=1;
}

// ===== DRAW PLATFORMS =====
function drawPlatforms(){
    platforms.forEach(pl=>{
        const px_=Math.floor(pl.sx-scroll);
        if(px_<-60||px_>W+10)return;
        ctx.fillStyle=pl.stone?'#788090':'#8b6040';
        ctx.fillRect(px_,Math.floor(pl.y),pl.w,pl.h);
        ctx.fillStyle=pl.stone?'#909aac':'#a07848';
        ctx.fillRect(px_,Math.floor(pl.y),pl.w,2);
        ctx.fillStyle=pl.stone?'#5a6070':'#6a4828';
        ctx.fillRect(px_,Math.floor(pl.y+pl.h-1),pl.w,1);
        if(!pl.stone){
            ctx.fillStyle='#7a5030';
            for(let i=0;i<Math.floor(pl.w/8);i++)ctx.fillRect(px_+i*8+3,Math.floor(pl.y)+1,1,pl.h-1);
        }
    });
}

// ===== UPDATE =====
function update(){
    gTick++;
    if(gs==='splash'){splashTimer++;if(splashTimer>=180)gs='start';return;}
    if(gs==='stageclear'){clearTimer++;return;}
    if(gs!=='playing')return;
    t++;

    // Player move
    const cst=CHARS[selectedChar];
    const spd=cst.spd;
    if(keys.L){P.vx=-spd;P.dir=-1;}
    else if(keys.R){P.vx=spd;P.dir=1;}
    else P.vx*=.65;

    P.vy+=GR*cst.gr;P.vy=Math.min(P.vy,9);
    P.x+=P.vx;P.y+=P.vy;

    // Ground
    if(P.y+P.h>=GY){P.y=GY-P.h;P.vy=0;P.onG=true;P.dj=false;}
    else P.onG=false;

    // Platform collision
    if(!P.onG){
        platforms.forEach(pl=>{
            const px_=pl.sx-scroll;
            if(P.x+P.w>px_&&P.x<px_+pl.w){
                if(P.vy>0&&P.y+P.h<=pl.y+P.vy+4&&P.y+P.h>=pl.y-4){
                    P.y=pl.y-P.h;P.vy=0;P.onG=true;P.dj=false;
                }
            }
        });
    }

    // Bounds
    if(P.x<scroll)P.x=scroll;

    // Camera follow
    const target=P.x-W*.35+P.w/2;
    if(target>scroll)scroll=target;

    P.fr++;P.inv=Math.max(0,P.inv-1);P.atkCd=Math.max(0,P.atkCd-1);
    if(P.atk>0)P.atk--;

    // Attack hit
    if(P.atk>6){
        const aw=16,ax=P.dir>0?P.x+P.w:P.x-aw;
        enemies.forEach(en=>{
            if(en.dead||en.inv>0)return;
            const ex=en.sx-scroll;
            if(ax<ex+en.w&&ax+aw>ex&&P.y<en.sy+en.h&&P.y+P.h>en.sy){
                en.hp--;en.inv=20;
                spark(ex+en.w/2,en.sy+en.h/2,'#ffaa44',8);
                snd(260,.08,.6);
                if(en.hp<=0){en.dead=true;sfx('kill');score+=100;spark(ex+5,en.sy+4,'#ff8820',16);
                    if(Math.random()<.4)items.push({sx:en.sx,y:en.sy,w:8,h:8,type:'coin',life:300});}
            }
        });
    }

    // Enemy collision
    if(P.inv<=0){
        enemies.forEach(en=>{
            if(en.dead)return;
            const ex=en.sx-scroll;
            if(P.x<ex+en.w&&P.x+P.w>ex&&P.y<en.sy+en.h&&P.y+P.h>en.sy){
                P.hp--;P.inv=55;shake=6;flash=14;sfx('hit');P.vy=-3;
                if(P.hp<=0){if(score>best){best=score;localStorage.setItem('ldo_best',best);}gs='gameover';}
            }
        });
    }

    // Items
    items.forEach(it=>{
        it.life--;
        const ix=it.sx-scroll;
        if(P.x<ix+it.w&&P.x+P.w>ix&&P.y<it.y+it.h&&P.y+P.h>it.y){
            it.life=0;
            if(it.type==='heart'){P.hp=Math.min(P.mhp,P.hp+1);spark(ix+4,it.y,'#ff4466',10);snd(660,.15);}
            else if(it.type==='coin'){score+=50;spark(ix+4,it.y,'#ffe840',8);sfx('coin');}
            else if(it.type==='orbfrag'){score+=500;spark(ix+5,it.y,'#ffe840',20);spark(ix+5,it.y,'#8822ff',16);snd(880,.5);}
        }
    });
    items=items.filter(it=>it.life>0&&it.sx>scroll-40);

    // Update enemies
    enemies.forEach(en=>{
        if(en.dead){en.fr++;return;}
        en.fr++;en.inv=Math.max(0,en.inv-1);
        const pdx=(P.x+scroll)-(en.sx+en.w/2);

        if(en.type==='goblin'){
            en.sx+=en.vx;
            if(en.sy+en.h<GY){en.vy+=GR;en.sy+=en.vy;}else{en.sy=GY-en.h;en.vy=0;}
            if(Math.abs(pdx)>4){en.vx=(pdx>0?.55:-.55);en.dir=pdx>0?1:-1;}else en.vx=0;
        }else if(en.type==='skeleton'){
            // Keep distance ~70px, shoot arrow
            const dist=Math.abs(pdx);
            en.dir=pdx>0?1:-1;
            if(dist>80){en.sx+=(pdx>0?.4:-.4);}
            else if(dist<50){en.sx+=(pdx>0?-.3:.3);}
            else en.vx=0;
            if(en.sy+en.h<GY){en.vy+=GR;en.sy+=en.vy;}else{en.sy=GY-en.h;en.vy=0;}
            en.shotCd=Math.max(0,(en.shotCd||80)-1);
            if(en.shotCd<=0&&dist<160){
                en.shotCd=90;
                arrows.push({sx:en.sx+(en.dir>0?en.w:0),sy:en.sy+8,vx:en.dir*3.2,life:0,maxLife:80});
                snd(320,.06,.4);
            }
        }
    });
    enemies=enemies.filter(en=>(!en.dead||en.fr<25)&&en.sx>scroll-100&&en.sx<scroll+W+100);

    // Arrows
    arrows.forEach(ar=>{ar.sx+=ar.vx;ar.life++;});
    if(P.inv<=0){
        arrows.forEach(ar=>{
            const ax=ar.sx-scroll;
            if(P.x<ax+4&&P.x+P.w>ax&&P.y<ar.sy+3&&P.y+P.h>ar.sy){
                ar.life=999;
                P.hp--;P.inv=50;shake=5;flash=12;sfx('hit');P.vy=-2;
                if(P.hp<=0){if(score>best){best=score;localStorage.setItem('ldo_best',best);}gs='gameover';}
            }
        });
    }
    arrows=arrows.filter(ar=>ar.life<ar.maxLife&&ar.sx>scroll-20&&ar.sx<scroll+W+20);

    // Boss
    if(scroll>=BOSS_TRIGGER&&!bossActive&&!bossDefeated){
        bossActive=true;
        boss={sx:scroll+W-30,sy:GY-34,w:22,h:34,hp:20,maxHp:20,vx:0,vy:0,dir:-1,fr:0,inv:0,phase:'charge',cd:80};
    }
    if(boss&&!bossDefeated){
        boss.fr++;boss.inv=Math.max(0,boss.inv-1);
        const bdx=(P.x+scroll)-(boss.sx+boss.w/2);
        boss.dir=bdx>0?1:-1;
        boss.cd=Math.max(0,boss.cd-1);
        if(boss.phase==='charge'){
            boss.sx+=(bdx>0?.7:-.7);
            if(boss.sy+boss.h<GY){boss.vy+=GR;boss.sy+=boss.vy;}else{boss.sy=GY-boss.h;boss.vy=0;}
            if(boss.cd<=0){boss.phase='stomp';boss.cd=40;boss.vy=-6;}
        }else if(boss.phase==='stomp'){
            if(boss.sy+boss.h<GY){boss.vy+=GR;boss.sy+=boss.vy;}else{boss.sy=GY-boss.h;boss.vy=0;shake=4;boss.phase='charge';boss.cd=100;}
        }
        // Attack hitbox
        if(P.inv<=0){
            const bx=boss.sx-scroll;
            if(P.x<bx+boss.w&&P.x+P.w>bx&&P.y<boss.sy+boss.h&&P.y+P.h>boss.sy){
                P.hp--;P.inv=60;shake=8;flash=18;sfx('hit');P.vy=-4;
                if(P.hp<=0){if(score>best){best=score;localStorage.setItem('ldo_best',best);}gs='gameover';}
            }
        }
        // Player attack on boss
        if(P.atk>6){
            const aw=16,ax=P.dir>0?P.x+P.w:P.x-aw;
            const bx=boss.sx-scroll;
            if(boss.inv<=0&&ax<bx+boss.w&&ax+aw>bx&&P.y<boss.sy+boss.h&&P.y+P.h>boss.sy){
                boss.hp--;boss.inv=16;spark(bx+11,boss.sy+10,'#ffaa44',10);snd(200,.08,.7);
                if(boss.hp<=0){
                    bossDefeated=true;boss=null;
                    score+=1000;spark(scroll+W/2,GY-40,'#ffe840',30);spark(scroll+W/2,GY-40,'#8822ff',30);
                    sfx('kill');snd(880,.5);stopBgm();
                    items.push({sx:scroll+W/2,y:GY-20,w:10,h:10,type:'orbfrag',life:600});
                    gs='stageclear';clearTimer=0;
                }
            }
        }
    }

    // Platforms
    platSpawnCd--;
    if(platSpawnCd<=0&&!bossActive){
        platSpawnCd=140+Math.floor(Math.random()*80);
        const pw=18+Math.floor(Math.random()*22);
        const ph=GY-22-Math.floor(Math.random()*38);
        const stone=Math.random()<.5;
        platforms.push({sx:scroll+W+8,y:ph,w:pw,h:6,stone});
        if(Math.random()<.3)items.push({sx:scroll+W+8+pw/2-4,y:ph-10,w:8,h:8,type:Math.random()<.5?'coin':'heart',life:500});
    }
    platforms=platforms.filter(pl=>pl.sx>scroll-60&&pl.sx<scroll+W+200);

    // Spawn
    if(!bossActive){
        spawnCd--;
        if(spawnCd<=0){
            spawnCd=90+Math.floor(Math.random()*70);
            const useSkele=t>400&&Math.random()<.4;
            if(useSkele){
                enemies.push({sx:scroll+W+10,sy:GY-18,w:9,h:18,hp:3,maxHp:3,vx:0,vy:0,dir:-1,fr:0,inv:0,dead:false,type:'skeleton',shotCd:60});
            }else{
                enemies.push({sx:scroll+W+10,sy:GY-14,w:10,h:14,hp:2,maxHp:2,vx:-.5,vy:0,dir:-1,fr:0,inv:0,dead:false,type:'goblin'});
            }
            if(t>600&&Math.random()<.3)
                items.push({sx:scroll+W+50,y:GY-8,w:8,h:8,type:'heart',life:400});
        }
    }

    // 飛び道具update
    orbs.forEach(ob=>{
        ob.sx+=ob.vx;
        if(ob.vy!==0){ob.sy+=ob.vy;}
        if(ob.type==='flame'){ob.vy+=0.25;} // 重力
        if(ob.type==='bounce'){
            ob.vy+=0.3;
            if(ob.sy>=GY-6){ob.sy=GY-6;ob.vy=-Math.abs(ob.vy)*.75;snd(300,.04,.3);}
        }
        ob.life++;
        enemies.forEach(en=>{
            if(en.dead||en.inv>0)return;
            const ex=en.sx-scroll,ox=ob.sx-scroll;
            if(ox<ex+en.w&&ox+6>ex&&ob.sy<en.sy+en.h&&ob.sy+6>en.sy){
                en.hp--;en.inv=20;ob.life=999;
                spark(ex+en.w/2,en.sy+en.h/2,'#8822ff',8);snd(180,.08,.6);
                if(en.hp<=0){en.dead=true;sfx('kill');score+=100;spark(ex+5,en.sy+4,'#6600cc',16);}
            }
        });
        if(boss&&!bossDefeated&&boss.inv<=0){
            const bx=boss.sx-scroll,ox=ob.sx-scroll;
            if(ox<bx+boss.w&&ox+6>bx&&ob.sy<boss.sy+boss.h&&ob.sy+6>boss.sy){
                boss.hp--;boss.inv=16;ob.life=999;
                spark(bx+11,boss.sy+10,'#8822ff',10);snd(180,.08,.7);
                if(boss.hp<=0){
                    bossDefeated=true;boss=null;score+=1000;
                    spark(scroll+W/2,GY-40,'#ffe840',30);spark(scroll+W/2,GY-40,'#8822ff',30);
                    sfx('kill');snd(880,.5);stopBgm();
                    items.push({sx:scroll+W/2,y:GY-20,w:10,h:10,type:'orbfrag',life:600});
                    gs='stageclear';clearTimer=0;
                }
            }
        }
    });
    orbs=orbs.filter(ob=>ob.life<ob.maxLife&&ob.sx>scroll-20&&ob.sx<scroll+W+20);

    // Particles
    parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life++;});
    parts=parts.filter(p=>p.life<p.maxLife);

    shake=Math.max(0,shake-1);flash=Math.max(0,flash-1);
    if(t%90===0)score+=stage*5;
}

// ===== DRAW =====
function draw(){
    utx.clearRect(0,0,uic.width,uic.height);
    const sx=Math.round((Math.random()-.5)*shake),sy=Math.round((Math.random()-.5)*shake);
    ctx.save();ctx.translate(sx,sy);
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

    // Stage Clear
    if(gs==='stageclear'){
        for(let i=0;i<50;i++){ctx.fillStyle=`rgba(255,255,255,${.3+Math.sin(gTick*.04+i)*.2})`;ctx.fillRect((i*73)%W,(i*47)%H,1,1);}
        const cp=Math.min(1,clearTimer/30);
        ctx.globalAlpha=cp;
        ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(W/2-20,H/2-10,8+Math.sin(clearTimer*.08)*2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(W/2+20,H/2-10,8+Math.sin(clearTimer*.08+1)*2,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
        txo('STAGE '+stage+' CLEAR!',W/2,H/2-26,'#ffe840',11,undefined,cp);
        txo('SCORE '+score,W/2,H/2,'#ffff44',8,undefined,cp);
        if(clearTimer>60&&Math.floor(clearTimer/25)%2===0)
            txo(stage<2?'タップで次のステージへ':'全ステージ制覇！',W/2,H/2+22,'#44ff88',7);
        ctx.restore();return;
    }

    // Splash（ロゴはuicの高解像度キャンバスに描画→pixelated不使用）
    if(gs==='splash'){
        ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
        const fade=splashTimer<30?splashTimer/30:splashTimer>130?Math.max(0,1-(splashTimer-130)/30):1;
        if(logoImg.complete&&logoImg.naturalWidth>0){
            const lw=200*uRatio;
            const lh=lw*(logoImg.naturalHeight/logoImg.naturalWidth);
            utx.globalAlpha=fade;
            utx.drawImage(logoImg,(uic.width-lw)/2,(uic.height-lh)/2,lw,lh);
            utx.globalAlpha=1;
        }else{
            txo('内無双GAMES',W/2,H/2,'#ffffff',12,undefined,fade);
        }
        ctx.restore();return;
    }

    if(stage===1)drawBg();else drawBg2();

    // Platforms
    drawPlatforms();

    // Items
    items.forEach(it=>{const ix=it.sx-scroll;if(ix<-10||ix>W+10)return;drawItem(it);});

    // Arrows
    arrows.forEach(ar=>{
        const ax=Math.floor(ar.sx-scroll);
        ctx.fillStyle='#c8a040';
        px(ax,Math.floor(ar.sy),6,1);
        ctx.fillStyle='#e0c060';
        px(ar.vx>0?ax+5:ax,Math.floor(ar.sy)-1,2,3);
    });

    // Enemies
    enemies.forEach(en=>{
        if(en.dead&&en.fr>20)return;
        const ex=en.sx-scroll;if(ex<-20||ex>W+20)return;
        if(en.type==='goblin')drawGoblin(en);
        else if(en.type==='skeleton')drawSkeleton(en);
    });

    // Boss
    if(boss&&!bossDefeated){
        const bx=boss.sx-scroll;if(bx>-30&&bx<W+30)drawBoss(boss);
    }

    // 飛び道具描画
    orbs.forEach(ob=>{
        const ox=Math.floor(ob.sx-scroll),oy=Math.floor(ob.sy);
        ctx.globalAlpha=1;
        if(ob.type==='dark'){
            ctx.globalAlpha=.85+Math.sin(gTick*.15)*.15;
            ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(ox+3,oy+3,4,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=.3;ctx.fillStyle='#cc88ff';ctx.beginPath();ctx.arc(ox+3,oy+3,7,0,Math.PI*2);ctx.fill();
        }else if(ob.type==='fire'||ob.type==='flame'){
            const f=.7+Math.sin(gTick*.2)*.3;
            ctx.globalAlpha=f*(ob.type==='flame'?.8:1);
            ctx.fillStyle='#ff8820';ctx.beginPath();ctx.arc(ox+3,oy+3,ob.type==='flame'?3:4,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#ffee44';ctx.beginPath();ctx.arc(ox+3,oy+3,ob.type==='flame'?1.5:2,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=.2;ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(ox+3,oy+3,6,0,Math.PI*2);ctx.fill();
        }else if(ob.type==='arrow'){
            ctx.fillStyle='#44cc44';px(ox,oy+2,10,2);
            ctx.fillStyle='#ccee88';px(ob.vx>0?ox+8:ox,oy+1,3,4);
            ctx.fillStyle='#886622';px(ob.vx>0?ox:ox+6,oy+2,4,2);
        }else if(ob.type==='shock'){
            const sw=6+ob.life*.5;
            ctx.globalAlpha=.8-ob.life/70*.5;
            ctx.fillStyle='#ffee44';ctx.fillRect(ox-sw/2,oy,sw,5);
            ctx.globalAlpha=.3;ctx.fillStyle='#ffffff';ctx.fillRect(ox-sw/2-2,oy-1,sw+4,7);
        }else if(ob.type==='bounce'){
            ctx.fillStyle='#44aaff';ctx.beginPath();ctx.arc(ox+4,oy+4,5,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=.5;ctx.fillStyle='#88ddff';ctx.beginPath();ctx.arc(ox+3,oy+3,3,0,Math.PI*2);ctx.fill();
        }
        ctx.globalAlpha=1;
    });

    // Player
    const drawFns=[drawHero,drawDemonLord,drawMage,drawElf,drawDragon,drawGoblinPC,drawGolem,drawSlime];
    drawFns[selectedChar](P.x,P.y);

    // Particles
    parts.forEach(p=>{
        ctx.globalAlpha=Math.max(0,1-p.life/p.maxLife)*.9;
        ctx.fillStyle=p.col;ctx.fillRect(Math.floor(p.x),Math.floor(p.y),2,2);
    });
    ctx.globalAlpha=1;

    // Buttons
    if(gs==='playing'){
        const bDefs=[
            {b:BTN.L,lbl:'◀',on:keys.L},{b:BTN.R,lbl:'▶',on:keys.R},
            {b:BTN.J,lbl:'↑',on:tids.J!==null},{b:BTN.A,lbl:'⚔',on:P.atk>0}
        ];
        bDefs.forEach(({b,lbl,on})=>{
            ctx.globalAlpha=on?.52:.22;
            ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=on?.7:.4;
            ctx.strokeStyle='#ffffff';ctx.lineWidth=1;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();
            ctx.globalAlpha=1;
            txo(lbl,b.x,b.y+3.5,'#111111',7);
        });
    }

    // HUD
    if(gs==='playing'){
        ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,13);
        txo('HP',9,9,'#ffffff',5.5,'left');
        for(let i=0;i<P.mhp;i++)txo(i<P.hp?'♥':'♡',22+i*10,9,i<P.hp?'#ff3355':'#553344',6);
        txo('SCORE '+score,W-4,9,'#ffee44',6,'right');
        // Boss approach warning
        const dist=BOSS_TRIGGER-scroll;
        if(dist>0&&dist<600&&!bossActive){
            const wa=Math.min(1,Math.sin(gTick*.15+1)*.5+.5);
            txo('！ボスが近い！',W/2,H/2-20,'#ff4444',7,undefined,wa);
        }
        if(bossDefeated&&Math.floor(gTick/30)%2===0)
            txo('ボス討伐！ステージクリア！',W/2,H/2-20,'#ffe840',7);
    }

    // Flash
    if(flash>0){ctx.globalAlpha=(flash/14)*.4;ctx.fillStyle='#ff0000';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;flash--;}
    ctx.restore();

    // Start screen
    if(gs==='start'){
        ctx.fillStyle='rgba(0,0,5,.9)';ctx.fillRect(0,0,W,H);
        // Stars
        for(let i=0;i<40;i++){
            ctx.fillStyle=`rgba(255,255,255,${.2+Math.sin(gTick*.03+i)*.15})`;
            ctx.fillRect((i*73+11)%W,(i*47+7)%70,1,1);
        }
        // Orbs
        const pulse=Math.sin(gTick*.06)*.15;
        ctx.globalAlpha=.75+pulse;
        ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(W/2-28,H/2-8,10,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(W/2+28,H/2-8,10,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=.18+pulse*.5;
        ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(W/2-28,H/2-8,18,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(W/2+28,H/2-8,18,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
        txo('LIGHT',W/2-28,H/2-8+4,'#ffe840',8);
        txo('DARK',W/2+28,H/2-8+4,'#cc88ff',8);
        txo('&',W/2,H/2-8+4,'#ffffff',7);
        txo('ORB',W/2,H/2+14,'#ffffff',14);
        // ===== カルーセル式キャラ選択 =====
        drawCarousel();
        if(best>0)txo('ベスト: '+best+' pt',W/2,H-4,'#ffaa44',5.5);
    }

    // Gameover screen
    if(gs==='gameover'){
        ctx.fillStyle='rgba(0,0,0,.92)';ctx.fillRect(0,0,W,H);
        ctx.strokeStyle='#ff3333';ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(W/2-14,H/2-55);ctx.lineTo(W/2+14,H/2-35);ctx.stroke();
        ctx.beginPath();ctx.moveTo(W/2+14,H/2-55);ctx.lineTo(W/2-14,H/2-35);ctx.stroke();
        txo('GAME OVER',W/2,H/2-16,'#ff4444',11);
        txo('スコア: '+score,W/2,H/2+6,'#ffff44',8);
        txo('ベスト: '+best,W/2,H/2+22,'#ffaa44',7);
        if(Math.floor(gTick/28)%2===0)txo('タップでリトライ',W/2,H/2+44,'#44ff44',7);
    }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>

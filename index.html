'use strict';
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const uic=document.getElementById('uic'),utx=uic.getContext('2d');
const logoImg=document.getElementById('logoImg');

const H=180; // 論理高さ固定
let W=320,GY=H-30,SC=1;
let uRatio=1;

const BTN={
    L:{x:22,y:H-22,r:15},
    R:{x:56,y:H-22,r:15},
    J:{x:W-22,y:H-22,r:15},
    A:{x:W-58,y:H-22,r:15},
    S:{x:W-94,y:H-22,r:15}
};
function updateBTN(){BTN.J.x=W-22;BTN.A.x=W-58;BTN.S.x=W-94;}

function resize(){
    const sw=innerWidth,sh=innerHeight;
    uRatio=devicePixelRatio||1;
    if(sh>sw){
        // 縦向き：90°回転してランドスケープ表示
        SC=sw/H;
        W=sh/SC|0;
        GY=H-30;
        cv.width=sh;cv.height=sw;
        cv.style.cssText=`position:absolute;left:${sw}px;top:0;transform:rotate(90deg);transform-origin:top left;`;
        uic.width=sh*uRatio|0;uic.height=sw*uRatio|0;
        uic.style.cssText=`position:absolute;left:${sw}px;top:0;transform:rotate(90deg);transform-origin:top left;`;
    }else{
        // 横向き：通常
        SC=sh/H;
        W=sw/SC|0;
        GY=H-30;
        cv.width=sw;cv.height=sh;
        cv.style.cssText='position:absolute;left:0;top:0;';
        uic.width=sw*uRatio|0;uic.height=sh*uRatio|0;
        uic.style.cssText='position:absolute;left:0;top:0;';
    }
    updateBTN();
}
window.addEventListener('resize',resize);
resize();

// ===== AUDIO =====
let _ac=null,_sfxGain=null;
function getAC(){
    try{
        if(!_ac||_ac.state==='closed'){_ac=new(AudioContext||webkitAudioContext)();_sfxGain=null;}
        if(_ac.state==='suspended')_ac.resume();
        if(!_sfxGain){_sfxGain=_ac.createGain();_sfxGain.gain.value=0.42;_sfxGain.connect(_ac.destination);}
        return _ac;
    }catch(e){return null;}
}
function getSfxDst(){return _sfxGain||(_ac&&_ac.destination)||null;}
function snd(f,d,v){
    const ac=getAC(),dst=getSfxDst();if(!ac||!dst)return;
    try{
        const now=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(dst);
        o.frequency.value=f;
        g.gain.setValueAtTime(.1*(v!==undefined?v:1),now);
        g.gain.exponentialRampToValueAtTime(.001,now+d);
        o.start(now);o.stop(now+d);
    }catch(e){}
}
function mkNoise(ac,dur){
    try{const sr=ac.sampleRate,len=Math.ceil(sr*dur),buf=ac.createBuffer(1,len,sr),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;return buf;}catch(e){return null;}
}
function sfx(type){
    const ac=getAC(),dst=getSfxDst();if(!ac||!dst)return;
    try{
        const now=ac.currentTime;
        if(type==='swing'){
            const o=ac.createOscillator();o.type='sawtooth';
            const g=ac.createGain();o.connect(g);g.connect(dst);
            o.frequency.setValueAtTime(420,now);o.frequency.exponentialRampToValueAtTime(130,now+.1);
            g.gain.setValueAtTime(.07,now);g.gain.exponentialRampToValueAtTime(.001,now+.12);
            o.start(now);o.stop(now+.12);
        }else if(type==='jump'){
            const o=ac.createOscillator();o.type='square';
            const g=ac.createGain();o.connect(g);g.connect(dst);
            o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(420,now+.1);
            g.gain.setValueAtTime(.055,now);g.gain.exponentialRampToValueAtTime(.001,now+.13);
            o.start(now);o.stop(now+.13);
        }else if(type==='hit'){
            const nb=mkNoise(ac,.15);if(!nb)return;
            const src=ac.createBufferSource();src.buffer=nb;
            const flt=ac.createBiquadFilter();flt.type='lowpass';flt.frequency.value=600;
            const g=ac.createGain();g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);
            src.connect(flt);flt.connect(g);g.connect(dst);src.start(now);src.stop(now+.18);
            const o=ac.createOscillator();o.type='sine';
            o.frequency.setValueAtTime(160,now);o.frequency.exponentialRampToValueAtTime(50,now+.13);
            const g2=ac.createGain();g2.gain.setValueAtTime(.25,now);g2.gain.exponentialRampToValueAtTime(.001,now+.14);
            o.connect(g2);g2.connect(dst);o.start(now);o.stop(now+.15);
        }else if(type==='kill'){
            [392,523,659].forEach((freq,i)=>{
                const o=ac.createOscillator();o.type='square';o.frequency.value=freq;
                const g=ac.createGain(),t0=now+i*.06;
                g.gain.setValueAtTime(0,t0);g.gain.setValueAtTime(.065,t0+.01);g.gain.exponentialRampToValueAtTime(.001,t0+.1);
                o.connect(g);g.connect(dst);o.start(t0);o.stop(t0+.12);
            });
        }else if(type==='coin'){
            [659,784].forEach((freq,i)=>{
                const o=ac.createOscillator();o.type='sine';o.frequency.value=freq;
                const g=ac.createGain(),t0=now+i*.07;
                g.gain.setValueAtTime(0,t0);g.gain.setValueAtTime(.08,t0+.01);g.gain.exponentialRampToValueAtTime(.001,t0+.1);
                o.connect(g);g.connect(dst);o.start(t0);o.stop(t0+.12);
            });
        }else if(type==='darkorb'){
            const o=ac.createOscillator();o.type='sawtooth';
            const g=ac.createGain();o.connect(g);g.connect(dst);
            o.frequency.setValueAtTime(180,now);o.frequency.exponentialRampToValueAtTime(80,now+.15);
            g.gain.setValueAtTime(.07,now);g.gain.exponentialRampToValueAtTime(.001,now+.18);
            o.start(now);o.stop(now+.18);
        }
    }catch(e){}
}

// ===== BGM =====
let bgmAc=null,bgmGain=null,bgmSeq=null;
const N={
    // 音名→周波数マップ
    C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,
    C5:523,D5:587,E5:659,F5:698,G5:784,A5:880,B5:988,
    _:0 // 休符
};
// Stage1: 明るいファンタジー冒険
const BGM1=[[N.E5,.15],[N._,.05],[N.G5,.15],[N.A5,.2],[N._,.1],[N.G5,.15],[N.E5,.15],[N.D5,.3],[N._,.2],
    [N.C5,.15],[N.E5,.15],[N.G5,.15],[N.E5,.3],[N._,.2],[N.D5,.15],[N.C5,.15],[N.D5,.4],[N._,.3],
    [N.A4,.15],[N.C5,.15],[N.E5,.15],[N.G5,.3],[N._,.15],[N.E5,.15],[N.D5,.15],[N.C5,.4],[N._,.3],
    [N.G4,.2],[N.A4,.2],[N.C5,.2],[N.E5,.4],[N.D5,.2],[N.C5,.2],[N.D5,.6],[N._,.4]];
// Stage2: 洞窟・ダンジョン（短調）
const BGM2=[[N.A4,.2],[N._,.1],[N.G4,.15],[N.A4,.2],[N._,.15],[N.F4,.15],[N.G4,.3],[N._,.2],
    [N.E4,.15],[N.F4,.15],[N.E4,.2],[N.D4,.2],[N._,.2],[N.E4,.15],[N.D4,.15],[N.C4,.4],[N._,.3],
    [N.A4,.15],[N._,.1],[N.A4,.15],[N.B4,.15],[N.A4,.2],[N._,.15],[N.G4,.2],[N.A4,.35],[N._,.3],
    [N.F4,.2],[N.E4,.2],[N.D4,.2],[N.E4,.4],[N.D4,.2],[N.C4,.2],[N.A4,.6],[N._,.4]];

// ===== CAROUSEL CHAR SELECT =====
function drawCharPreview(idx,cx,cy,scale){
    ctx.save();
    ctx.translate(cx,cy);
    ctx.scale(scale,scale);
    // 実際のdraw関数を流用（P.invなどは一時的に退避）
    const si=P.inv,sa=P.atk,sc=P.atkCd,sd=P.dir,sf=P.fr,sg=P.onG,svx=P.vx;
    P.inv=0;P.atk=0;P.atkCd=0;P.dir=1;P.fr=8;P.onG=true;P.vx=0;
    const drawFnsP=[drawHero,drawDemonLord,drawMage,drawElf,drawDragon,drawGoblinPC,drawGolem,drawSlime];
    drawFnsP[idx](-7,-5);
    P.inv=si;P.atk=sa;P.atkCd=sc;P.dir=sd;P.fr=sf;P.onG=sg;P.vx=svx;
    ctx.restore();
}

function drawGrid(){
    const GTOP=42,ROWS=4,COLS=2,GAP=6,PAD=4;
    const rowH=(158-GTOP)/ROWS;
    const colW=(W-PAD*2-GAP)/COLS;
    CHARS.forEach((ch,i)=>{
        const col=i%COLS,row=Math.floor(i/COLS);
        const cx=PAD+col*(colW+GAP),cy=GTOP+row*rowH;
        const sel=i===selectedChar;
        // セル背景
        ctx.globalAlpha=sel?0.22:0.06;
        ctx.fillStyle=sel?ch.col:'#ffffff';
        ctx.fillRect(cx,cy+1,colW,rowH-2);
        ctx.globalAlpha=1;
        if(sel){
            ctx.strokeStyle=ch.col;ctx.lineWidth=1.5;
            ctx.strokeRect(cx,cy+1,colW,rowH-2);
            ctx.globalAlpha=0.1+Math.sin(gTick*.09)*.06;
            ctx.fillStyle=ch.col;ctx.fillRect(cx,cy+1,colW,rowH-2);
            ctx.globalAlpha=1;
        }
        // キャラプレビュー
        drawCharPreview(i,cx+14,cy+rowH/2,0.62);
        // テキスト
        const tx=cx+29;
        txo(ch.name,tx,cy+rowH/2-3,sel?ch.col:'#cccccc',6,'left');
        txo(ch.desc,tx,cy+rowH/2+6,'#888888',4,'left');
        // HPドット
        for(let j=0;j<ch.mhp;j++){
            ctx.fillStyle=j<4?'#44ff44':'#ffaa00';
            ctx.globalAlpha=sel?0.85:0.3;
            ctx.fillRect(tx+j*5,cy+rowH-7,4,3);
        }
        ctx.globalAlpha=1;
    });
    if(Math.floor(gTick/28)%2===0)
        txo('タップで選択  もう一度でSTART',W/2,H-4,'#44ff88',5);
}

function startBgm(st){
    stopBgm();
    try{
        bgmAc=new(AudioContext||webkitAudioContext)();
        bgmGain=bgmAc.createGain();bgmGain.gain.value=0.14;bgmGain.connect(bgmAc.destination);
        const seq=st===2?BGM2:BGM1;
        let idx=0,time=bgmAc.currentTime+.05;
        function sched(){
            while(time<bgmAc.currentTime+.6){
                const[f,d]=seq[idx%seq.length];
                if(f>0){
                    const o=bgmAc.createOscillator();o.type='square';o.frequency.value=f;
                    const g=bgmAc.createGain();
                    g.gain.setValueAtTime(0,time);g.gain.setValueAtTime(.4,time+.01);
                    g.gain.setValueAtTime(.4,time+d*.65);g.gain.exponentialRampToValueAtTime(.001,time+d*.9);
                    o.connect(g);g.connect(bgmGain);o.start(time);o.stop(time+d);
                }
                time+=d;idx++;
            }
            bgmSeq=setTimeout(sched,200);
        }
        sched();
    }catch(e){}
}
function stopBgm(){
    clearTimeout(bgmSeq);bgmSeq=null;
    try{if(bgmAc)bgmAc.close();}catch(e){}
    bgmAc=null;bgmGain=null;
}

// ===== HELPERS =====
function px(x,y,w,h){ctx.fillRect(Math.floor(x),Math.floor(y),w,h);}
function txo(s,x,y,c,sz,al,alpha){
    const prev=utx.globalAlpha;
    if(alpha!==undefined)utx.globalAlpha=alpha;
    const ux=x*SC*uRatio,uy=y*SC*uRatio,usz=sz*SC*uRatio;
    utx.font=`bold ${usz}px -apple-system,'Hiragino Sans','Noto Sans JP',Arial,sans-serif`;
    utx.textAlign=al||'center';
    utx.fillStyle='rgba(0,0,0,.95)';
    for(const[ox,oy]of[[-2,0],[2,0],[0,-2],[0,2],[-1,-2],[1,-2],[-1,2],[1,2]])
        utx.fillText(s,ux+ox,uy+oy);
    utx.fillStyle=c;utx.fillText(s,ux,uy);
    utx.globalAlpha=prev;
}

// ===== PARTICLES =====
let parts=[];
function spark(x,y,col,n){
    for(let i=0;i<n;i++)parts.push({
        x,y,col,
        vx:(Math.random()-.5)*3.5,
        vy:(Math.random()-.5)*3.5-1,
        life:0,maxLife:16+Math.random()*12
    });
}

// ===== STATE =====
let gs='splash',gTick=0,t=0;
let splashTimer=0,clearTimer=0;
let scroll=0,stage=1,score=0;
let best=parseInt(localStorage.getItem('ldo_best')||'0');
let shake=0,flash=0;
let skillLv=0,skillExp=0,skillCd=0,pwrupSpawnCd=220;
let selectedChar=0;
let orbs=[]; // プレイヤー飛び道具（type:'dark'|'fire'）

// 全キャラ定義 spd=移動速度 jmp=ジャンプ力 gr=重力倍率 dj=二段ジャンプ
const CHARS=[
    {name:'勇者',    desc:'剣・二段ジャンプ', col:'#ffe840', mhp:5, locked:false, spd:1.8, jmp:5.8, gr:1.0,  dj:true},
    {name:'魔王',    desc:'闇魔法・浮遊',     col:'#8822ff', mhp:4, locked:false, spd:1.5, jmp:4.2, gr:0.55, dj:false},
    {name:'魔法使い',desc:'炎魔法・遠距離',   col:'#ff8820', mhp:3, locked:false, spd:1.7, jmp:5.5, gr:1.0,  dj:false},
    {name:'エルフ',  desc:'弓・高ジャンプ',   col:'#44ff88', mhp:4, locked:false, spd:2.2, jmp:7.0, gr:1.0,  dj:true},
    {name:'ドラゴン',desc:'炎ブレス・飛行',   col:'#ff4420', mhp:6, locked:false, spd:1.6, jmp:5.2, gr:0.65, dj:true},
    {name:'ゴブリン',desc:'素早い・ダッシュ', col:'#60cc30', mhp:3, locked:false, spd:2.8, jmp:5.0, gr:1.0,  dj:false},
    {name:'ゴーレム',desc:'超耐久・衝撃波',   col:'#b0b8c0', mhp:8, locked:false, spd:1.0, jmp:4.5, gr:1.3,  dj:false},
    {name:'スライム',desc:'バウンド・変形',    col:'#44aaff', mhp:4, locked:false, spd:1.9, jmp:6.2, gr:0.85, dj:true},
];

// ===== PLAYER =====
const GR=0.42,JMP=5.8,PW=14,PH=22;
let P={x:60,y:GY-PH,w:PW,h:PH,vx:0,vy:0,onG:false,dj:false,hp:5,mhp:5,inv:0,fr:0,dir:1,atk:0,atkCd:0};

// ===== ENEMIES / OBJECTS =====
let enemies=[],items=[],arrows=[],platforms=[];
let spawnCd=60,platSpawnCd=120;
let boss=null,bossActive=false,bossDefeated=false;
const BOSS_TRIGGER=2800; // scrollがこの値を超えたらボス出現

// ===== CONTROLS =====
let keys={L:false,R:false,J:false,A:false};
let tids={L:null,R:null,J:null,A:null,S:null};

function inBtn(cx,cy,b){return Math.hypot(cx-b.x,cy-b.y)<b.r;}
function cvCoords(cx,cy){
    if(innerHeight>innerWidth){return[cy/SC,(innerWidth-cx)/SC];}
    return[cx/SC,cy/SC];
}

cv.addEventListener('touchstart',e=>{
    e.preventDefault();getAC();
    for(const tc of e.changedTouches){
        const[x,y]=cvCoords(tc.clientX,tc.clientY);
        if(gs==='start'){inp(x,y);continue;}
        if(gs==='stageclear'||gs==='gameover'){inp(x,y);continue;}
        if(inBtn(x,y,BTN.L)){keys.L=true;tids.L=tc.identifier;}
        else if(inBtn(x,y,BTN.R)){keys.R=true;tids.R=tc.identifier;}
        else if(inBtn(x,y,BTN.J)){tids.J=tc.identifier;doJump();}
        else if(inBtn(x,y,BTN.A)){tids.A=tc.identifier;doAtk();}
        else if(inBtn(x,y,BTN.S)){tids.S=tc.identifier;doSkill();}
    }
},{passive:false});
cv.addEventListener('touchend',e=>{
    for(const tc of e.changedTouches){
        if(tc.identifier===tids.L){keys.L=false;tids.L=null;}
        if(tc.identifier===tids.R){keys.R=false;tids.R=null;}
        if(tc.identifier===tids.J)tids.J=null;
        if(tc.identifier===tids.A)tids.A=null;
        if(tc.identifier===tids.S)tids.S=null;
    }
},{passive:true});
cv.addEventListener('touchcancel',()=>{keys.L=keys.R=false;Object.keys(tids).forEach(k=>tids[k]=null);},{passive:true});
document.addEventListener('keydown',e=>{
    getAC();
    if(gs==='start'){
        if(e.key==='ArrowLeft'&&selectedChar%2===1){selectedChar--;return;}
        if(e.key==='ArrowRight'&&selectedChar%2===0&&selectedChar+1<CHARS.length){selectedChar++;return;}
        if(e.key==='ArrowUp'&&selectedChar>=2){selectedChar-=2;return;}
        if(e.key==='ArrowDown'&&selectedChar+2<CHARS.length){selectedChar+=2;return;}
        if(e.key==='Enter'){if(!CHARS[selectedChar].locked){gs='playing';resetGame();}return;}
        return;
    }
    if(e.key==='ArrowLeft')keys.L=true;
    if(e.key==='ArrowRight')keys.R=true;
    if(e.key==='ArrowUp'||e.key===' ')doJump();
    if(e.key==='z'||e.key==='Z'||e.key==='x'||e.key==='X')doAtk();
    if(e.key==='c'||e.key==='C')doSkill();
    if(gs!=='playing')inp();
});
document.addEventListener('keyup',e=>{
    if(e.key==='ArrowLeft')keys.L=false;
    if(e.key==='ArrowRight')keys.R=false;
});

function doJump(){
    if(gs!=='playing')return;
    const cj=CHARS[selectedChar].jmp;
    if(P.onG){P.vy=-cj;P.onG=false;P.dj=false;sfx('jump');}
    else if(!P.dj&&CHARS[selectedChar].dj){P.vy=-cj*.82;P.dj=true;sfx('jump');}
}
function doAtk(){
    if(gs!=='playing'||P.atkCd>0)return;
    const ox=P.x+(P.dir>0?P.w:0);
    if(selectedChar===0){P.atk=14;P.atkCd=22;sfx('swing');}
    else if(selectedChar===1){
        orbs.push({sx:ox,sy:P.y+8,vx:P.dir*4.2,vy:0,life:0,maxLife:60,type:'dark'});
        P.atkCd=25;sfx('darkorb');
    }else if(selectedChar===2){
        orbs.push({sx:ox,sy:P.y+6,vx:P.dir*5.5,vy:0,life:0,maxLife:50,type:'fire'});
        P.atkCd=18;sfx('darkorb');
    }else if(selectedChar===3){// エルフ：高速の矢
        orbs.push({sx:ox,sy:P.y+5,vx:P.dir*8,vy:0,life:0,maxLife:50,type:'arrow'});
        P.atkCd=20;sfx('swing');
    }else if(selectedChar===4){// ドラゴン：炎ブレス3方向
        for(let i=0;i<3;i++){
            orbs.push({sx:ox,sy:P.y+9,vx:P.dir*(2.5+i*1.8),vy:(i-1)*.9,life:0,maxLife:38,type:'flame'});
        }
        P.atkCd=35;sfx('darkorb');
    }else if(selectedChar===5){// ゴブリン：ダッシュ斬り
        P.atk=22;P.atkCd=30;P.vx=P.dir*5;sfx('swing');
    }else if(selectedChar===6){// ゴーレム：地面衝撃波
        orbs.push({sx:ox,sy:GY-5,vx:P.dir*2.5,vy:0,life:0,maxLife:70,type:'shock'});
        P.atkCd=50;sfx('darkorb');
    }else if(selectedChar===7){// スライム：バウンド弾
        orbs.push({sx:ox,sy:P.y+8,vx:P.dir*3.8,vy:-3.5,life:0,maxLife:80,type:'bounce'});
        P.atkCd=22;sfx('jump');
    }
}
function gainSkillExp(){
    if(skillLv>=3){score+=100;return;}
    skillExp++;
    if(skillExp>=3){
        skillLv++;skillExp=0;
        spark(P.x+P.w/2,P.y+P.h/2,'#ffe840',24);
        spark(P.x+P.w/2,P.y+P.h/2,'#ff8800',16);
        snd(880,.35);flash=8;
    }
}
function doSkill(){
    if(gs!=='playing'||skillLv<1||skillCd>0)return;
    skillCd=180;
    const ox=P.x+(P.dir>0?P.w:0);
    const oy=P.y+P.h/2;
    if(skillLv===1){
        orbs.push({sx:ox,sy:oy,vx:P.dir*7,vy:0,life:0,maxLife:90,type:'skill',dmg:3,lv:1});
        snd(440,.25);
    }else if(skillLv===2){
        orbs.push({sx:ox,sy:oy,vx:P.dir*7,vy:0,life:0,maxLife:90,type:'skill',dmg:4,lv:2});
        orbs.push({sx:ox,sy:oy,vx:P.dir*6,vy:-2.5,life:0,maxLife:70,type:'skill',dmg:4,lv:2});

function inp(cx,cy){
    if(gs==='splash'){splashTimer=200;return;}
    if(gs==='start'){
        if(cx!==undefined){
            const GTOP=42,rowH=(158-42)/4;
            const col=cx<W/2?0:1;
            const row=Math.floor((cy-GTOP)/rowH);
            const idx=row*2+col;
            if(idx>=0&&idx<CHARS.length&&cy>=GTOP&&row<4){
                if(idx===selectedChar){if(!CHARS[idx].locked){gs='playing';resetGame();}}
                else{selectedChar=idx;}
            }
        }else{
            if(!CHARS[selectedChar].locked){gs='playing';resetGame();}
        }
        return;
    }
    if(gs==='stageclear'){if(clearTimer>60){if(stage>=2){if(score>best){best=score;localStorage.setItem('ldo_best',best);}location.reload();}else{stage++;gs='playing';resetGame();}}return;}
    if(gs==='gameover'){location.reload();}
}

// ===== PIXEL ART SPRITE HELPER =====
function sprDraw(bx,by,rows,pal,flip,ps){
    ps=ps||1;
    const w=rows[0].length,h=rows.length;
    for(let r=0;r<h;r++){
        for(let c=0;c<w;c++){
            const col=pal[rows[r][flip?w-1-c:c]];
            if(col){ctx.fillStyle=col;ctx.fillRect(bx+c*ps,by+r*ps,ps,ps);}
        }
    }
}

function drawItem(it){
    const x=Math.floor(it.sx-scroll),y=Math.floor(it.y);
    const bl=Math.floor(gTick/8)%2===0;
    if(it.type==='heart'){
        ctx.fillStyle='#ff2244';
        px(x,y+1,2,2);px(x+3,y+1,2,2);px(x,y+2,6,3);px(x+1,y+5,4,1);px(x+2,y+6,2,1);
        if(bl){ctx.fillStyle='#ff88aa';px(x+1,y+1,1,1);}
    }else if(it.type==='coin'){
        ctx.fillStyle='#e8c020';
        ctx.beginPath();ctx.arc(x+4,y+4,4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#f8e840';px(x+3,y+2,2,1);
        if(bl){ctx.fillStyle='#fff080';px(x+2,y+3,2,1);}
    }else if(it.type==='orbfrag'){
        const pulse=.7+Math.sin(gTick*.1)*.3;
        ctx.globalAlpha=pulse;
        ctx.fillStyle='#ffe840';
        ctx.beginPath();ctx.arc(x+5,y+5,5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8822ff';
        ctx.beginPath();ctx.arc(x+5,y+5,3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffffff';px(x+4,y+4,2,2);
        ctx.globalAlpha=.2*pulse;ctx.fillStyle='#ffe840';
        ctx.beginPath();ctx.arc(x+5,y+5,9,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
    }else if(it.type==='pwrup'){
        // 5角星パワーアップアイテム
        const cx=x+6,cy=it.y+6;
        const pulse=.8+Math.sin(gTick*.14)*.2;
        ctx.globalAlpha=.22*pulse;ctx.fillStyle='#ff8800';
        ctx.beginPath();ctx.arc(cx,cy,11,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=pulse;
        ctx.fillStyle='#ffe840';ctx.beginPath();
        for(let i=0;i<10;i++){
            const a=i*Math.PI/5-Math.PI/2;
            const r=i%2===0?7:3;
            if(i===0)ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
            else ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
        }
        ctx.closePath();ctx.fill();
        ctx.globalAlpha=.6*pulse;ctx.fillStyle='#ffffff';
        ctx.beginPath();
        for(let i=0;i<10;i++){
            const a=i*Math.PI/5-Math.PI/2;
            const r=i%2===0?5:2;
            if(i===0)ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
            else ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
        }
        ctx.closePath();ctx.fill();
        ctx.globalAlpha=1;
    }
}

        const rx=((i*90+20-scroll*.05+3000)%3000)-60;

    }

    ctx.fillStyle='#2a1840';

        const sx=((i*120+15-scroll*.4+4000)%4000)-20;
        const sh=12+i%3*8;

    ctx.fillStyle='#281638';
    for(let i=0;i<7;i++){

        ctx.globalAlpha=.15*flicker;ctx.fillStyle='#ffaa40';
        ctx.beginPath();ctx.arc(tx,GY-20,16,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
        // 松明本体
        ctx.fillStyle='#5a3010';ctx.fillRect(tx-2,GY-26,4,10);
        ctx.fillStyle=`rgba(255,${120+flicker*80|0},20,${.8+flicker*.2})`;
        ctx.beginPath();ctx.arc(tx,GY-26,3,0,Math.PI*2);ctx.fill();
    }

    // 地面（石畳）
    ctx.fillStyle='#383048';px(0,GY,W,5);
    ctx.fillStyle='#2a2438';px(0,GY+2,W,2);
    ctx.fillStyle='#1e1830';px(0,GY+5,W,H-GY-5);
    ctx.fillStyle='#302848';
    for(let i=0;i<14;i++){
        const tx=((i*30-scroll*.5+2000)%2000);
        ctx.fillRect(tx,GY+6,28,1);ctx.fillRect(tx+15,GY+12,20,1);
    }
}

// ===== DRAW PLATFORMS =====
function drawPlatforms(){
    platforms.forEach(pl=>{
        const px_=Math.floor(pl.sx-scroll);
        if(px_<-60||px_>W+10)return;
        ctx.fillStyle=pl.stone?'#788090':'#8b6040';
        ctx.fillRect(px_,Math.floor(pl.y),pl.w,pl.h);
        ctx.fillStyle=pl.stone?'#909aac':'#a07848';
        ctx.fillRect(px_,Math.floor(pl.y),pl.w,2);
        ctx.fillStyle=pl.stone?'#5a6070':'#6a4828';
        ctx.fillRect(px_,Math.floor(pl.y+pl.h-1),pl.w,1);
        if(!pl.stone){
            ctx.fillStyle='#7a5030';
            for(let i=0;i<Math.floor(pl.w/8);i++)ctx.fillRect(px_+i*8+3,Math.floor(pl.y)+1,1,pl.h-1);
        }
    });
}

// ===== UPDATE =====
function update(){
    gTick++;
    if(gs==='splash'){splashTimer++;if(splashTimer>=180)gs='start';return;}
    if(gs==='stageclear'){clearTimer++;return;}
    if(gs!=='playing')return;
    t++;

    // Player move
    const cst=CHARS[selectedChar];
    const spd=cst.spd;
    if(keys.L){P.vx=-spd;P.dir=-1;}
    else if(keys.R){P.vx=spd;P.dir=1;}
    else P.vx*=.65;

    P.vy+=GR*cst.gr;P.vy=Math.min(P.vy,9);
    P.x+=P.vx;P.y+=P.vy;

    // Ground
    if(P.y+P.h>=GY){P.y=GY-P.h;P.vy=0;P.onG=true;P.dj=false;}
    else P.onG=false;

    // Platform collision
    if(!P.onG){
        platforms.forEach(pl=>{
            const px_=pl.sx-scroll;
            if(P.x+P.w>px_&&P.x<px_+pl.w){
                if(P.vy>0&&P.y+P.h<=pl.y+P.vy+4&&P.y+P.h>=pl.y-4){
                    P.y=pl.y-P.h;P.vy=0;P.onG=true;P.dj=false;
                }
            }
        });
    }

    // Bounds
    if(P.x<scroll)P.x=scroll;

    // Camera follow
    const target=P.x-W*.35+P.w/2;
    if(target>scroll)scroll=target;

    P.fr++;P.inv=Math.max(0,P.inv-1);P.atkCd=Math.max(0,P.atkCd-1);
    if(P.atk>0)P.atk--;

    // Attack hit
    if(P.atk>6){
        const aw=21,ax=P.dir>0?P.x+P.w:P.x-aw;
        enemies.forEach(en=>{
            if(en.dead||en.inv>0)return;
            const ex=en.sx;
            if(ax<ex+en.w&&ax+aw>ex&&P.y<en.sy+en.h&&P.y+P.h>en.sy){
                en.hp--;en.inv=20;
                spark(ex+en.w/2,en.sy+en.h/2,'#ffaa44',8);
                snd(260,.08,.6);
                if(en.hp<=0){en.dead=true;sfx('kill');score+=100;spark(ex+5,en.sy+4,'#ff8820',16);
                    if(Math.random()<.4)items.push({sx:en.sx,y:en.sy,w:8,h:8,type:'coin',life:300});}
            }
        });
    }

    // Enemy collision
    if(P.inv<=0){
        enemies.forEach(en=>{
            if(en.dead)return;
            const ex=en.sx;
            if(P.x<ex+en.w&&P.x+P.w>ex&&P.y<en.sy+en.h&&P.y+P.h>en.sy){
                P.hp--;P.inv=55;shake=6;flash=14;sfx('hit');P.vy=-3;
                if(P.hp<=0){if(score>best){best=score;localStorage.setItem('ldo_best',best);}gs='gameover';}
            }
        });
    }

    // Items
    items.forEach(it=>{
        it.life--;
        const ix=it.sx;
        if(P.x<ix+it.w&&P.x+P.w>ix&&P.y<it.y+it.h&&P.y+P.h>it.y){
            it.life=0;
            if(it.type==='heart'){P.hp=Math.min(P.mhp,P.hp+1);spark(ix+4,it.y,'#ff4466',10);snd(660,.15);}
            else if(it.type==='coin'){score+=50;spark(ix+4,it.y,'#ffe840',8);sfx('coin');}
            else if(it.type==='orbfrag'){score+=500;spark(ix+5,it.y,'#ffe840',20);spark(ix+5,it.y,'#8822ff',16);snd(880,.5);}
            else if(it.type==='pwrup'){gainSkillExp();spark(ix+5,it.y,'#ffe840',14);spark(ix+5,it.y,'#ff8800',10);snd(660,.22);}
        }
    });
    items=items.filter(it=>it.life>0&&it.sx>scroll-40);

    // Update enemies
    enemies.forEach(en=>{
        if(en.dead){en.fr++;return;}
        en.fr++;en.inv=Math.max(0,en.inv-1);
        const pdx=(P.x+scroll)-(en.sx+en.w/2);

        if(en.type==='goblin'){
            en.sx+=en.vx;
            if(en.sy+en.h<GY){en.vy+=GR;en.sy+=en.vy;}else{en.sy=GY-en.h;en.vy=0;}
            if(Math.abs(pdx)>4){en.vx=(pdx>0?.55:-.55);en.dir=pdx>0?1:-1;}else en.vx=0;
        }else if(en.type==='skeleton'){
            // Keep distance ~70px, shoot arrow
            const dist=Math.abs(pdx);
            en.dir=pdx>0?1:-1;
            if(dist>80){en.sx+=(pdx>0?.4:-.4);}
            else if(dist<50){en.sx+=(pdx>0?-.3:.3);}
            else en.vx=0;
            if(en.sy+en.h<GY){en.vy+=GR;en.sy+=en.vy;}else{en.sy=GY-en.h;en.vy=0;}
            en.shotCd=Math.max(0,(en.shotCd||80)-1);
            if(en.shotCd<=0&&dist<160){
                en.shotCd=90;
                arrows.push({sx:en.sx+(en.dir>0?en.w:0),sy:en.sy+8,vx:en.dir*3.2,life:0,maxLife:80});
                snd(320,.06,.4);
            }
        }
    });
    enemies=enemies.filter(en=>(!en.dead||en.fr<25)&&en.sx>scroll-100&&en.sx<scroll+W+100);

    // Arrows
    arrows.forEach(ar=>{ar.sx+=ar.vx;ar.life++;});
    if(P.inv<=0){
        arrows.forEach(ar=>{
            const ax=ar.sx;
            if(P.x<ax+4&&P.x+P.w>ax&&P.y<ar.sy+3&&P.y+P.h>ar.sy){
                ar.life=999;
                P.hp--;P.inv=50;shake=5;flash=12;sfx('hit');P.vy=-2;
                if(P.hp<=0){if(score>best){best=score;localStorage.setItem('ldo_best',best);}gs='gameover';}
            }
        });
    }
    arrows=arrows.filter(ar=>ar.life<ar.maxLife&&ar.sx>scroll-20&&ar.sx<scroll+W+20);

    // Boss
    if(scroll>=BOSS_TRIGGER&&!bossActive&&!bossDefeated){
        bossActive=true;
        boss={sx:scroll+W-50,sy:GY-36,w:27,h:36,hp:20,maxHp:20,vx:0,vy:0,dir:-1,fr:0,inv:0,phase:'charge',cd:80};
    }
    if(boss&&!bossDefeated){
        boss.fr++;boss.inv=Math.max(0,boss.inv-1);
        const bdx=(P.x+scroll)-(boss.sx+boss.w/2);
        boss.dir=bdx>0?1:-1;
        boss.cd=Math.max(0,boss.cd-1);
        if(boss.phase==='charge'){
            boss.sx+=(bdx>0?.7:-.7);
            if(boss.sy+boss.h<GY){boss.vy+=GR;boss.sy+=boss.vy;}else{boss.sy=GY-boss.h;boss.vy=0;}
            if(boss.cd<=0){boss.phase='stomp';boss.cd=40;boss.vy=-6;}
        }else if(boss.phase==='stomp'){
            if(boss.sy+boss.h<GY){boss.vy+=GR;boss.sy+=boss.vy;}else{boss.sy=GY-boss.h;boss.vy=0;shake=4;boss.phase='charge';boss.cd=100;}
        }
        // Attack hitbox
        if(P.inv<=0){
            const bx=boss.sx;
            if(P.x<bx+boss.w&&P.x+P.w>bx&&P.y<boss.sy+boss.h&&P.y+P.h>boss.sy){
                P.hp--;P.inv=60;shake=8;flash=18;sfx('hit');P.vy=-4;
                if(P.hp<=0){if(score>best){best=score;localStorage.setItem('ldo_best',best);}gs='gameover';}
            }
        }
        // Player attack on boss
        if(P.atk>6){
            const aw=PW,ax=P.dir>0?P.x+P.w:P.x-aw;
            const bx=boss.sx;
            if(boss.inv<=0&&ax<bx+boss.w&&ax+aw>bx&&P.y<boss.sy+boss.h&&P.y+P.h>boss.sy){
                boss.hp--;boss.inv=16;spark(bx+11,boss.sy+10,'#ffaa44',10);snd(200,.08,.7);
                if(boss.hp<=0){
                    bossDefeated=true;boss=null;
                    score+=1000;spark(scroll+W/2,GY-40,'#ffe840',30);spark(scroll+W/2,GY-40,'#8822ff',30);
                    sfx('kill');snd(880,.5);stopBgm();
                    items.push({sx:scroll+W/2,y:GY-20,w:10,h:10,type:'orbfrag',life:600});
                    gs='stageclear';clearTimer=0;
                }
            }
        }
    }

    // Platforms
    platSpawnCd--;
    if(platSpawnCd<=0&&!bossActive){
        platSpawnCd=140+Math.floor(Math.random()*80);
        const pw=18+Math.floor(Math.random()*22);
        const ph=GY-22-Math.floor(Math.random()*38);
        const stone=Math.random()<.5;
        platforms.push({sx:scroll+W+8,y:ph,w:pw,h:6,stone});
        if(Math.random()<.3)items.push({sx:scroll+W+8+pw/2-4,y:ph-10,w:8,h:8,type:Math.random()<.5?'coin':'heart',life:500});
    }
    platforms=platforms.filter(pl=>pl.sx>scroll-60&&pl.sx<scroll+W+200);

    // Spawn
    if(!bossActive){
        spawnCd--;
        if(spawnCd<=0){
            spawnCd=90+Math.floor(Math.random()*70);
            const useSkele=t>400&&Math.random()<.4;
            if(useSkele){
                enemies.push({sx:scroll+W+10,sy:GY-33,w:18,h:33,hp:3,maxHp:3,vx:0,vy:0,dir:-1,fr:0,inv:0,dead:false,type:'skeleton',shotCd:60});
            }else{
                enemies.push({sx:scroll+W+10,sy:GY-27,w:18,h:27,hp:2,maxHp:2,vx:-.5,vy:0,dir:-1,fr:0,inv:0,dead:false,type:'goblin'});
            }
            if(t>600&&Math.random()<.3)
                items.push({sx:scroll+W+50,y:GY-8,w:8,h:8,type:'heart',life:400});
        }
    }

    // パワーアップアイテムスポーン
    if(!bossActive){
        pwrupSpawnCd--;
        if(pwrupSpawnCd<=0){
            pwrupSpawnCd=200+Math.floor(Math.random()*140);
            const py=GY-10-Math.floor(Math.random()*55);
            items.push({sx:scroll+W+20,y:py,w:12,h:12,type:'pwrup',life:700});
        }
    }

    // 飛び道具update
    orbs.forEach(ob=>{
        ob.sx+=ob.vx;
        if(ob.vy!==0){ob.sy+=ob.vy;}
        if(ob.type==='flame'){ob.vy+=0.25;} // 重力
        if(ob.type==='bounce'){
            ob.vy+=0.3;
            if(ob.sy>=GY-6){ob.sy=GY-6;ob.vy=-Math.abs(ob.vy)*.75;snd(300,.04,.3);}
        }
        ob.life++;
        const osz=ob.lv?12:6;
        enemies.forEach(en=>{
            if(en.dead||en.inv>0)return;
            const ex=en.sx,ox=ob.sx;
            if(ox<ex+en.w&&ox+osz>ex&&ob.sy<en.sy+en.h&&ob.sy+osz>en.sy){
                en.hp-=(ob.dmg||1);en.inv=20;if(!ob.lv)ob.life=999;
                spark(ex+en.w/2,en.sy+en.h/2,'#8822ff',8);snd(180,.08,.6);
                if(en.hp<=0){en.dead=true;sfx('kill');score+=100;spark(ex+5,en.sy+4,'#6600cc',16);}
            }
        });
        if(boss&&!bossDefeated&&boss.inv<=0){
            const bx=boss.sx,ox=ob.sx;
            if(ox<bx+boss.w&&ox+osz>bx&&ob.sy<boss.sy+boss.h&&ob.sy+osz>boss.sy){
                boss.hp-=(ob.dmg||1);boss.inv=16;if(!ob.lv)ob.life=999;
                spark(bx+11,boss.sy+10,'#8822ff',10);snd(180,.08,.7);
                if(boss.hp<=0){
                    bossDefeated=true;boss=null;score+=1000;
                    spark(scroll+W/2,GY-40,'#ffe840',30);spark(scroll+W/2,GY-40,'#8822ff',30);
                    sfx('kill');snd(880,.5);stopBgm();
                    items.push({sx:scroll+W/2,y:GY-20,w:10,h:10,type:'orbfrag',life:600});
                    gs='stageclear';clearTimer=0;
                }
            }
        }
    });
    orbs=orbs.filter(ob=>ob.life<ob.maxLife&&ob.sx>scroll-20&&ob.sx<scroll+W+20);

    // Particles
    parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life++;});
    parts=parts.filter(p=>p.life<p.maxLife);

    if(skillCd>0)skillCd--;
    shake=Math.max(0,shake-1);flash=Math.max(0,flash-1);
    if(t%90===0)score+=stage*5;
}

// ===== DRAW =====
function draw(){
    utx.clearRect(0,0,uic.width,uic.height);
    const sx=Math.round((Math.random()-.5)*shake),sy=Math.round((Math.random()-.5)*shake);
    ctx.save();ctx.scale(SC,SC);ctx.translate(sx,sy);
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

    // Stage Clear
    if(gs==='stageclear'){
        for(let i=0;i<50;i++){ctx.fillStyle=`rgba(255,255,255,${.3+Math.sin(gTick*.04+i)*.2})`;ctx.fillRect((i*73)%W,(i*47)%H,1,1);}
        const cp=Math.min(1,clearTimer/30);
        ctx.globalAlpha=cp;
        ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(W/2-20,H/2-10,8+Math.sin(clearTimer*.08)*2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(W/2+20,H/2-10,8+Math.sin(clearTimer*.08+1)*2,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
        txo('STAGE '+stage+' CLEAR!',W/2,H/2-26,'#ffe840',11,undefined,cp);
        txo('SCORE '+score,W/2,H/2,'#ffff44',8,undefined,cp);
        if(clearTimer>60&&Math.floor(clearTimer/25)%2===0)
            txo(stage<2?'タップで次のステージへ':'全ステージ制覇！',W/2,H/2+22,'#44ff88',7);
        ctx.restore();return;
    }

    // Splash（ロゴはuicの高解像度キャンバスに描画→pixelated不使用）
    if(gs==='splash'){
        ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
        const fade=splashTimer<30?splashTimer/30:splashTimer>130?Math.max(0,1-(splashTimer-130)/30):1;
        if(logoImg.complete&&logoImg.naturalWidth>0){
            ctx.save();
            ctx.globalAlpha=fade;
            ctx.imageSmoothingEnabled=true;
            const lw=W*0.62;
            const lh=lw*(logoImg.naturalHeight/logoImg.naturalWidth);
            ctx.drawImage(logoImg,(W-lw)/2,(H-lh)/2,lw,lh);
            ctx.imageSmoothingEnabled=false;
            ctx.restore();
        }else{
            ctx.save();
            ctx.globalAlpha=fade;
            ctx.fillStyle='#ffffff';
            ctx.textAlign='center';ctx.textBaseline='middle';
            ctx.font='bold 18px sans-serif';
            ctx.fillText('内無双GAMES',W/2,H/2-10);
            ctx.font='11px sans-serif';
            ctx.fillStyle='#aaaacc';
            ctx.fillText('PRESENTS',W/2,H/2+12);
            ctx.restore();
        }
        ctx.restore();return;
    }

    if(stage===1)drawBg();else drawBg2();

    // Platforms
    drawPlatforms();

    // Items
    items.forEach(it=>{const ix=it.sx-scroll;if(ix<-10||ix>W+10)return;drawItem(it);});

    // Arrows
    arrows.forEach(ar=>{
        const ax=Math.floor(ar.sx-scroll);
        ctx.fillStyle='#c8a040';
        px(ax,Math.floor(ar.sy),6,1);
        ctx.fillStyle='#e0c060';
        px(ar.vx>0?ax+5:ax,Math.floor(ar.sy)-1,2,3);
    });

    // Enemies
    enemies.forEach(en=>{
        if(en.dead&&en.fr>20)return;
        const ex=en.sx-scroll;if(ex<-20||ex>W+20)return;
        if(en.type==='goblin')drawGoblin(en);
        else if(en.type==='skeleton')drawSkeleton(en);
    });

    // Boss
    if(boss&&!bossDefeated){
        const bx=boss.sx-scroll;if(bx>-30&&bx<W+30)drawBoss(boss);
    }

    // 飛び道具描画
    orbs.forEach(ob=>{
        const ox=Math.floor(ob.sx-scroll),oy=Math.floor(ob.sy);
        ctx.globalAlpha=1;
        if(ob.type==='dark'){
            ctx.globalAlpha=.85+Math.sin(gTick*.15)*.15;
            ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(ox+3,oy+3,4,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=.3;ctx.fillStyle='#cc88ff';ctx.beginPath();ctx.arc(ox+3,oy+3,7,0,Math.PI*2);ctx.fill();
        }else if(ob.type==='fire'||ob.type==='flame'){
            const f=.7+Math.sin(gTick*.2)*.3;
            ctx.globalAlpha=f*(ob.type==='flame'?.8:1);
            ctx.fillStyle='#ff8820';ctx.beginPath();ctx.arc(ox+3,oy+3,ob.type==='flame'?3:4,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#ffee44';ctx.beginPath();ctx.arc(ox+3,oy+3,ob.type==='flame'?1.5:2,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=.2;ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(ox+3,oy+3,6,0,Math.PI*2);ctx.fill();
        }else if(ob.type==='arrow'){
            ctx.fillStyle='#44cc44';px(ox,oy+2,10,2);
            ctx.fillStyle='#ccee88';px(ob.vx>0?ox+8:ox,oy+1,3,4);
            ctx.fillStyle='#886622';px(ob.vx>0?ox:ox+6,oy+2,4,2);
        }else if(ob.type==='shock'){
            const sw=6+ob.life*.5;
            ctx.globalAlpha=.8-ob.life/70*.5;
            ctx.fillStyle='#ffee44';ctx.fillRect(ox-sw/2,oy,sw,5);
            ctx.globalAlpha=.3;ctx.fillStyle='#ffffff';ctx.fillRect(ox-sw/2-2,oy-1,sw+4,7);
        }else if(ob.type==='bounce'){
            ctx.fillStyle='#44aaff';ctx.beginPath();ctx.arc(ox+4,oy+4,5,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=.5;ctx.fillStyle='#88ddff';ctx.beginPath();ctx.arc(ox+3,oy+3,3,0,Math.PI*2);ctx.fill();
        }else if(ob.type==='skill'){
            const lv=ob.lv||1;
            const r=4+lv*2;
            const t2=gTick*.18;
            if(lv===1){
                ctx.globalAlpha=.9+Math.sin(t2)*.1;
                ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(ox+5,oy+5,r,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(ox+4,oy+4,r-2,0,Math.PI*2);ctx.fill();
                ctx.globalAlpha=.28;ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(ox+5,oy+5,r+5,0,Math.PI*2);ctx.fill();
            }else if(lv===2){
                ctx.globalAlpha=.92;
                ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(ox+5,oy+5,r,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(ox+5,oy+5,r-2,0,Math.PI*2);ctx.fill();
                ctx.globalAlpha=.38;ctx.fillStyle='#ff4400';ctx.beginPath();ctx.arc(ox+5,oy+5,r+6,0,Math.PI*2);ctx.fill();
                ctx.globalAlpha=.7;ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;
                ctx.beginPath();ctx.arc(ox+5,oy+5,r-1,t2,t2+Math.PI*1.4);ctx.stroke();
            }else{
                const hue=gTick*7%360;
                ctx.globalAlpha=1;
                ctx.fillStyle=`hsl(${hue},100%,65%)`;ctx.beginPath();ctx.arc(ox+5,oy+5,r,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(ox+5,oy+5,r-3,0,Math.PI*2);ctx.fill();
                ctx.globalAlpha=.42;ctx.fillStyle=`hsl(${hue+120},100%,70%)`;ctx.beginPath();ctx.arc(ox+5,oy+5,r+7,0,Math.PI*2);ctx.fill();
                ctx.globalAlpha=.2;ctx.fillStyle=`hsl(${hue+240},100%,70%)`;ctx.beginPath();ctx.arc(ox+5,oy+5,r+12,0,Math.PI*2);ctx.fill();
            }
        }
        ctx.globalAlpha=1;
    });

    // Player
    const drawFns=[drawHero,drawDemonLord,drawMage,drawElf,drawDragon,drawGoblinPC,drawGolem,drawSlime];
    drawFns[selectedChar](P.x-scroll,P.y);

    // Particles
    parts.forEach(p=>{
        ctx.globalAlpha=Math.max(0,1-p.life/p.maxLife)*.9;
        ctx.fillStyle=p.col;ctx.fillRect(Math.floor(p.x),Math.floor(p.y),2,2);
    });
    ctx.globalAlpha=1;

    // Buttons
    if(gs==='playing'){
        const skillReady=skillLv>0&&skillCd<=0;
        const bDefs=[
            {b:BTN.L,lbl:'◀',on:keys.L},{b:BTN.R,lbl:'▶',on:keys.R},
            {b:BTN.J,lbl:'↑',on:tids.J!==null},{b:BTN.A,lbl:'⚔',on:P.atk>0},
            {b:BTN.S,lbl:'★',on:skillReady}
        ];
        bDefs.forEach(({b,lbl,on})=>{
            ctx.globalAlpha=on?.52:.22;
            ctx.fillStyle=b===BTN.S&&skillReady?'#ffe840':'#ffffff';
            ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=on?.7:.4;
            ctx.strokeStyle=b===BTN.S&&skillLv>0?'#ffe840':'#ffffff';
            ctx.lineWidth=1;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();
            ctx.globalAlpha=1;
            txo(lbl,b.x,b.y+3.5,'#111111',7);
        });
        // スキルボタン追加情報
        if(skillLv>0){
            // レベル表示
            txo('LV'+skillLv,BTN.S.x,BTN.S.y-BTN.S.r-3,'#ffe840',4.5);
            // クールダウンアーク
            if(skillCd>0){
                const prog=(180-skillCd)/180;
                ctx.globalAlpha=.7;ctx.strokeStyle='#44ff88';ctx.lineWidth=2.5;
                ctx.beginPath();ctx.arc(BTN.S.x,BTN.S.y,BTN.S.r,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);ctx.stroke();
                ctx.globalAlpha=1;
            }
            // EXPドット（次のレベルまでの進捗）
            if(skillLv<3){
                for(let i=0;i<3;i++){
                    ctx.globalAlpha=i<skillExp?.95:.28;
                    ctx.fillStyle='#ffe840';
                    ctx.beginPath();ctx.arc(BTN.S.x-8+i*8,BTN.S.y+BTN.S.r+5,2.5,0,Math.PI*2);ctx.fill();
                }
                ctx.globalAlpha=1;
            }else{
                txo('MAX',BTN.S.x,BTN.S.y+BTN.S.r+6,'#ff8800',4);
            }
        }else{
            txo('?',BTN.S.x,BTN.S.y+BTN.S.r+5,'#888888',4);
        }
    }

    // HUD
    if(gs==='playing'){
        ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,13);
        txo('HP',9,9,'#ffffff',5.5,'left');
        for(let i=0;i<P.mhp;i++)txo(i<P.hp?'♥':'♡',22+i*10,9,i<P.hp?'#ff3355':'#553344',6);
        txo('SCORE '+score,W-4,9,'#ffee44',6,'right');
        // Boss approach warning
        const dist=BOSS_TRIGGER-scroll;
        if(dist>0&&dist<600&&!bossActive){
            const wa=Math.min(1,Math.sin(gTick*.15+1)*.5+.5);
            txo('！ボスが近い！',W/2,H/2-20,'#ff4444',7,undefined,wa);
        }
        if(bossDefeated&&Math.floor(gTick/30)%2===0)
            txo('ボス討伐！ステージクリア！',W/2,H/2-20,'#ffe840',7);
    }

    // Flash
    if(flash>0){ctx.globalAlpha=(flash/14)*.4;ctx.fillStyle='#ff0000';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
    ctx.restore();

    // Start screen
    if(gs==='start'){
        ctx.save();ctx.scale(SC,SC);
        ctx.fillStyle='rgba(0,0,5,.9)';ctx.fillRect(0,0,W,H);
        // Stars
        for(let i=0;i<40;i++){
            ctx.fillStyle=`rgba(255,255,255,${.2+Math.sin(gTick*.03+i)*.15})`;
            ctx.fillRect((i*73+11)%W,(i*47+7)%70,1,1);
        }
        // タイトル（上部コンパクト）
        const pulse=Math.sin(gTick*.06)*.15;
        ctx.globalAlpha=.8+pulse;
        ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(W/2-38,18,5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(W/2+38,18,5,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=.2+pulse*.3;
        ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(W/2-38,18,10,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(W/2+38,18,10,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
        txo('LIGHT',W/2-38,22,'#ffe840',5.5);
        txo('&',W/2,22,'#ffffff',5);
        txo('DARK',W/2+38,22,'#cc88ff',5.5);
        txo('ORB',W/2,34,'#ffffff',9);
        // 2列グリッドキャラ選択
        drawGrid();
        if(best>0)txo('BEST '+best,W-4,8,'#ffaa44',4.5,'right');
        ctx.restore();
    }

    // Gameover screen
    if(gs==='gameover'){
        ctx.save();ctx.scale(SC,SC);
        ctx.fillStyle='rgba(0,0,0,.92)';ctx.fillRect(0,0,W,H);
        ctx.strokeStyle='#ff3333';ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(W/2-14,H/2-55);ctx.lineTo(W/2+14,H/2-35);ctx.stroke();
        ctx.beginPath();ctx.moveTo(W/2+14,H/2-55);ctx.lineTo(W/2-14,H/2-35);ctx.stroke();
        txo('GAME OVER',W/2,H/2-16,'#ff4444',11);
        txo('スコア: '+score,W/2,H/2+6,'#ffff44',8);
        txo('ベスト: '+best,W/2,H/2+22,'#ffaa44',7);
        if(Math.floor(gTick/28)%2===0)txo('タップでリトライ',W/2,H/2+44,'#44ff44',7);
        ctx.restore();
    }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>

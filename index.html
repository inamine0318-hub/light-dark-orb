// ===== UPDATE =====
function update(){
    gTick++;
    if(gs==='splash'){splashTimer++;if(splashTimer>=180)gs='start';return;}
    if(gs==='stageclear'){clearTimer++;return;}
    if(gs!=='playing')return;
    if(hitStop>0){hitStop--;return;}
    t++;
    // コンボタイマー（2秒でリセット）
    if(comboTimer>0){comboTimer--;if(comboTimer===0){combo=0;}};

    // Player move
    const cst=CHARS[selectedChar];
    const spd=cst.spd;
    if(keys.L){P.vx=-spd;P.dir=-1;}
    else if(keys.R){P.vx=spd;P.dir=1;}
    else P.vx*=.65;

    P.vy+=GR*cst.gr;P.vy=Math.min(P.vy,9);
    P.x+=P.vx;P.y+=P.vy;

    // Ground
    if(P.y+P.h>=GY){P.y=GY-P.h;P.vy=0;P.onG=true;P.dj=false;}
    else P.onG=false;

    // Platform collision
    if(!P.onG){
        platforms.forEach(pl=>{
            const px_=pl.sx-scroll;
            if(P.x+P.w>px_&&P.x<px_+pl.w){
                if(P.vy>0&&P.y+P.h<=pl.y+P.vy+4&&P.y+P.h>=pl.y-4){
                    P.y=pl.y-P.h;P.vy=0;P.onG=true;P.dj=false;
                }
            }
        });
    }

    // Bounds
    if(P.x<scroll)P.x=scroll;

    // Camera follow
    const target=P.x-W*.35+P.w/2;
    if(target>scroll)scroll=target;

    P.fr++;P.inv=Math.max(0,P.inv-1);P.atkCd=Math.max(0,P.atkCd-1);P.comboWin=Math.max(0,P.comboWin-1);P.comboSkillWin=Math.max(0,P.comboSkillWin-1);
    if(P.atk>0)P.atk--;

    // Attack hit
    if(P.atk>6){
        const aw=[18,22,32][P.atkCombo]||21;
        const dmgMul=[1,1,2][P.atkCombo]||1;
        const ax=P.dir>0?P.x+P.w:P.x-aw;
        enemies.forEach(en=>{
            if(en.dead||en.inv>0)return;
            const ex=en.sx;
            if(ax<ex+en.w&&ax+aw>ex&&P.y<en.sy+en.h&&P.y+P.h>en.sy){
                en.hp-=dmgMul;en.inv=20;hitStop=3;
                combo++;comboTimer=120;if(combo>comboMax)comboMax=combo;
                spark(ex+en.w/2,en.sy+en.h/2,'#ffaa44',10);spark(ex+en.w/2,en.sy+en.h/2,'#ffffff',5);
                snd(260,.08,.6);
                if(en.hp<=0){en.dead=true;sfx('kill');score+=100*(1+Math.floor(combo/3));spark(ex+5,en.sy+4,'#ff8820',18);spark(ex+5,en.sy+4,'#ffff44',8);
                    if(Math.random()<.5)items.push({sx:en.sx,y:en.sy,w:8,h:8,type:'coin',life:300});}
            }
        });
    }

    // Enemy collision
    if(P.inv<=0){
        enemies.forEach(en=>{
            if(en.dead)return;
            const ex=en.sx;
            if(P.x<ex+en.w&&P.x+P.w>ex&&P.y<en.sy+en.h&&P.y+P.h>en.sy){
                P.hp--;P.inv=55;shake=6;flash=14;sfx('hit');P.vy=-3;
                if(P.hp<=0){if(score>best){best=score;localStorage.setItem('ldo_best',best);}gs='gameover';}
            }
        });
    }

    // Items
    items.forEach(it=>{
        it.life--;
        const ix=it.sx;
        if(P.x<ix+it.w&&P.x+P.w>ix&&P.y<it.y+it.h&&P.y+P.h>it.y){
            it.life=0;
            if(it.type==='heart'){P.hp=Math.min(P.mhp,P.hp+1);spark(ix+4,it.y,'#ff4466',10);snd(660,.15);}
            else if(it.type==='coin'){score+=50;spark(ix+4,it.y,'#ffe840',8);sfx('coin');}
            else if(it.type==='orbfrag'){score+=500;spark(ix+5,it.y,'#ffe840',20);spark(ix+5,it.y,'#8822ff',16);snd(880,.5);}
            else if(it.type==='pwrup'){gainSkillExp();spark(ix+5,it.y,'#ffe840',14);spark(ix+5,it.y,'#ff8800',10);snd(660,.22);}
        }
    });
    items=items.filter(it=>it.life>0&&it.sx>scroll-40);

    // Update enemies
    enemies.forEach(en=>{
        if(en.dead){en.fr++;return;}
        en.fr++;en.inv=Math.max(0,en.inv-1);
        const pdx=(P.x+scroll)-(en.sx+en.w/2);

        if(en.type==='grub'){
            en.sx+=en.vx;
            if(en.sy+en.h<GY){en.vy+=GR;en.sy+=en.vy;}else{en.sy=GY-en.h;en.vy=0;}
            if(Math.abs(pdx)>4){en.vx=(pdx>0?.55:-.55);en.dir=pdx>0?1:-1;}else en.vx=0;
        }else if(en.type==='droid'){
            const dist=Math.abs(pdx);
            en.dir=pdx>0?1:-1;
            if(dist>80){en.sx+=(pdx>0?.4:-.4);}
            else if(dist<50){en.sx+=(pdx>0?-.3:.3);}
            if(en.sy+en.h<GY){en.vy+=GR;en.sy+=en.vy;}else{en.sy=GY-en.h;en.vy=0;}
            en.shotCd=Math.max(0,(en.shotCd||80)-1);
            if(en.shotCd<=0&&dist<170){
                en.shotCd=85;
                arrows.push({sx:en.sx+(en.dir>0?en.w:0),sy:en.sy+8,vx:en.dir*3.6,life:0,maxLife:85});
                snd(320,.06,.4);
            }
        }else if(en.type==='hunter'){
            // 高速・ジャンプ型
            const dist=Math.abs(pdx);
            en.dir=pdx>0?1:-1;
            en.sx+=en.dir*.85;
            if(en.sy+en.h<GY){en.vy+=GR*1.1;en.sy+=en.vy;}else{en.sy=GY-en.h;en.vy=0;}
            en.jumpCd=Math.max(0,(en.jumpCd||80)-1);
            if(en.jumpCd<=0&&dist<120&&en.sy+en.h>=GY){en.jumpCd=90;en.vy=-7;}
        }else if(en.type==='ufo'){
            // 空中浮遊・爆弾投下
            const targetY=(en.floatBase||GY-72)+Math.sin(en.fr*.04)*8;
            en.sy+=(targetY-en.sy)*.06;
            const dist=Math.abs(pdx);
            en.dir=pdx>0?1:-1;
            if(dist>40){en.sx+=en.dir*.5;}
            en.shotCd=Math.max(0,(en.shotCd||90)-1);
            if(en.shotCd<=0&&dist<200){
                en.shotCd=110+Math.floor(Math.random()*40);
                bombs.push({sx:en.sx+en.w/2-3,sy:en.sy+en.h,vy:0,life:0,maxLife:140});
                snd(180,.06,.3);
            }
        }
    });
    enemies=enemies.filter(en=>(!en.dead||en.fr<25)&&en.sx>scroll-100&&en.sx<scroll+W+100);

    // Arrows
    arrows.forEach(ar=>{ar.sx+=ar.vx;ar.life++;});
    if(P.inv<=0){
        arrows.forEach(ar=>{
            const ax=ar.sx;
            if(P.x<ax+4&&P.x+P.w>ax&&P.y<ar.sy+3&&P.y+P.h>ar.sy){
                ar.life=999;
                P.hp--;P.inv=50;shake=5;flash=12;sfx('hit');P.vy=-2;
                if(P.hp<=0){if(score>best){best=score;localStorage.setItem('ldo_best',best);}gs='gameover';}
            }
        });
    }
    arrows=arrows.filter(ar=>ar.life<ar.maxLife&&ar.sx>scroll-20&&ar.sx<scroll+W+20);

    // UFO爆弾 update
    bombs.forEach(bm=>{
        bm.vy+=0.38;bm.sy+=bm.vy;bm.life++;
        // プレイヤー当たり
        if(P.inv<=0&&P.x<bm.sx+8&&P.x+P.w>bm.sx&&P.y<bm.sy+8&&P.y+P.h>bm.sy){
            bm.life=999;P.hp--;P.inv=50;shake=7;flash=14;sfx('hit');P.vy=-2;
            spark(bm.sx+4,bm.sy,'#ff8820',12);
            if(P.hp<=0){if(score>best){best=score;localStorage.setItem('ldo_best',best);}gs='gameover';}
        }
        // 着地爆発
        if(bm.sy>GY-4&&bm.life<999){
            bm.life=999;spark(bm.sx+4,GY-4,'#ff6600',14);spark(bm.sx+4,GY-4,'#ffaa44',8);snd(200,.1,.5);
        }
    });
    bombs=bombs.filter(bm=>bm.life<bm.maxLife&&bm.sx>scroll-20&&bm.sx<scroll+W+20);

    // Boss
    if(scroll>=BOSS_TRIGGER&&!bossActive&&!bossDefeated){
        bossActive=true;
        boss={sx:scroll+W-50,sy:GY-36,w:27,h:36,hp:20,maxHp:20,vx:0,vy:0,dir:-1,fr:0,inv:0,phase:'charge',cd:80};
    }
    if(boss&&!bossDefeated){
        boss.fr++;boss.inv=Math.max(0,boss.inv-1);
        const bdx=(P.x+scroll)-(boss.sx+boss.w/2);
        boss.dir=bdx>0?1:-1;
        boss.cd=Math.max(0,boss.cd-1);
        if(boss.phase==='charge'){
            boss.sx+=(bdx>0?.7:-.7);
            if(boss.sy+boss.h<GY){boss.vy+=GR;boss.sy+=boss.vy;}else{boss.sy=GY-boss.h;boss.vy=0;}
            if(boss.cd<=0){boss.phase='stomp';boss.cd=40;boss.vy=-6;}
        }else if(boss.phase==='stomp'){
            if(boss.sy+boss.h<GY){boss.vy+=GR;boss.sy+=boss.vy;}else{boss.sy=GY-boss.h;boss.vy=0;shake=4;boss.phase='charge';boss.cd=100;}
        }
        // Attack hitbox
        if(P.inv<=0){
            const bx=boss.sx;
            if(P.x<bx+boss.w&&P.x+P.w>bx&&P.y<boss.sy+boss.h&&P.y+P.h>boss.sy){
                P.hp--;P.inv=60;shake=8;flash=18;sfx('hit');P.vy=-4;
                if(P.hp<=0){if(score>best){best=score;localStorage.setItem('ldo_best',best);}gs='gameover';}
            }
        }
        // Player attack on boss
        if(P.atk>6){
            const aw=[18,22,32][P.atkCombo]||PW;
            const dmgMul=[1,1,2][P.atkCombo]||1;
            const ax=P.dir>0?P.x+P.w:P.x-aw;
            const bx=boss.sx;
            if(boss.inv<=0&&ax<bx+boss.w&&ax+aw>bx&&P.y<boss.sy+boss.h&&P.y+P.h>boss.sy){
                boss.hp-=dmgMul;boss.inv=16;spark(bx+11,boss.sy+10,'#ffaa44',10);snd(200,.08,.7);
                if(boss.hp<=0){
                    bossDefeated=true;boss=null;
                    score+=1000;spark(scroll+W/2,GY-40,'#ffe840',30);spark(scroll+W/2,GY-40,'#8822ff',30);
                    sfx('kill');snd(880,.5);stopBgm();
                    items.push({sx:scroll+W/2,y:GY-20,w:10,h:10,type:'orbfrag',life:600});
                    gs='stageclear';clearTimer=0;
                }
            }
        }
    }

    // Platforms
    platSpawnCd--;
    if(platSpawnCd<=0&&!bossActive){
        platSpawnCd=140+Math.floor(Math.random()*80);
        const pw=18+Math.floor(Math.random()*22);
        const ph=GY-22-Math.floor(Math.random()*38);
        const stone=Math.random()<.5;
        platforms.push({sx:scroll+W+8,y:ph,w:pw,h:6,stone});
        if(Math.random()<.3)items.push({sx:scroll+W+8+pw/2-4,y:ph-10,w:8,h:8,type:Math.random()<.5?'coin':'heart',life:500});
    }
    platforms=platforms.filter(pl=>pl.sx>scroll-60&&pl.sx<scroll+W+200);

    // Spawn（ステージ進行で種類増加）
    if(!bossActive){
        spawnCd--;
        if(spawnCd<=0){
            spawnCd=80+Math.floor(Math.random()*60);
            // Stage1: Grub→+Droid  Stage2: +Hunter→+UFO
            const roll=Math.random();
            if(stage===1){
                if(t>350&&roll<.4){
                    // ドロイド（遠距離）
                    enemies.push({sx:scroll+W+10,sy:GY-30,w:18,h:30,hp:3,maxHp:3,vx:0,vy:0,dir:-1,fr:0,inv:0,dead:false,type:'droid',shotCd:60});
                }else{
                    // グラブ（近接）
                    enemies.push({sx:scroll+W+10,sy:GY-24,w:18,h:24,hp:2,maxHp:2,vx:-.5,vy:0,dir:-1,fr:0,inv:0,dead:false,type:'grub'});
                }
            }else{// Stage 2
                if(roll<.3){
                    // ハンター（高速跳躍型）
                    enemies.push({sx:scroll+W+10,sy:GY-26,w:16,h:26,hp:4,maxHp:4,vx:-.8,vy:0,dir:-1,fr:0,inv:0,dead:false,type:'hunter',jumpCd:80});
                }else if(roll<.6){
                    // ドロイド
                    enemies.push({sx:scroll+W+10,sy:GY-30,w:18,h:30,hp:4,maxHp:4,vx:0,vy:0,dir:-1,fr:0,inv:0,dead:false,type:'droid',shotCd:50});
                }else{
                    // グラブ（HPup）
                    enemies.push({sx:scroll+W+10,sy:GY-24,w:18,h:24,hp:3,maxHp:3,vx:-.6,vy:0,dir:-1,fr:0,inv:0,dead:false,type:'grub'});
                }
            }
            if(t>400&&Math.random()<.3)
                items.push({sx:scroll+W+50,y:GY-8,w:8,h:8,type:'heart',life:400});
        }
        // UFOスポーン（Stage1後半 or Stage2）
        if(!bossActive&&(stage===2||(stage===1&&scroll>1200))){
            const ufoOnScreen=enemies.some(e=>e.type==='ufo'&&!e.dead);
            if(!ufoOnScreen&&Math.random()<.004){
                enemies.push({sx:scroll+W+20,sy:GY-72,w:30,h:16,hp:5,maxHp:5,vx:-.4,vy:0,dir:-1,fr:0,inv:0,dead:false,type:'ufo',shotCd:90,floatBase:GY-72});
            }
        }
    }

    // パワーアップアイテムスポーン
    if(!bossActive){
        pwrupSpawnCd--;
        if(pwrupSpawnCd<=0){
            pwrupSpawnCd=200+Math.floor(Math.random()*140);
            const py=GY-10-Math.floor(Math.random()*55);
            items.push({sx:scroll+W+20,y:py,w:12,h:12,type:'pwrup',life:700});
        }
    }

    // 飛び道具update
    orbs.forEach(ob=>{
        ob.sx+=ob.vx;
        if(ob.vy!==0){ob.sy+=ob.vy;}
        if(ob.type==='flame'){ob.vy+=0.25;} // 重力
        if(ob.type==='bounce'){
            ob.vy+=0.3;
            if(ob.sy>=GY-6){ob.sy=GY-6;ob.vy=-Math.abs(ob.vy)*.75;snd(300,.04,.3);}
        }
        ob.life++;
        const osz=ob.lv?12:(ob.size||6);
        enemies.forEach(en=>{
            if(en.dead||en.inv>0)return;
            const ex=en.sx,ox=ob.sx;
            if(ox<ex+en.w&&ox+osz>ex&&ob.sy<en.sy+en.h&&ob.sy+osz>en.sy){
                en.hp-=(ob.dmg||1);en.inv=20;if(!ob.lv)ob.life=999;hitStop=3;
                combo++;comboTimer=120;if(combo>comboMax)comboMax=combo;
                spark(ex+en.w/2,en.sy+en.h/2,'#8822ff',10);spark(ex+en.w/2,en.sy+en.h/2,'#ffffff',4);snd(180,.08,.6);
                if(en.hp<=0){en.dead=true;sfx('kill');score+=100*(1+Math.floor(combo/3));spark(ex+5,en.sy+4,'#6600cc',18);spark(ex+5,en.sy+4,'#ff88ff',8);}
            }
        });
        if(boss&&!bossDefeated&&boss.inv<=0){
            const bx=boss.sx,ox=ob.sx;
            if(ox<bx+boss.w&&ox+osz>bx&&ob.sy<boss.sy+boss.h&&ob.sy+osz>boss.sy){
                boss.hp-=(ob.dmg||1);boss.inv=16;if(!ob.lv)ob.life=999;
                spark(bx+11,boss.sy+10,'#8822ff',10);snd(180,.08,.7);
                if(boss.hp<=0){
                    bossDefeated=true;boss=null;score+=1000;
                    spark(scroll+W/2,GY-40,'#ffe840',30);spark(scroll+W/2,GY-40,'#8822ff',30);
                    sfx('kill');snd(880,.5);stopBgm();
                    items.push({sx:scroll+W/2,y:GY-20,w:10,h:10,type:'orbfrag',life:600});
                    gs='stageclear';clearTimer=0;
                }
            }
        }
    });
    orbs=orbs.filter(ob=>ob.life<ob.maxLife&&ob.sx>scroll-20&&ob.sx<scroll+W+20);

    // Particles
    parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life++;});
    parts=parts.filter(p=>p.life<p.maxLife);

    if(skillCd>0)skillCd--;
    shake=Math.max(0,shake-1);flash=Math.max(0,flash-1);
    if(t%90===0)score+=stage*5;
}

// ===== DRAW =====
function draw(){
    utx.clearRect(0,0,uic.width,uic.height);
    const sx=Math.round((Math.random()-.5)*shake),sy=Math.round((Math.random()-.5)*shake);
    ctx.save();ctx.scale(SC,SC);ctx.translate(sx,sy);
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

    // Stage Clear
    if(gs==='stageclear'){
        for(let i=0;i<50;i++){ctx.fillStyle=`rgba(255,255,255,${.3+Math.sin(gTick*.04+i)*.2})`;ctx.fillRect((i*73)%W,(i*47)%H,1,1);}
        const cp=Math.min(1,clearTimer/30);
        ctx.globalAlpha=cp;
        ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(W/2-20,H/2-10,8+Math.sin(clearTimer*.08)*2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(W/2+20,H/2-10,8+Math.sin(clearTimer*.08+1)*2,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
        txo('STAGE '+stage+' CLEAR!',W/2,H/2-26,'#ffe840',11,undefined,cp);
        txo('SCORE '+score,W/2,H/2,'#ffff44',8,undefined,cp);
        if(clearTimer>60&&Math.floor(clearTimer/25)%2===0)
            txo(stage<2?'タップで次のステージへ':'全ステージ制覇！',W/2,H/2+22,'#44ff88',7);
        ctx.restore();return;
    }

    // Splash（ロゴはuicの高解像度キャンバスに描画→pixelated不使用）
    if(gs==='splash'){
        ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
        const fade=splashTimer<30?splashTimer/30:splashTimer>130?Math.max(0,1-(splashTimer-130)/30):1;
        if(logoImg.complete&&logoImg.naturalWidth>0){
            ctx.save();
            ctx.globalAlpha=fade;
            ctx.imageSmoothingEnabled=true;
            const lw=W*0.62;
            const lh=lw*(logoImg.naturalHeight/logoImg.naturalWidth);
            ctx.drawImage(logoImg,(W-lw)/2,(H-lh)/2,lw,lh);
            ctx.imageSmoothingEnabled=false;
            ctx.restore();
        }else{
            ctx.save();
            ctx.globalAlpha=fade;
            ctx.fillStyle='#ffffff';
            ctx.textAlign='center';ctx.textBaseline='middle';
            ctx.font='bold 18px sans-serif';
            ctx.fillText('内無双GAMES',W/2,H/2-10);
            ctx.font='11px sans-serif';
            ctx.fillStyle='#aaaacc';
            ctx.fillText('PRESENTS',W/2,H/2+12);
            ctx.restore();
        }
        ctx.restore();return;
    }

    if(stage===1)drawBg();else drawBg2();

    // Platforms
    drawPlatforms();

    // Items
    items.forEach(it=>{const ix=it.sx-scroll;if(ix<-10||ix>W+10)return;drawItem(it);});

    // Arrows (ドロイドのエネルギービーム)
    arrows.forEach(ar=>{
        const ax=Math.floor(ar.sx-scroll),ay=Math.floor(ar.sy);
        ctx.fillStyle='#0066cc';px(ax,ay+1,9,2);
        ctx.fillStyle='#22aaff';px(ax+1,ay,7,4);
        ctx.fillStyle='#aaddff';px(ax+2,ay+1,5,2);
        ctx.globalAlpha=.35;ctx.fillStyle='#00ccff';px(ax-1,ay,11,4);ctx.globalAlpha=1;
    });
    // UFO爆弾
    bombs.forEach(bm=>{
        const bx=Math.floor(bm.sx-scroll),by=Math.floor(bm.sy);
        ctx.fillStyle='#ff4400';ctx.beginPath();ctx.arc(bx+4,by+4,5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffaa00';ctx.beginPath();ctx.arc(bx+3,by+3,3,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=.35;ctx.fillStyle='#ff2200';ctx.beginPath();ctx.arc(bx+4,by+4,8,0,Math.PI*2);ctx.fill();
        // 火花尾
        ctx.globalAlpha=.6;ctx.fillStyle='#ffcc44';px(bx+2,by+8,4,4+Math.floor(bm.vy*.5));
        ctx.globalAlpha=1;
    });

    // Enemies
    enemies.forEach(en=>{
        if(en.dead&&en.fr>20)return;
        const ex=en.sx-scroll;if(ex<-20||ex>W+20)return;
        if(en.type==='grub')drawGrub(en);
        else if(en.type==='droid')drawDroid(en);
        else if(en.type==='hunter')drawHunter(en);
        else if(en.type==='ufo')drawUFO(en);
    });

    // Boss
    if(boss&&!bossDefeated){
        const bx=boss.sx-scroll;if(bx>-30&&bx<W+30)drawBoss(boss);
    }

    // 飛び道具描画
    orbs.forEach(ob=>{
        const ox=Math.floor(ob.sx-scroll),oy=Math.floor(ob.sy);
        ctx.globalAlpha=1;
        if(ob.type==='dark'){
            const r=ob.size||4;
            ctx.globalAlpha=.85+Math.sin(gTick*.15)*.15;
            ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(ox+r,oy+r,r,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=.3;ctx.fillStyle='#cc88ff';ctx.beginPath();ctx.arc(ox+r,oy+r,r*1.7,0,Math.PI*2);ctx.fill();
            if(r>=8){ctx.globalAlpha=.15;ctx.fillStyle='#ff00ff';ctx.beginPath();ctx.arc(ox+r,oy+r,r*2.2,0,Math.PI*2);ctx.fill();}
        }else if(ob.type==='fire'||ob.type==='flame'){
            const r=ob.size||(ob.type==='flame'?3:4);
            const f=.7+Math.sin(gTick*.2)*.3;
            ctx.globalAlpha=f*(ob.type==='flame'?.8:1);
            ctx.fillStyle='#ff8820';ctx.beginPath();ctx.arc(ox+r,oy+r,r,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#ffee44';ctx.beginPath();ctx.arc(ox+r,oy+r,r*.5,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=.2;ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(ox+r,oy+r,r*1.6,0,Math.PI*2);ctx.fill();
        }else if(ob.type==='arrow'){
            const th=ob.size||3;
            ctx.fillStyle=ob.lv?'#88ffaa':'#44cc44';px(ox,oy+1,10,th);
            ctx.fillStyle=ob.lv?'#eeffcc':'#ccee88';px(ob.vx>0?ox+8:ox,oy,3,th+1);
            ctx.fillStyle='#886622';px(ob.vx>0?ox:ox+7,oy+1,3,th);
            if(ob.lv){ctx.globalAlpha=.4;ctx.fillStyle='#aaffcc';px(ox,oy+1,10,th);ctx.globalAlpha=1;}
        }else if(ob.type==='shock'){
            const base=ob.size||18;
            const sw=base+ob.life*.7;
            ctx.globalAlpha=Math.max(0,.85-ob.life/(ob.maxLife||70)*.7);
            ctx.fillStyle='#ffee44';ctx.fillRect(ox-sw/2,oy,sw,5);
            ctx.globalAlpha*=.4;ctx.fillStyle='#ffffff';ctx.fillRect(ox-sw/2-3,oy-2,sw+6,9);
        }else if(ob.type==='bounce'){
            const r=ob.size||5;
            ctx.fillStyle='#44aaff';ctx.beginPath();ctx.arc(ox+r,oy+r,r,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=.5;ctx.fillStyle='#88ddff';ctx.beginPath();ctx.arc(ox+r,oy+r,r*.65,0,Math.PI*2);ctx.fill();
        }else if(ob.type==='skill'){
            const lv=ob.lv||1;
            const r=4+lv*2;
            const t2=gTick*.18;
            if(lv===1){
                ctx.globalAlpha=.9+Math.sin(t2)*.1;
                ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(ox+5,oy+5,r,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(ox+4,oy+4,r-2,0,Math.PI*2);ctx.fill();
                ctx.globalAlpha=.28;ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(ox+5,oy+5,r+5,0,Math.PI*2);ctx.fill();
            }else if(lv===2){
                ctx.globalAlpha=.92;
                ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(ox+5,oy+5,r,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(ox+5,oy+5,r-2,0,Math.PI*2);ctx.fill();
                ctx.globalAlpha=.38;ctx.fillStyle='#ff4400';ctx.beginPath();ctx.arc(ox+5,oy+5,r+6,0,Math.PI*2);ctx.fill();
                ctx.globalAlpha=.7;ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;
                ctx.beginPath();ctx.arc(ox+5,oy+5,r-1,t2,t2+Math.PI*1.4);ctx.stroke();
            }else{
                const hue=gTick*7%360;
                ctx.globalAlpha=1;
                ctx.fillStyle=`hsl(${hue},100%,65%)`;ctx.beginPath();ctx.arc(ox+5,oy+5,r,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(ox+5,oy+5,r-3,0,Math.PI*2);ctx.fill();
                ctx.globalAlpha=.42;ctx.fillStyle=`hsl(${hue+120},100%,70%)`;ctx.beginPath();ctx.arc(ox+5,oy+5,r+7,0,Math.PI*2);ctx.fill();
                ctx.globalAlpha=.2;ctx.fillStyle=`hsl(${hue+240},100%,70%)`;ctx.beginPath();ctx.arc(ox+5,oy+5,r+12,0,Math.PI*2);ctx.fill();
            }
        }
        ctx.globalAlpha=1;
    });

    // Player
    const drawFns=[drawHero,drawDemonLord,drawMage,drawElf,drawDragon,drawGoblinPC,drawGolem,drawSlime];
    drawFns[selectedChar](P.x-scroll,P.y);

    // 近接攻撃斬撃エフェクト
    if(gs==='playing'&&P.atk>0&&(selectedChar===0||selectedChar===5)){
        const ax=(P.x-scroll)+(P.dir>0?P.w+8:0);
        const ay=P.y+P.h/2;
        const a0=P.dir>0?-0.9:Math.PI+0.9,a1=P.dir>0?0.9:Math.PI-0.9;
        const prog=P.atk/22;
        ctx.globalAlpha=prog*.85;
        ctx.strokeStyle='#ffffff';ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(ax,ay,18,a0,a1);ctx.stroke();
        ctx.globalAlpha=prog*.3;
        ctx.strokeStyle='#ffff88';ctx.lineWidth=7;
        ctx.beginPath();ctx.arc(ax,ay,18,a0,a1);ctx.stroke();
        ctx.globalAlpha=1;
    }
    // 3段コンボ斬撃エフェクト（勇者・ゴブリン）
    if(gs==='playing'&&P.atk>0&&(selectedChar===0||selectedChar===5)){
        const bxp=P.x-scroll;
        const co=P.atkCombo;
        const maxA=[12,16,22][co]||14;
        const prog=Math.min(1,P.atk/maxA);
        const r=[14,18,26][co]||16;
        const lw=[2.5,3.5,5.5][co]||3;
        const col=['#ffffff','#ffff88','#ffe840'][co]||'#ffffff';
        const ax=bxp+(P.dir>0?P.w+6:-6);
        const ay=P.y+P.h*[.6,.35,.5][co];
        const a0=P.dir>0?-1.1:Math.PI+1.1,a1=P.dir>0?1.1:Math.PI-1.1;
        ctx.globalAlpha=prog*.88;ctx.strokeStyle=col;ctx.lineWidth=lw;
        ctx.beginPath();ctx.arc(ax,ay,r,a0,a1);ctx.stroke();
        ctx.globalAlpha=prog*.28;ctx.strokeStyle='#ffffff';ctx.lineWidth=lw+5;
        ctx.beginPath();ctx.arc(ax,ay,r,a0,a1);ctx.stroke();
        if(co===2){ctx.globalAlpha=prog*.18;ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(ax,ay,r+8,0,Math.PI*2);ctx.fill();}
        ctx.globalAlpha=1;
    }

    // Particles
    parts.forEach(p=>{
        ctx.globalAlpha=Math.max(0,1-p.life/p.maxLife)*.9;
        ctx.fillStyle=p.col;ctx.fillRect(Math.floor(p.x),Math.floor(p.y),2,2);
    });
    ctx.globalAlpha=1;

    // Buttons
    if(gs==='playing'){
        const skillReady=skillLv>0&&skillCd<=0;
        const bDefs=[
            {b:BTN.L,lbl:'◀',col:'#5577ee',sub:'',on:keys.L},{b:BTN.R,lbl:'▶',col:'#5577ee',sub:'',on:keys.R},
            {b:BTN.J,lbl:'跳',col:'#33cc33',sub:'JUMP',on:tids.J!==null},{b:BTN.A,lbl:'攻',col:'#ee3333',sub:'ATK',on:P.atk>0},
            {b:BTN.S,lbl:'技',col:'#ffcc00',sub:'SKL',on:skillReady}
        ];
        bDefs.forEach(({b,lbl,col,sub,on})=>{
            const bc=(b===BTN.S&&skillReady)?'#ffe840':col;
            ctx.globalAlpha=on?.7:.3;ctx.fillStyle=bc;
            ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
            ctx.globalAlpha=on?1:.6;ctx.strokeStyle=bc;ctx.lineWidth=on?2:1.5;
            ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();
            ctx.globalAlpha=1;txo(lbl,b.x,b.y+1.5,'#ffffff',9);
            if(sub)txo(sub,b.x,b.y+b.r+5,on?'#ffffff':'#778899',3.5);
        });
        // スキルボタン：LV表示・コンボ〆ウィンドウ
        {
            const skillNames=['旋風','闇波','隕石','矢雨','炎龍','爆走','地震','分裂'];
            const lvStr=skillLv>0?'Lv'+skillLv:'';
            txo(skillNames[selectedChar]+lvStr,BTN.S.x,BTN.S.y-BTN.S.r-3,'#ffe840',3.5);
            if(P.comboSkillWin>0){// コンボ〆可能→ボタン白フラッシュ
                const pulse=Math.sin(gTick*.5)*.5+.5;
                ctx.globalAlpha=.55+pulse*.4;ctx.fillStyle='#ffffff';
                ctx.beginPath();ctx.arc(BTN.S.x,BTN.S.y,BTN.S.r+4,0,Math.PI*2);ctx.fill();
                ctx.globalAlpha=1;
                txo('NOW!',BTN.S.x,BTN.S.y+BTN.S.r+5,'#ffe840',4.5);
            }else if(skillCd>0){
                const prog=(300-skillCd)/300;
                ctx.globalAlpha=.8;ctx.strokeStyle='#44ff88';ctx.lineWidth=2.5;
                ctx.beginPath();ctx.arc(BTN.S.x,BTN.S.y,BTN.S.r,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);ctx.stroke();
                txo(Math.ceil(skillCd/60)+'s',BTN.S.x,BTN.S.y+BTN.S.r+5,'#44ff88',3.5);
                ctx.globalAlpha=1;
            }else{
                txo('READY',BTN.S.x,BTN.S.y+BTN.S.r+5,'#ffe840',3.5);
            }
        }
    }

    // HUD
    if(gs==='playing'){
        ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,13);
        txo('HP',9,9,'#ffffff',5.5,'left');
        for(let i=0;i<P.mhp;i++)txo(i<P.hp?'♥':'♡',22+i*10,9,i<P.hp?'#ff3355':'#553344',6);
        txo('SCORE '+score,W-4,9,'#ffee44',6,'right');
        // コンボ表示
        if(combo>=2){
            const ct=comboTimer/120;
            ctx.globalAlpha=Math.min(1,ct*3);
            const csc=1+Math.sin(gTick*.2)*.05;
            ctx.save();ctx.translate(W/2,26);ctx.scale(csc,csc);
            txo(combo+'HIT',0,-4,combo>=10?'#ff4420':combo>=5?'#ff8820':'#ffe840',combo>=10?10:8);
            txo('COMBO',0,6,'#ffffff',5);
            ctx.restore();ctx.globalAlpha=1;
        }
        // Boss approach warning
        const dist=BOSS_TRIGGER-scroll;
        if(dist>0&&dist<600&&!bossActive){
            const wa=Math.min(1,Math.sin(gTick*.15+1)*.5+.5);
            txo('！ボスが近い！',W/2,H/2-20,'#ff4444',7,undefined,wa);
        }
        if(bossDefeated&&Math.floor(gTick/30)%2===0)
            txo('ボス討伐！ステージクリア！',W/2,H/2-20,'#ffe840',7);
    }

    // Flash
    if(flash>0){ctx.globalAlpha=(flash/14)*.4;ctx.fillStyle='#ff0000';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
    ctx.restore();

    // Start screen
    if(gs==='start'){
        ctx.save();ctx.scale(SC,SC);
        ctx.fillStyle='rgba(0,0,5,.9)';ctx.fillRect(0,0,W,H);
        // Stars
        for(let i=0;i<40;i++){
            ctx.fillStyle=`rgba(255,255,255,${.2+Math.sin(gTick*.03+i)*.15})`;
            ctx.fillRect((i*73+11)%W,(i*47+7)%70,1,1);
        }
        // タイトル（上部コンパクト）
        const pulse=Math.sin(gTick*.06)*.15;
        ctx.globalAlpha=.8+pulse;
        ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(W/2-38,18,5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(W/2+38,18,5,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=.2+pulse*.3;
        ctx.fillStyle='#ffe840';ctx.beginPath();ctx.arc(W/2-38,18,10,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(W/2+38,18,10,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
        txo('LIGHT',W/2-38,22,'#ffe840',5.5);
        txo('&',W/2,22,'#ffffff',5);
        txo('DARK',W/2+38,22,'#cc88ff',5.5);
        txo('ORB',W/2,34,'#ffffff',9);
        // 2列グリッドキャラ選択
        drawGrid();
        if(best>0)txo('BEST '+best,W-4,8,'#ffaa44',4.5,'right');
        ctx.restore();
    }

    // Gameover screen
    if(gs==='gameover'){
        ctx.save();ctx.scale(SC,SC);
        ctx.fillStyle='rgba(0,0,0,.92)';ctx.fillRect(0,0,W,H);
        ctx.strokeStyle='#ff3333';ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(W/2-14,H/2-55);ctx.lineTo(W/2+14,H/2-35);ctx.stroke();
        ctx.beginPath();ctx.moveTo(W/2+14,H/2-55);ctx.lineTo(W/2-14,H/2-35);ctx.stroke();
        txo('GAME OVER',W/2,H/2-16,'#ff4444',11);
        txo('スコア: '+score,W/2,H/2+6,'#ffff44',8);
        txo('ベスト: '+best,W/2,H/2+22,'#ffaa44',7);
        if(comboMax>=2)txo('最大コンボ: '+comboMax+'HIT',W/2,H/2+34,'#ff8820',5.5);
        if(Math.floor(gTick/28)%2===0)txo('タップでリトライ',W/2,H/2+48,'#44ff44',7);
        ctx.restore();
    }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>

const H=180; // 論理高さ固定

const BTN={
    L:{x:22,y:H-22,r:15},
    R:{x:56,y:H-22,r:15},
    J:{x:W-22,y:H-22,r:15},
    A:{x:W-58,y:H-22,r:15},

};
function updateBTN(){BTN.J.x=W-22;BTN.A.x=W-58;BTN.S.x=W-94;}

function resize(){
    const sw=innerWidth,sh=innerHeight;
    uRatio=devicePixelRatio||1;
    if(sh>sw){
        // 縦向き：90°回転してランドスケープ表示
        SC=sw/H;
        W=sh/SC|0;
        GY=H-30;
        cv.width=sh;cv.height=sw;
        cv.style.cssText=`position:absolute;left:${sw}px;top:0;transform:rotate(90deg);transform-origin:top left;`;
        uic.width=sh*uRatio|0;uic.height=sw*uRatio|0;
        uic.style.cssText=`position:absolute;left:${sw}px;top:0;transform:rotate(90deg);transform-origin:top left;`;
    }else{
        // 横向き：通常
        SC=sh/H;
        W=sw/SC|0;
        GY=H-30;
        cv.width=sw;cv.height=sh;
        cv.style.cssText='position:absolute;left:0;top:0;';
        uic.width=sw*uRatio|0;uic.height=sh*uRatio|0;
        uic.style.cssText='position:absolute;left:0;top:0;';
    }
    updateBTN();
}
window.addEventListener('resize',resize);

// ===== AUDIO =====
let _ac=null,_sfxGain=null;
function getAC(){
    try{
        if(!_ac||_ac.state==='closed'){_ac=new(AudioContext||webkitAudioContext)();_sfxGain=null;}
        if(_ac.state==='suspended')_ac.resume();
        if(!_sfxGain){_sfxGain=_ac.createGain();_sfxGain.gain.value=0.42;_sfxGain.connect(_ac.destination);}
        return _ac;
    }catch(e){return null;}
}
function getSfxDst(){return _sfxGain||(_ac&&_ac.destination)||null;}
function snd(f,d,v){
    const ac=getAC(),dst=getSfxDst();if(!ac||!dst)return;
    try{
        const now=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(dst);
        o.frequency.value=f;
        g.gain.setValueAtTime(.1*(v!==undefined?v:1),now);
        g.gain.exponentialRampToValueAtTime(.001,now+d);
        o.start(now);o.stop(now+d);
    }catch(e){}
}
function mkNoise(ac,dur){
    try{const sr=ac.sampleRate,len=Math.ceil(sr*dur),buf=ac.createBuffer(1,len,sr),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;return buf;}catch(e){return null;}
}
function sfx(type){
    const ac=getAC(),dst=getSfxDst();if(!ac||!dst)return;
    try{
        const now=ac.currentTime;
        if(type==='swing'){
            const o=ac.createOscillator();o.type='sawtooth';
            const g=ac.createGain();o.connect(g);g.connect(dst);
            o.frequency.setValueAtTime(420,now);o.frequency.exponentialRampToValueAtTime(130,now+.1);
            g.gain.setValueAtTime(.07,now);g.gain.exponentialRampToValueAtTime(.001,now+.12);
            o.start(now);o.stop(now+.12);
        }else if(type==='jump'){
            const o=ac.createOscillator();o.type='square';
            const g=ac.createGain();o.connect(g);g.connect(dst);
            o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(420,now+.1);
            g.gain.setValueAtTime(.055,now);g.gain.exponentialRampToValueAtTime(.001,now+.13);
            o.start(now);o.stop(now+.13);
        }else if(type==='hit'){
            const nb=mkNoise(ac,.15);if(!nb)return;
            const src=ac.createBufferSource();src.buffer=nb;
            const flt=ac.createBiquadFilter();flt.type='lowpass';flt.frequency.value=600;
            const g=ac.createGain();g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);
            src.connect(flt);flt.connect(g);g.connect(dst);src.start(now);src.stop(now+.18);
            const o=ac.createOscillator();o.type='sine';
            o.frequency.setValueAtTime(160,now);o.frequency.exponentialRampToValueAtTime(50,now+.13);
            const g2=ac.createGain();g2.gain.setValueAtTime(.25,now);g2.gain.exponentialRampToValueAtTime(.001,now+.14);
            o.connect(g2);g2.connect(dst);o.start(now);o.stop(now+.15);
        }else if(type==='kill'){
            [392,523,659].forEach((freq,i)=>{
                const o=ac.createOscillator();o.type='square';o.frequency.value=freq;
                const g=ac.createGain(),t0=now+i*.06;
                g.gain.setValueAtTime(0,t0);g.gain.setValueAtTime(.065,t0+.01);g.gain.exponentialRampToValueAtTime(.001,t0+.1);
                o.connect(g);g.connect(dst);o.start(t0);o.stop(t0+.12);
            });
        }else if(type==='coin'){
            [659,784].forEach((freq,i)=>{
                const o=ac.createOscillator();o.type='sine';o.frequency.value=freq;
                const g=ac.createGain(),t0=now+i*.07;
                g.gain.setValueAtTime(0,t0);g.gain.setValueAtTime(.08,t0+.01);g.gain.exponentialRampToValueAtTime(.001,t0+.1);
                o.connect(g);g.connect(dst);o.start(t0);o.stop(t0+.12);
            });
        }else if(type==='darkorb'){
            const o=ac.createOscillator();o.type='sawtooth';
            const g=ac.createGain();o.connect(g);g.connect(dst);
            o.frequency.setValueAtTime(180,now);o.frequency.exponentialRampToValueAtTime(80,now+.15);
            g.gain.setValueAtTime(.07,now);g.gain.exponentialRampToValueAtTime(.001,now+.18);
            o.start(now);o.stop(now+.18);
        }
    }catch(e){}
}

// ===== BGM =====

const N={
    // 音名→周波数マップ
    C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,

const BGM1=[[N.E5,.15],[N._,.05],[N.G5,.15],[N.A5,.2],[N._,.1],[N.G5,.15],[N.E5,.15],[N.D5,.3],[N._,.2],
    [N.C5,.15],[N.E5,.15],[N.G5,.15],[N.E5,.3],[N._,.2],[N.D5,.15],[N.C5,.15],[N.D5,.4],[N._,.3],
    [N.A4,.15],[N.C5,.15],[N.E5,.15],[N.G5,.3],[N._,.15],[N.E5,.15],[N.D5,.15],[N.C5,.4],[N._,.3],
    [N.G4,.2],[N.A4,.2],[N.C5,.2],[N.E5,.4],[N.D5,.2],[N.C5,.2],[N.D5,.6],[N._,.4]];
// Stage2: 洞窟・ダンジョン（短調）
const BGM2=[[N.A4,.2],[N._,.1],[N.G4,.15],[N.A4,.2],[N._,.15],[N.F4,.15],[N.G4,.3],[N._,.2],
    [N.E4,.15],[N.F4,.15],[N.E4,.2],[N.D4,.2],[N._,.2],[N.E4,.15],[N.D4,.15],[N.C4,.4],[N._,.3],
    [N.A4,.15],[N._,.1],[N.A4,.15],[N.B4,.15],[N.A4,.2],[N._,.15],[N.G4,.2],[N.A4,.35],[N._,.3],
    [N.F4,.2],[N.E4,.2],[N.D4,.2],[N.E4,.4],[N.D4,.2],[N.C4,.2],[N.A4,.6],[N._,.4]];

// ===== CAROUSEL CHAR SELECT =====
function drawCharPreview(idx,cx,cy,scale){
    ctx.save();
    ctx.translate(cx,cy);
    ctx.scale(scale,scale);
    // 実際のdraw関数を流用（P.invなどは一時的に退避）
    const si=P.inv,sa=P.atk,sc=P.atkCd,sd=P.dir,sf=P.fr,sg=P.onG,svx=P.vx;
    P.inv=0;P.atk=0;P.atkCd=0;P.dir=1;P.fr=8;P.onG=true;P.vx=0;
    const drawFnsP=[drawHero,drawDemonLord,drawMage,drawElf,drawDragon,drawGoblinPC,drawGolem,drawSlime];
    drawFnsP[idx](-7,-5);
    P.inv=si;P.atk=sa;P.atkCd=sc;P.dir=sd;P.fr=sf;P.onG=sg;P.vx=svx;
    ctx.restore();
}

function drawGrid(){
    const GTOP=42,ROWS=4,COLS=2,GAP=6,PAD=4;
    const rowH=(158-GTOP)/ROWS;
    const colW=(W-PAD*2-GAP)/COLS;
    CHARS.forEach((ch,i)=>{
        const col=i%COLS,row=Math.floor(i/COLS);
        const cx=PAD+col*(colW+GAP),cy=GTOP+row*rowH;
        const sel=i===selectedChar;
        // セル背景
        ctx.globalAlpha=sel?0.22:0.06;
        ctx.fillStyle=sel?ch.col:'#ffffff';
        ctx.fillRect(cx,cy+1,colW,rowH-2);
        ctx.globalAlpha=1;
        if(sel){
            ctx.strokeStyle=ch.col;ctx.lineWidth=1.5;
            ctx.strokeRect(cx,cy+1,colW,rowH-2);
            ctx.globalAlpha=0.1+Math.sin(gTick*.09)*.06;
            ctx.fillStyle=ch.col;ctx.fillRect(cx,cy+1,colW,rowH-2);
            ctx.globalAlpha=1;
        }
        // キャラプレビュー
        drawCharPreview(i,cx+14,cy+rowH/2,0.62);
        // テキスト
        const tx=cx+29;
        txo(ch.name,tx,cy+rowH/2-5,sel?ch.col:'#cccccc',6,'left');
        if(ch.atk)txo(ch.atk,cx+colW-2,cy+rowH/2-5,sel?ch.col:'#556677',3.5,'right');
        txo(ch.desc,tx,cy+rowH/2+4,'#778899',3.5,'left');
        // HPドット
        for(let j=0;j<ch.mhp;j++){
            ctx.fillStyle=j<4?'#44ff44':'#ffaa00';
            ctx.globalAlpha=sel?0.85:0.3;
            ctx.fillRect(tx+j*5,cy+rowH-7,4,3);
        }
        ctx.globalAlpha=1;
    });
    if(Math.floor(gTick/28)%2===0)
        txo('タップで選択  もう一度でSTART',W/2,H-4,'#44ff88',5);
}

function startBgm(st){
    stopBgm();
    try{
        bgmAc=new(AudioContext||webkitAudioContext)();
        bgmGain=bgmAc.createGain();bgmGain.gain.value=0.14;bgmGain.connect(bgmAc.destination);
        const seq=st===2?BGM2:BGM1;
        let idx=0,time=bgmAc.currentTime+.05;
        function sched(){
            while(time<bgmAc.currentTime+.6){
                const[f,d]=seq[idx%seq.length];
                if(f>0){
                    const o=bgmAc.createOscillator();o.type='square';o.frequency.value=f;
                    const g=bgmAc.createGain();
                    g.gain.setValueAtTime(0,time);g.gain.setValueAtTime(.4,time+.01);
                    g.gain.setValueAtTime(.4,time+d*.65);g.gain.exponentialRampToValueAtTime(.001,time+d*.9);
                    o.connect(g);g.connect(bgmGain);o.start(time);o.stop(time+d);
                }
                time+=d;idx++;
            }
            bgmSeq=setTimeout(sched,200);
        }
        sched();
    }catch(e){}
}
function stopBgm(){
    clearTimeout(bgmSeq);bgmSeq=null;
    try{if(bgmAc)bgmAc.close();}catch(e){}
    bgmAc=null;bgmGain=null;
}

// ===== HELPERS =====
function px(x,y,w,h){ctx.fillRect(Math.floor(x),Math.floor(y),w,h);}
function txo(s,x,y,c,sz,al,alpha){
    const prev=utx.globalAlpha;
    if(alpha!==undefined)utx.globalAlpha=alpha;
    const ux=x*SC*uRatio,uy=y*SC*uRatio,usz=sz*SC*uRatio;
    utx.font=`bold ${usz}px -apple-system,'Hiragino Sans','Noto Sans JP',Arial,sans-serif`;
    utx.textAlign=al||'center';
    utx.fillStyle='rgba(0,0,0,.95)';
    for(const[ox,oy]of[[-2,0],[2,0],[0,-2],[0,2],[-1,-2],[1,-2],[-1,2],[1,2]])
        utx.fillText(s,ux+ox,uy+oy);
    utx.fillStyle=c;utx.fillText(s,ux,uy);
    utx.globalAlpha=prev;
}

// ===== PARTICLES =====
let parts=[];
function spark(x,y,col,n){
    for(let i=0;i<n;i++)parts.push({
        x,y,col,
        vx:(Math.random()-.5)*3.5,
        vy:(Math.random()-.5)*3.5-1,
        life:0,maxLife:16+Math.random()*12
    });
}

// ===== STATE =====
let gs='splash',gTick=0,t=0;
let splashTimer=0,clearTimer=0;
let scroll=0,stage=1,score=0;
let best=parseInt(localStorage.getItem('ldo_best')||'0');
let shake=0,flash=0,hitStop=0;
let combo=0,comboTimer=0,comboMax=0;
let skillLv=0,skillExp=0,skillCd=0,pwrupSpawnCd=220;
let selectedChar=0;
let orbs=[]; // プレイヤー飛び道具（type:'dark'|'fire'）

// 全キャラ定義 spd=移動速度 jmp=ジャンプ力 gr=重力倍率 dj=二段ジャンプ
const CHARS=[
    {name:'勇者',    desc:'剣・二段ジャンプ',atk:'近接剣撃', col:'#ffe840', mhp:5, locked:false, spd:1.8, jmp:5.8, gr:1.0,  dj:true},
    {name:'魔王',    desc:'闇魔法・浮遊',atk:'闇オーブ',     col:'#8822ff', mhp:4, locked:false, spd:1.5, jmp:4.2, gr:0.55, dj:false},
    {name:'魔法使い',desc:'炎魔法・遠距離',atk:'炎オーブ',   col:'#ff8820', mhp:3, locked:false, spd:1.7, jmp:5.5, gr:1.0,  dj:false},
    {name:'エルフ',  desc:'弓・高ジャンプ',atk:'高速矢',   col:'#44ff88', mhp:4, locked:false, spd:2.2, jmp:7.0, gr:1.0,  dj:true},
    {name:'ドラゴン',desc:'炎ブレス・飛行',atk:'炎3方向',   col:'#ff4420', mhp:6, locked:false, spd:1.6, jmp:5.2, gr:0.65, dj:true},
    {name:'ゴブリン',desc:'素早い・ダッシュ',atk:'ダッシュ斬', col:'#60cc30', mhp:3, locked:false, spd:2.8, jmp:5.0, gr:1.0,  dj:false},
    {name:'ゴーレム',desc:'超耐久・衝撃波',atk:'衝撃波',   col:'#b0b8c0', mhp:8, locked:false, spd:1.0, jmp:4.5, gr:1.3,  dj:false},
    {name:'スライム',desc:'バウンド・変形',atk:'跳弾',    col:'#44aaff', mhp:4, locked:false, spd:1.9, jmp:6.2, gr:0.85, dj:true},
];

// ===== PLAYER =====
const GR=0.42,JMP=5.8,PW=14,PH=22;
let P={x:60,y:GY-PH,w:PW,h:PH,vx:0,vy:0,onG:false,dj:false,hp:5,mhp:5,inv:0,fr:0,dir:1,atk:0,atkCd:0,atkCombo:0,comboWin:0,comboSkillWin:0};

// ===== ENEMIES / OBJECTS =====
let enemies=[],items=[],arrows=[],platforms=[],bombs=[];
let spawnCd=60,platSpawnCd=120;
let boss=null,bossActive=false,bossDefeated=false;
const BOSS_TRIGGER=2800; // scrollがこの値を超えたらボス出現

// ===== CONTROLS =====
let keys={L:false,R:false,J:false,A:false};
let tids={L:null,R:null,J:null,A:null,S:null};

function inBtn(cx,cy,b){return Math.hypot(cx-b.x,cy-b.y)<b.r;}
function cvCoords(cx,cy){
    if(innerHeight>innerWidth){return[cy/SC,(innerWidth-cx)/SC];}
    return[cx/SC,cy/SC];
}

cv.addEventListener('touchstart',e=>{
    e.preventDefault();getAC();
    for(const tc of e.changedTouches){
        const[x,y]=cvCoords(tc.clientX,tc.clientY);
        if(gs==='start'){inp(x,y);continue;}
        if(gs==='stageclear'||gs==='gameover'){inp(x,y);continue;}
        if(inBtn(x,y,BTN.L)){keys.L=true;tids.L=tc.identifier;}
        else if(inBtn(x,y,BTN.R)){keys.R=true;tids.R=tc.identifier;}
        else if(inBtn(x,y,BTN.J)){tids.J=tc.identifier;doJump();}
        else if(inBtn(x,y,BTN.A)){tids.A=tc.identifier;doAtk();}
        else if(inBtn(x,y,BTN.S)){tids.S=tc.identifier;doSkill();}
    }
},{passive:false});
cv.addEventListener('touchend',e=>{
    for(const tc of e.changedTouches){
        if(tc.identifier===tids.L){keys.L=false;tids.L=null;}
        if(tc.identifier===tids.R){keys.R=false;tids.R=null;}
        if(tc.identifier===tids.J)tids.J=null;
        if(tc.identifier===tids.A)tids.A=null;
        if(tc.identifier===tids.S)tids.S=null;
    }
},{passive:true});
cv.addEventListener('touchcancel',()=>{keys.L=keys.R=false;Object.keys(tids).forEach(k=>tids[k]=null);},{passive:true});
document.addEventListener('keydown',e=>{
    getAC();
    if(gs==='start'){
        if(e.key==='ArrowLeft'&&selectedChar%2===1){selectedChar--;return;}
        if(e.key==='ArrowRight'&&selectedChar%2===0&&selectedChar+1<CHARS.length){selectedChar++;return;}
        if(e.key==='ArrowUp'&&selectedChar>=2){selectedChar-=2;return;}
        if(e.key==='ArrowDown'&&selectedChar+2<CHARS.length){selectedChar+=2;return;}
        if(e.key==='Enter'){if(!CHARS[selectedChar].locked){gs='playing';resetGame();}return;}
        return;
    }
    if(e.key==='ArrowLeft')keys.L=true;
    if(e.key==='ArrowRight')keys.R=true;
    if(e.key==='ArrowUp'||e.key===' ')doJump();
    if(e.key==='z'||e.key==='Z'||e.key==='x'||e.key==='X')doAtk();
    if(e.key==='c'||e.key==='C')doSkill();
    if(gs!=='playing')inp();
});
document.addEventListener('keyup',e=>{
    if(e.key==='ArrowLeft')keys.L=false;
    if(e.key==='ArrowRight')keys.R=false;
});

function doJump(){
    if(gs!=='playing')return;
    const cj=CHARS[selectedChar].jmp;
    if(P.onG){P.vy=-cj;P.onG=false;P.dj=false;sfx('jump');}
    else if(!P.dj&&CHARS[selectedChar].dj){P.vy=-cj*.82;P.dj=true;sfx('jump');}
}
function doAtk(){
    if(gs!=='playing'||P.atkCd>0)return;
    // 3段コンボ進行
    P.atkCombo=P.comboWin>0?Math.min(2,P.atkCombo+1):0;
    const co=P.atkCombo;
    const ox=P.x+(P.dir>0?P.w:0),oy=P.y+P.h/2;
    const setCombo=(cd,win)=>{P.atkCd=cd;P.comboWin=co<2?win:0;if(co===2)P.comboSkillWin=55;};

    if(selectedChar===0){// 勇者：3段斬り（リーチ段階的拡大）
        P.atk=[12,16,22][co];setCombo([18,20,24][co],52);sfx('swing');
    }else if(selectedChar===1){// 魔王：1→2連→大型闇オーブ
        const sp=[4.2,4.8,5.8][co],sz=[5,5,10][co],dm=[1,1,3][co],ml=[60,58,80][co];
        if(co===1){
            orbs.push({sx:ox,sy:oy-3,vx:P.dir*sp,vy:-.5,life:0,maxLife:ml,type:'dark',dmg:dm,size:sz});
            orbs.push({sx:ox,sy:oy+3,vx:P.dir*sp,vy:.5,life:0,maxLife:ml,type:'dark',dmg:dm,size:sz});
        }else{
            orbs.push({sx:ox,sy:oy,vx:P.dir*sp,vy:0,life:0,maxLife:ml,type:'dark',dmg:dm,size:sz});
        }
        setCombo([24,26,30][co],50);sfx('darkorb');
    }else if(selectedChar===2){// 魔法使い：1→2連→大型炎
        const sp=[5.5,6,5][co],sz=[4,5,9][co],dm=[1,1,3][co],ml=[48,50,68][co];
        if(co===1){
            orbs.push({sx:ox,sy:oy-2,vx:P.dir*sp,vy:-.3,life:0,maxLife:ml,type:'fire',dmg:dm,size:sz});
            orbs.push({sx:ox,sy:oy+2,vx:P.dir*sp,vy:.3,life:0,maxLife:ml,type:'fire',dmg:dm,size:sz});
        }else{
            orbs.push({sx:ox,sy:oy,vx:P.dir*sp,vy:0,life:0,maxLife:ml,type:'fire',dmg:dm,size:sz});
        }
        setCombo([18,20,25][co],48);sfx('darkorb');
    }else if(selectedChar===3){// エルフ：速射→2連→貫通矢
        const sp=[8,9.5,7.5][co],dm=[1,1,2][co],lv=co===2?1:0,sz=[3,3,5][co];
        orbs.push({sx:ox,sy:P.y+5,vx:P.dir*sp,vy:co===2?-.4:0,life:0,maxLife:55,type:'arrow',dmg:dm,size:sz,lv});

function inp(cx,cy){
    if(gs==='splash'){splashTimer=200;return;}
    if(gs==='start'){
        if(cx!==undefined){
            const GTOP=42,rowH=(158-42)/4;
            const col=cx<W/2?0:1;
            const row=Math.floor((cy-GTOP)/rowH);
            const idx=row*2+col;
            if(idx>=0&&idx<CHARS.length&&cy>=GTOP&&row<4){
                if(idx===selectedChar){if(!CHARS[idx].locked){gs='playing';resetGame();}}
                else{selectedChar=idx;}
            }
        }else{
            if(!CHARS[selectedChar].locked){gs='playing';resetGame();}
        }
        return;
    }
    if(gs==='stageclear'){if(clearTimer>60){if(stage>=2){if(score>best){best=score;localStorage.setItem('ldo_best',best);}location.reload();}else{stage++;gs='playing';resetGame();}}return;}
    if(gs==='gameover'){location.reload();}
}

function drawBg(){
    // Sky
    const sg=ctx.createLinearGradient(0,0,0,GY);
    sg.addColorStop(0,'#3a80b8');sg.addColorStop(.6,'#70b0d8');sg.addColorStop(1,'#a8d0ec');
    ctx.fillStyle=sg;ctx.fillRect(0,0,W,GY);

    // Far mountains
    ctx.fillStyle='#6878a0';
    for(let i=0;i<6;i++){
        const mx=((i*110-scroll*.06+2000)%2000)-80;
        const mh=28+i%3*14;
        ctx.beginPath();ctx.moveTo(mx,GY-mh);ctx.lineTo(mx+44,GY);ctx.lineTo(mx-44,GY);ctx.closePath();ctx.fill();
    }
    ctx.fillStyle='#7888b0';
    for(let i=0;i<4;i++){
        const mx=((i*160+60-scroll*.09+2000)%2000)-80;
        const mh=20+i%2*10;
        ctx.beginPath();ctx.moveTo(mx,GY-mh);ctx.lineTo(mx+32,GY);ctx.lineTo(mx-32,GY);ctx.closePath();ctx.fill();
    }

    // Clouds
    ctx.fillStyle='rgba(255,255,255,.82)';
    clouds.forEach(cl=>{
        const cx=(cl.sx-scroll*cl.spd+3000)%3000-100;
        ctx.beginPath();ctx.ellipse(cx+cl.w*.5,cl.y+cl.h*.5,cl.w*.5,cl.h*.5,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(cx+cl.w*.3,cl.y+cl.h*.2,cl.w*.3,cl.h*.7,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(cx+cl.w*.7,cl.y+cl.h*.25,cl.w*.28,cl.h*.65,0,0,Math.PI*2);ctx.fill();
    });

    // Midground trees
    ctx.fillStyle='#2a6020';
    for(let i=0;i<12;i++){
        const tx=((i*180+40-scroll*.35+3000)%3000)-30;
        const th=22+i%3*8;
        ctx.beginPath();ctx.moveTo(tx,GY-th);ctx.lineTo(tx+12,GY);ctx.lineTo(tx-12,GY);ctx.closePath();ctx.fill();
        ctx.fillStyle='#3a7828';
        ctx.beginPath();ctx.moveTo(tx,GY-th-6);ctx.lineTo(tx+9,GY-th+8);ctx.lineTo(tx-9,GY-th+8);ctx.closePath();ctx.fill();
        ctx.fillStyle='#2a6020';
    }

    // Ground layers
    ctx.fillStyle='#4a8c30';px(0,GY,W,5);
    ctx.fillStyle='#3a7820';px(0,GY+2,W,2);
    ctx.fillStyle='#7a5030';px(0,GY+5,W,H-GY-5);
    ctx.fillStyle='#6a4028';
    for(let i=0;i<8;i++){const tx=((i*44-scroll*.4+2000)%2000);px(tx,GY+10,22,1);px(tx+22,GY+18,14,1);}

    // Foreground grass tufts
    ctx.fillStyle='#5aa038';
    for(let i=0;i<16;i++){
        const gx=((i*82+10-scroll*.8+4000)%4000)-10;
        px(gx,GY-2,2,3);px(gx+4,GY-3,2,4);px(gx+8,GY-1,2,2);
    }
}

function sprDraw(bx,by,rows,pal,flip,ps){
    ps=ps||1;
    const w=rows[0].length,h=rows.length;
    for(let r=0;r<h;r++){
        for(let c=0;c<w;c++){
            const col=pal[rows[r][flip?w-1-c:c]];
            if(col){ctx.fillStyle=col;ctx.fillRect(bx+c*ps,by+r*ps,ps,ps);}
        }
    }
}

function drawHero(bx,by){
    if(P.inv>0&&Math.floor(P.inv/4)%2===0)return;
    const cx=bx+7,gy=by+22,ph=Math.floor(P.fr/8)%2;
    ctx.save();if(P.dir<0){ctx.translate(cx*2,0);ctx.scale(-1,1);}

    // 赤マント（背面）
    ctx.fillStyle='#991010';
    ctx.beginPath();ctx.moveTo(cx-8,by+7);ctx.lineTo(cx-4,by+7);ctx.lineTo(cx-3,gy+2);ctx.lineTo(cx-14,gy+2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#cc1818';
    ctx.beginPath();ctx.moveTo(cx-8,by+8);ctx.lineTo(cx-5,by+8);ctx.lineTo(cx-5,gy-1);ctx.lineTo(cx-11,gy-1);ctx.closePath();ctx.fill();

    // 剣
    const sa=P.atk>0;
    ctx.fillStyle='#111122';ctx.fillRect(cx+7,by+3,4,sa?20:13);
    ctx.fillStyle='#c8daf0';ctx.fillRect(cx+7,by+2,3,sa?20:13);
    ctx.fillStyle='#e8f4ff';ctx.fillRect(cx+8,by+2,1,sa?18:11);

    ctx.fillStyle='#6a3010';ctx.fillRect(cx+8,by+5+(sa?20:13),2,4);
    if(sa){ctx.globalAlpha=0.22;ctx.fillStyle='#aaddff';ctx.fillRect(cx+5,by,8,24);ctx.globalAlpha=1;}

    // ブーツ/脚
    ctx.fillStyle='#3a1a08';
    ctx.fillRect(cx-6,gy-(ph?12:10),5,ph?12:10);
    ctx.fillRect(cx+1,gy-(ph?10:12),5,ph?10:12);
    ctx.fillStyle='#1c0c04';ctx.fillRect(cx-7,gy-4,6,4);ctx.fillRect(cx+1,gy-4,6,4);
    ctx.fillStyle='#c08040';ctx.fillRect(cx-7,gy-5,6,1);ctx.fillRect(cx+1,gy-5,6,1);

    // 鎧
    ctx.fillStyle='#1a3060';ctx.fillRect(cx-7,by+8,14,12);
    ctx.fillStyle='#2a50a0';ctx.fillRect(cx-6,by+9,12,10);
    ctx.fillStyle='#4070c0';ctx.fillRect(cx-5,by+10,9,4);
    ctx.fillStyle='#1a3060';ctx.fillRect(cx-1,by+10,2,10); // 縦溝
    // 金トリム
    ctx.fillStyle='#f0c000';ctx.fillRect(cx-6,by+8,12,2);ctx.fillRect(cx-6,by+18,12,2);
    // ベルト
    ctx.fillStyle='#4a2810';ctx.fillRect(cx-6,by+19,12,3);
    ctx.fillStyle='#f0c000';ctx.fillRect(cx-2,by+19,4,3);
    // 肩鎧
    ctx.fillStyle='#4070c0';ctx.fillRect(cx-11,by+8,5,7);ctx.fillRect(cx+6,by+8,5,7);
    ctx.fillStyle='#f0c000';ctx.fillRect(cx-11,by+8,5,2);ctx.fillRect(cx+6,by+8,5,2);

    // 首
    ctx.fillStyle='#f0c090';ctx.fillRect(cx-2,by+5,4,4);

    // 顔
    ctx.fillStyle='#f8d0a0';ctx.beginPath();ctx.arc(cx,by+3,6,0,Math.PI*2);ctx.fill();

    // 目（青い瞳）
    ctx.fillStyle='#111111';ctx.fillRect(cx-5,by+1,4,3);ctx.fillRect(cx+1,by+1,4,3);
    ctx.fillStyle='#2266dd';ctx.fillRect(cx-4,by+1,3,2);ctx.fillRect(cx+2,by+1,3,2);
    ctx.fillStyle='#88bbff';ctx.fillRect(cx-4,by+1,2,1);ctx.fillRect(cx+2,by+1,2,1);
    ctx.fillStyle='#ffffff';ctx.fillRect(cx-5,by+1,1,1);ctx.fillRect(cx+1,by+1,1,1);
    // 眉（きりっと）
    ctx.fillStyle='#6a3808';ctx.fillRect(cx-5,by-1,4,2);ctx.fillRect(cx+1,by-1,4,2);

    // ツンツン髪（5本のスパイク）
    // アウトライン（影）
    ctx.fillStyle='#2a1006';
    [[cx-7,by-3],[cx-4,by-9],[cx,by-13],[cx+4,by-9],[cx+7,by-4]].forEach(([tx,ty])=>{
        ctx.beginPath();ctx.moveTo(tx-3,by+5);ctx.lineTo(tx,ty-2);ctx.lineTo(tx+3,by+5);ctx.closePath();ctx.fill();
    });
    // 髪本体（ブラウン）
    ctx.fillStyle='#b86820';
    [[cx-7,by-3],[cx-4,by-9],[cx,by-13],[cx+4,by-9],[cx+7,by-4]].forEach(([tx,ty])=>{

        ctx.beginPath();ctx.moveTo(tx-1,by+4);ctx.lineTo(tx,ty+2);ctx.lineTo(tx+1,by+4);ctx.closePath();ctx.fill();
    });

    ctx.restore();
}

function drawUFO(en){
    const x=Math.floor(en.sx-scroll),y=Math.floor(en.sy);
    if(x<-40||x>W+40)return;
    if(en.inv>0&&Math.floor(en.inv/4)%2===0)return;
    const cx=x+15,cy=y+8;
    ctx.save();
    // 影（地面）
    ctx.globalAlpha=.18;ctx.fillStyle='#000000';ctx.beginPath();ctx.ellipse(cx,GY-2,18,4,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    // トラクタービーム（爆弾投下CD低い時）
    if(en.shotCd<30){
        ctx.globalAlpha=(30-en.shotCd)/30*.4;
        const bgrad=ctx.createLinearGradient(cx,cy+6,cx,GY);
        bgrad.addColorStop(0,'rgba(255,200,0,.8)');bgrad.addColorStop(1,'rgba(255,100,0,0)');
        ctx.fillStyle=bgrad;
        ctx.beginPath();ctx.moveTo(cx-4,cy+6);ctx.lineTo(cx+4,cy+6);ctx.lineTo(cx+12,GY);ctx.lineTo(cx-12,GY);ctx.closePath();ctx.fill();
        ctx.globalAlpha=1;
    }
    // 本体（皿形）
    ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.ellipse(cx,cy+2,17,6,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2d2d4e';ctx.beginPath();ctx.ellipse(cx,cy+1,16,5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3a3a60';ctx.beginPath();ctx.ellipse(cx-2,cy,14,3,0,0,Math.PI*2);ctx.fill();// ハイライト
    // ドーム
    ctx.fillStyle='#0a2a10';ctx.beginPath();ctx.ellipse(cx,cy-2,9,7,0,-Math.PI,0);ctx.fill();
    ctx.fillStyle='rgba(0,255,100,.18)';ctx.beginPath();ctx.ellipse(cx,cy-2,9,7,0,-Math.PI,0);ctx.fill();
    ctx.fillStyle='rgba(180,255,200,.35)';ctx.beginPath();ctx.ellipse(cx-2,cy-4,4,3,-.3,-Math.PI*.9,-.1);ctx.fill();// ドームハイライト
    // リムライト（回転）
    const rp=en.fr*.12;
    for(let i=0;i<6;i++){
        const a=i*Math.PI/3+rp;
        const lx=cx+Math.cos(a)*12,ly=cy+2+Math.sin(a)*3.5;
        const lcol=i%2===0?'#ff4400':'#00ffcc';
        ctx.fillStyle=lcol;ctx.beginPath();ctx.arc(lx,ly,1.8,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=.4;ctx.fillStyle=lcol;ctx.beginPath();ctx.arc(lx,ly,3.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    }
    // HPバー（小）
    if(en.hp<en.maxHp){
        ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(cx-12,y-6,24,3);
        ctx.fillStyle='#cc44ff';ctx.fillRect(cx-12,y-6,24*(en.hp/en.maxHp),3);
    }
    if(en.dead){ctx.globalAlpha=1-en.fr/20;ctx.fillStyle='#ff4400';ctx.beginPath();ctx.arc(cx,cy,14,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    ctx.restore();
}

    // 細い脚（高速型）
    ctx.fillStyle='#060218';
    ctx.fillRect(cx-5,gy-(ph?18:12),3,ph?18:12);ctx.fillRect(cx+2,gy-(ph?12:18),3,ph?12:18);
    ctx.fillStyle='#180844';ctx.fillRect(cx-6,gy-4,4,4);ctx.fillRect(cx+2,gy-4,4,4);
    // 流線型ボディ
    ctx.fillStyle='#0c0430';ctx.beginPath();ctx.ellipse(cx,y+12,8,12,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a0848';ctx.beginPath();ctx.ellipse(cx-1,y+11,6,10,0,0,Math.PI*2);ctx.fill();
    // 速度ライン（スリット）
    ctx.strokeStyle='#4400cc';ctx.lineWidth=1;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(cx+6,y+7+i*4);ctx.lineTo(cx+12,y+6+i*4);ctx.stroke();}
    // 頭（細長い）
    ctx.fillStyle='#0a0220';ctx.beginPath();ctx.ellipse(cx,y+2,7,8,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#160640';ctx.beginPath();ctx.ellipse(cx-1,y+1,5,6,0,0,Math.PI*2);ctx.fill();
    // 目（2つ、横長）
    ctx.fillStyle='#111111';ctx.fillRect(cx-5,y+0,4,3);ctx.fillRect(cx+1,y+0,4,3);
    ctx.globalAlpha=.9+Math.sin(en.fr*.2)*.1;
    ctx.fillStyle='#ff00cc';ctx.fillRect(cx-4,y+1,3,1);ctx.fillRect(cx+2,y+1,3,1);
    ctx.globalAlpha=.3;ctx.fillStyle='#ff44ff';ctx.fillRect(cx-5,y-1,5,5);ctx.fillRect(cx+1,y-1,5,5);ctx.globalAlpha=1;
    // 触手腕
    ctx.strokeStyle='#220860';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(cx-7,y+10);ctx.lineTo(cx-14,y+14);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+7,y+10);ctx.lineTo(cx+14,y+14);ctx.stroke();
    // 爪
    ctx.strokeStyle='#8800cc';ctx.lineWidth=1.5;
    [[cx-14,y+14],[cx+14,y+14]].forEach(([bx2,by2])=>{
        ctx.beginPath();ctx.moveTo(bx2,by2);ctx.lineTo(bx2-3,by2+5);ctx.stroke();
        ctx.beginPath();ctx.moveTo(bx2,by2);ctx.lineTo(bx2+3,by2+5);ctx.stroke();
    });
    if(en.dead){ctx.globalAlpha=1-en.fr/20;ctx.fillStyle='#8800cc';ctx.fillRect(cx-8,gy-4,16,4);ctx.globalAlpha=1;}
    ctx.restore();
}

function drawGrub(en){
    const x=Math.floor(en.sx-scroll),y=Math.floor(en.sy);
    if(x<-30||x>W+30)return;
    if(en.inv>0&&Math.floor(en.inv/4)%2===0)return;
    const cx=x+9,gy=y+24,ph=Math.floor(en.fr/7)%2,fl=en.dir<0;
    ctx.save();if(fl){ctx.translate(cx*2,0);ctx.scale(-1,1);}
    // 節足（6本）
    ctx.strokeStyle='#380a58';ctx.lineWidth=2;
    [[cx-7,gy-8,cx-13,gy-3],[cx+7,gy-8,cx+13,gy-3],
     [cx-6,gy-12,cx-11,gy-6],[cx+6,gy-12,cx+11,gy-6],
     [cx-5,gy-16,cx-9,gy-10],[cx+5,gy-16,cx+9,gy-10]].forEach(([x1,y1,x2,y2])=>{
        ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    });
    // 節状胴体（セグメント3個）
    [[y+14,10,8],[y+9,9,7],[y+4,8,6]].forEach(([sy,rw,rh])=>{
        ctx.fillStyle='#1a0830';ctx.beginPath();ctx.ellipse(cx,sy,rw,rh,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#2e0a4e';ctx.beginPath();ctx.ellipse(cx-1,sy-1,rw-2,rh-2,0,0,Math.PI*2);ctx.fill();
    });
    // 発光器官（腹部）
    ctx.globalAlpha=0.7+Math.sin(en.fr*.14)*0.3;
    ctx.fillStyle='#88ff44';ctx.beginPath();ctx.arc(cx,y+14,3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.2;ctx.fillStyle='#aaffaa';ctx.beginPath();ctx.arc(cx,y+14,7,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // 頭（大きな球体）
    ctx.fillStyle='#0e0420';ctx.beginPath();ctx.arc(cx,y+3,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#280848';ctx.beginPath();ctx.arc(cx,y+3,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3c0c5a';ctx.beginPath();ctx.arc(cx-1.5,y+2,7,0,Math.PI*2);ctx.fill();
    // アンテナ（光る先端）
    ctx.strokeStyle='#5510aa';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx-4,y-5);ctx.lineTo(cx-7,y-14);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+4,y-5);ctx.lineTo(cx+7,y-14);ctx.stroke();
    ctx.fillStyle='#cc44ff';ctx.beginPath();ctx.arc(cx-7,y-14,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+7,y-14,2.5,0,Math.PI*2);ctx.fill();
    // 目（3つ並び）
    [[cx-4,y+2,'#ff2200'],[cx,y+1,'#ff8800'],[cx+4,y+2,'#ffcc00']].forEach(([ex,ey,ec])=>{
        ctx.fillStyle='#111111';ctx.beginPath();ctx.arc(ex,ey,2.2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=ec;ctx.beginPath();ctx.arc(ex,ey,1.5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(ex-.5,ey-.5,0.5,0,Math.PI*2);ctx.fill();
    });
    // 牙・口（上向き毒牙）
    ctx.fillStyle='#ccff88';
    ctx.beginPath();ctx.moveTo(cx-3,y+8);ctx.lineTo(cx-1,y+14);ctx.lineTo(cx-5,y+13);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+2,y+8);ctx.lineTo(cx+4,y+14);ctx.lineTo(cx,y+13);ctx.closePath();ctx.fill();
    if(ph){ctx.globalAlpha=.6;ctx.fillStyle='#88ff44';ctx.beginPath();ctx.arc(cx,y+15,2,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    // 死亡
    if(en.dead){ctx.globalAlpha=1-en.fr/20;ctx.fillStyle='#aa22ff';ctx.fillRect(cx-9,gy-4,18,4);ctx.globalAlpha=1;}
    ctx.restore();
}

function drawItem(it){
    const x=Math.floor(it.sx-scroll),y=Math.floor(it.y);
    const bl=Math.floor(gTick/8)%2===0;
    if(it.type==='heart'){
        ctx.fillStyle='#ff2244';
        px(x,y+1,2,2);px(x+3,y+1,2,2);px(x,y+2,6,3);px(x+1,y+5,4,1);px(x+2,y+6,2,1);
        if(bl){ctx.fillStyle='#ff88aa';px(x+1,y+1,1,1);}
    }else if(it.type==='coin'){
        ctx.fillStyle='#e8c020';
        ctx.beginPath();ctx.arc(x+4,y+4,4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#f8e840';px(x+3,y+2,2,1);
        if(bl){ctx.fillStyle='#fff080';px(x+2,y+3,2,1);}
    }else if(it.type==='orbfrag'){
        const pulse=.7+Math.sin(gTick*.1)*.3;
        ctx.globalAlpha=pulse;
        ctx.fillStyle='#ffe840';
        ctx.beginPath();ctx.arc(x+5,y+5,5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8822ff';
        ctx.beginPath();ctx.arc(x+5,y+5,3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffffff';px(x+4,y+4,2,2);
        ctx.globalAlpha=.2*pulse;ctx.fillStyle='#ffe840';
        ctx.beginPath();ctx.arc(x+5,y+5,9,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
    }else if(it.type==='pwrup'){
        // 5角星パワーアップアイテム
        const cx=x+6,cy=it.y+6;
        const pulse=.8+Math.sin(gTick*.14)*.2;
        ctx.globalAlpha=.22*pulse;ctx.fillStyle='#ff8800';
        ctx.beginPath();ctx.arc(cx,cy,11,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=pulse;
        ctx.fillStyle='#ffe840';ctx.beginPath();
        for(let i=0;i<10;i++){
            const a=i*Math.PI/5-Math.PI/2;
            const r=i%2===0?7:3;
            if(i===0)ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
            else ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
        }
        ctx.closePath();ctx.fill();
        ctx.globalAlpha=.6*pulse;ctx.fillStyle='#ffffff';
        ctx.beginPath();
        for(let i=0;i<10;i++){
            const a=i*Math.PI/5-Math.PI/2;
            const r=i%2===0?5:2;
            if(i===0)ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
            else ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
        }
        ctx.closePath();ctx.fill();
        ctx.globalAlpha=1;
    }
}

// ===== DRAW DEMON LORD =====
function drawDemonLord(bx,by){
    if(P.inv>0&&Math.floor(P.inv/4)%2===0)return;
    const cx=bx+7,gy=by+22,bob=Math.round(Math.sin(P.fr*0.18)*4);
    ctx.save();if(P.dir<0){ctx.translate(cx*2,0);ctx.scale(-1,1);}
    const b2=by+bob;
    // ローブ（大きなシルエット）
    ctx.fillStyle='#0e041e';
    ctx.beginPath();ctx.moveTo(cx-11,b2+8);ctx.lineTo(cx+11,b2+8);ctx.lineTo(cx+14,gy+2);ctx.lineTo(cx-14,gy+2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#2a0858';
    ctx.beginPath();ctx.moveTo(cx-9,b2+9);ctx.lineTo(cx+9,b2+9);ctx.lineTo(cx+12,gy);ctx.lineTo(cx-12,gy);ctx.closePath();ctx.fill();
    // 中央の光沢
    ctx.fillStyle='#5010a0';
    ctx.beginPath();ctx.moveTo(cx-4,b2+9);ctx.lineTo(cx+4,b2+9);ctx.lineTo(cx+5,gy-3);ctx.lineTo(cx-5,gy-3);ctx.closePath();ctx.fill();
    // 金トリム
    ctx.fillStyle='#d0a000';ctx.fillRect(cx-9,b2+9,18,2);ctx.fillRect(cx-11,gy-2,22,2);
    // 肩飾り
    ctx.fillStyle='#3a1080';
    ctx.beginPath();ctx.arc(cx-8,b2+9,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+8,b2+9,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6020c0';ctx.beginPath();ctx.arc(cx-8,b2+9,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+8,b2+9,3,0,Math.PI*2);ctx.fill();
    // 上半身
    ctx.fillStyle='#1e0840';ctx.fillRect(cx-6,b2+5,12,8);
    // 顔（暗い肌）
    ctx.fillStyle='#111111';ctx.beginPath();ctx.arc(cx,b2+2,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1430';ctx.beginPath();ctx.arc(cx,b2+2,6,0,Math.PI*2);ctx.fill();
    // 赤く光る目（大きめ）
    ctx.fillStyle='#ff0000';
    ctx.beginPath();ctx.arc(cx-2.5,b2+2,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+2.5,b2+2,2.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.6;ctx.fillStyle='#ff6666';
    ctx.beginPath();ctx.arc(cx-2.5,b2+2,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+2.5,b2+2,4,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.arc(cx-3,b2+1,1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+2,b2+1,1,0,Math.PI*2);ctx.fill();
    // 王冠
    ctx.fillStyle='#5010a0';ctx.fillRect(cx-8,b2-6,16,8);
    ctx.fillStyle='#7020d0';
    ctx.fillRect(cx-8,b2-10,4,5);ctx.fillRect(cx-2,b2-13,4,8);ctx.fillRect(cx+4,b2-10,4,5);
    ctx.fillStyle='#d0a000';ctx.fillRect(cx-7,b2-6,14,2);
    // 王冠の宝石
    ctx.fillStyle='#ff2020';ctx.beginPath();ctx.arc(cx,b2-11,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(cx-0.5,b2-12,1,0,Math.PI*2);ctx.fill();
    // 攻撃グロー
    if(P.atkCd>15){
        const t=P.atkCd/25;
        ctx.globalAlpha=0.5*t;ctx.fillStyle='#8822ff';ctx.beginPath();ctx.arc(cx+13,b2+5,7,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=0.2*t;ctx.beginPath();ctx.arc(cx+13,b2+5,13,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
    }
    ctx.restore();
}

function drawMage(bx,by){
    if(P.inv>0&&Math.floor(P.inv/4)%2===0)return;
    const cx=bx+7,gy=by+22,bob=Math.round(Math.sin(P.fr*0.14)*2);
    ctx.save();if(P.dir<0){ctx.translate(cx*2,0);ctx.scale(-1,1);}
    const b2=by+bob;
    // ローブ下半身（広がり形）
    ctx.fillStyle='#0e0440';
    ctx.beginPath();ctx.moveTo(cx-9,b2+10);ctx.lineTo(cx+9,b2+10);ctx.lineTo(cx+12,gy+2);ctx.lineTo(cx-12,gy+2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#3010a0';
    ctx.beginPath();ctx.moveTo(cx-8,b2+11);ctx.lineTo(cx+8,b2+11);ctx.lineTo(cx+10,gy);ctx.lineTo(cx-10,gy);ctx.closePath();ctx.fill();
    // ローブ中央の光沢
    ctx.fillStyle='#5030c0';ctx.fillRect(cx-3,b2+12,6,8);
    // 帯（金）
    ctx.fillStyle='#f0c800';ctx.fillRect(cx-8,b2+14,16,2);
    // 上半身
    ctx.fillStyle='#3010a0';ctx.fillRect(cx-7,b2+6,14,8);
    ctx.fillStyle='#5030c0';ctx.fillRect(cx-6,b2+7,9,4);
    // 両腕（袖）
    ctx.fillStyle='#2a0c80';ctx.fillRect(cx-11,b2+6,4,9);ctx.fillRect(cx+7,b2+6,4,9);
    // 魔法の光る宝石（胸）
    const pulse=0.7+Math.sin(P.fr*0.15)*0.3;
    ctx.globalAlpha=pulse;ctx.fillStyle='#00ccff';ctx.beginPath();ctx.arc(cx,b2+10,3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.3*pulse;ctx.fillStyle='#88eeff';ctx.beginPath();ctx.arc(cx,b2+10,6,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // 顔
    ctx.fillStyle='#f0c898';ctx.beginPath();ctx.arc(cx,b2+2,5,0,Math.PI*2);ctx.fill();
    // 目（大きく、紫の魔法使い目）
    ctx.fillStyle='#111111';ctx.beginPath();ctx.arc(cx-2,b2+1,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+2,b2+1,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#8833ff';ctx.beginPath();ctx.arc(cx-2,b2+1,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+2,b2+1,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111111';ctx.beginPath();ctx.arc(cx-2,b2+1,1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+2,b2+1,1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(cx-2.5,b2+0,0.8,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+1.5,b2+0,0.8,0,Math.PI*2);ctx.fill();
    // 微笑み
    ctx.strokeStyle='#a06040';ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,b2+4,3,0.2,Math.PI-0.2);ctx.stroke();
    // 三角帽子（高く太く）
    ctx.fillStyle='#0a0430';
    ctx.beginPath();ctx.moveTo(cx,b2-18);ctx.lineTo(cx-10,b2-1);ctx.lineTo(cx+10,b2-1);ctx.closePath();ctx.fill();
    ctx.fillStyle='#2010a0';
    ctx.beginPath();ctx.moveTo(cx,b2-17);ctx.lineTo(cx-8,b2-2);ctx.lineTo(cx+8,b2-2);ctx.closePath();ctx.fill();
    // 帽子のつば
    ctx.fillStyle='#0a0430';ctx.fillRect(cx-11,b2-3,22,4);
    ctx.fillStyle='#2010a0';ctx.fillRect(cx-10,b2-2,20,3);
    // 帽子の星マーク
    ctx.fillStyle='#f0e000';ctx.beginPath();ctx.arc(cx,b2-12,2,0,Math.PI*2);ctx.fill();
    // 杖（右側）
    ctx.fillStyle='#5a2808';ctx.fillRect(cx+11,b2-10,3,25);
    ctx.fillStyle='#7a3a10';ctx.fillRect(cx+12,b2-10,1,22);
    // 杖の魔法球
    ctx.fillStyle='#0080ee';ctx.beginPath();ctx.arc(cx+12,b2-11,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#40c0ff';ctx.beginPath();ctx.arc(cx+11,b2-13,2.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.35+Math.sin(P.fr*0.18)*0.2;ctx.fillStyle='#88ddff';ctx.beginPath();ctx.arc(cx+12,b2-11,9,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    // 攻撃炎グロー
    if(P.atkCd>10){
        const t=P.atkCd/18;
        ctx.globalAlpha=0.7*t;ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(cx+12,b2+13,5,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=0.25*t;ctx.fillStyle='#ffaa44';ctx.beginPath();ctx.arc(cx+12,b2+13,11,0,Math.PI*2);ctx.fill();

    ctx.restore();
}

function drawElf(bx,by){
    if(P.inv>0&&Math.floor(P.inv/4)%2===0)return;
    const cx=bx+7,gy=by+22,ph=Math.floor(P.fr/8)%2;
    ctx.save();if(P.dir<0){ctx.translate(cx*2,0);ctx.scale(-1,1);}

    // 矢筒（背後）
    ctx.fillStyle='#3e1c08';ctx.fillRect(cx+6,by+5,5,12);
    ctx.fillStyle='#5e2c10';ctx.fillRect(cx+7,by+4,3,13);
    [0,1,2].forEach(i=>{
        ctx.fillStyle='#c8c070';ctx.fillRect(cx+8,by+2-i*2,1.5,5);
        ctx.fillStyle='#bb2828';ctx.fillRect(cx+8,by-i*2,1.5,2.5);
    });

    // 弓（左手）
    ctx.strokeStyle='#4a2008';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(cx-10,by+1);ctx.quadraticCurveTo(cx-18,by+10,cx-10,by+20);ctx.stroke();
    ctx.strokeStyle='#7a3c10';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx-10,by+1);ctx.quadraticCurveTo(cx-16,by+10,cx-10,by+20);ctx.stroke();
    ctx.strokeStyle='#d8d8b0';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(cx-10,by+1);ctx.lineTo(cx-10,by+20);ctx.stroke();

    // 脚/ブーツ
    ctx.fillStyle='#163008';
    ctx.fillRect(cx-6,gy-(ph?11:9),5,ph?11:9);
    ctx.fillRect(cx+1,gy-(ph?9:11),5,ph?9:11);
    ctx.fillStyle='#2a1808';ctx.fillRect(cx-7,gy-4,6,4);ctx.fillRect(cx+1,gy-4,6,4);
    ctx.fillStyle='#b88030';ctx.fillRect(cx-7,gy-5,6,1);ctx.fillRect(cx+1,gy-5,6,1);

    // チュニック
    ctx.fillStyle='#184808';ctx.fillRect(cx-7,by+8,14,13);
    ctx.fillStyle='#26660a';ctx.fillRect(cx-6,by+9,12,11);
    ctx.fillStyle='#348810';ctx.fillRect(cx-5,by+10,8,3);
    ctx.fillStyle='#184808';ctx.fillRect(cx-1,by+10,2,11);
    ctx.fillStyle='#3e2008';ctx.fillRect(cx-6,by+19,12,2);
    ctx.fillStyle='#b88030';ctx.fillRect(cx-2,by+19,4,2);
    ctx.fillStyle='#26660a';ctx.fillRect(cx-10,by+8,5,8);ctx.fillRect(cx+5,by+8,5,8);

    // 首
    ctx.fillStyle='#f0c898';ctx.fillRect(cx-2,by+5,4,4);

    // ===== とがった耳（エルフの象徴、大きく目立つ） =====
    // 右耳（前方に突き出す）
    ctx.fillStyle='#e8c898';
    ctx.beginPath();ctx.moveTo(cx+4,by+0);ctx.lineTo(cx+18,by-7);ctx.lineTo(cx+6,by+7);ctx.closePath();ctx.fill();
    ctx.fillStyle='#d4a870';
    ctx.beginPath();ctx.moveTo(cx+5,by+1);ctx.lineTo(cx+16,by-5);ctx.lineTo(cx+7,by+6);ctx.closePath();ctx.fill();
    ctx.fillStyle='#e8a090'; // 内側ピンク
    ctx.beginPath();ctx.moveTo(cx+6,by+2);ctx.lineTo(cx+14,by-3);ctx.lineTo(cx+8,by+5);ctx.closePath();ctx.fill();
    // 左耳（後方）
    ctx.fillStyle='#d4a878';
    ctx.beginPath();ctx.moveTo(cx-4,by+0);ctx.lineTo(cx-16,by-7);ctx.lineTo(cx-6,by+7);ctx.closePath();ctx.fill();
    ctx.fillStyle='#c09060';
    ctx.beginPath();ctx.moveTo(cx-5,by+1);ctx.lineTo(cx-14,by-5);ctx.lineTo(cx-7,by+6);ctx.closePath();ctx.fill();
    ctx.fillStyle='#d89080';
    ctx.beginPath();ctx.moveTo(cx-6,by+2);ctx.lineTo(cx-12,by-3);ctx.lineTo(cx-8,by+5);ctx.closePath();ctx.fill();

    // 顔
    ctx.fillStyle='#f8d8a8';ctx.beginPath();ctx.arc(cx,by+2,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f0c898';ctx.beginPath();ctx.arc(cx+0.5,by+2.5,4.5,0,Math.PI*2);ctx.fill();

    // 目（エメラルドグリーン）
    ctx.fillStyle='#111111';ctx.beginPath();ctx.arc(cx-2,by+1,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111111';ctx.beginPath();ctx.arc(cx+2,by+1,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#18cc44';ctx.beginPath();ctx.arc(cx-2,by+1,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#18cc44';ctx.beginPath();ctx.arc(cx+2,by+1,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a0a0a';ctx.beginPath();ctx.arc(cx-2,by+1.3,1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a0a0a';ctx.beginPath();ctx.arc(cx+2,by+1.3,1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(cx-2.7,by+0.3,0.9,0,Math.PI*2);ctx.fill();

    ctx.strokeStyle='#a07040';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(cx,by+4,2.5,0.3,Math.PI-0.3);ctx.stroke();

    // ゴールドブロンド髪（サイドに流れる）
    ctx.fillStyle='#281808'; // 影
    ctx.beginPath();ctx.moveTo(cx-6,by+6);ctx.lineTo(cx-9,by-4);ctx.lineTo(cx-3,by-2);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+6,by+6);ctx.lineTo(cx+9,by-4);ctx.lineTo(cx+4,by-2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#c8a018'; // 髪
    ctx.beginPath();ctx.moveTo(cx-6,by+5);ctx.lineTo(cx-8,by-3);ctx.lineTo(cx-2,by-1);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+6,by+5);ctx.lineTo(cx+8,by-3);ctx.lineTo(cx+3,by-1);ctx.closePath();ctx.fill();
    ctx.fillStyle='#c8a018';ctx.fillRect(cx-5,by-4,10,5);

    ctx.fillStyle='#281808';ctx.fillRect(cx-1,by-4,2,2); // 前髪の割れ目

    }
    ctx.restore();
}

function drawDragon(bx,by){
    if(P.inv>0&&Math.floor(P.inv/4)%2===0)return;
    const cx=bx+7,gy=by+22;
    const ph=Math.floor(P.fr/7)%2;
    ctx.save();if(P.dir<0){ctx.translate(cx*2,0);ctx.scale(-1,1);}

    // ─── 尻尾 ───
    ctx.fillStyle='#b81806';
    ctx.beginPath();
    ctx.moveTo(cx-2,gy-16);
    ctx.quadraticCurveTo(cx-14,gy-12,cx-24,gy-7);
    ctx.quadraticCurveTo(cx-28,gy-5,cx-30,gy-3);
    ctx.lineTo(cx-28,gy);
    ctx.quadraticCurveTo(cx-16,gy-5,cx-1,gy-18);
    ctx.closePath();ctx.fill();
    // 尾の棘
    ctx.fillStyle='#880e04';
    ctx.beginPath();ctx.moveTo(cx-18,gy-13);ctx.lineTo(cx-20,gy-20);ctx.lineTo(cx-15,gy-13);ctx.closePath();ctx.fill();
    // 尾先（矢印型）
    ctx.beginPath();ctx.moveTo(cx-29,gy-3);ctx.lineTo(cx-37,gy-7);ctx.lineTo(cx-30,gy+2);ctx.lineTo(cx-27,gy-2);ctx.closePath();ctx.fill();

    // ─── 大翼（バット翼、骨格付き） ───
    // 翼の影（最背面）
    ctx.fillStyle='#6a0c04';
    ctx.beginPath();
    ctx.moveTo(cx-2,gy-30);
    ctx.lineTo(cx-30,gy-54);
    ctx.lineTo(cx-38,gy-37);
    ctx.lineTo(cx-28,gy-22);
    ctx.lineTo(cx-6,gy-18);
    ctx.closePath();ctx.fill();
    // 翼本体
    ctx.fillStyle='#991004';
    ctx.beginPath();
    ctx.moveTo(cx-2,gy-30);
    ctx.lineTo(cx-27,gy-52);
    ctx.lineTo(cx-36,gy-36);
    ctx.lineTo(cx-26,gy-21);
    ctx.lineTo(cx-6,gy-18);
    ctx.closePath();ctx.fill();
    // 翼膜ハイライト
    ctx.globalAlpha=0.45;ctx.fillStyle='#dd1a08';
    ctx.beginPath();
    ctx.moveTo(cx-2,gy-30);
    ctx.lineTo(cx-24,gy-50);
    ctx.lineTo(cx-33,gy-36);
    ctx.lineTo(cx-23,gy-21);
    ctx.lineTo(cx-6,gy-19);
    ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;
    // 骨格ライン（5本）
    ctx.strokeStyle='#550a04';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx-2,gy-30);ctx.lineTo(cx-27,gy-52);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-2,gy-30);ctx.lineTo(cx-36,gy-36);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-2,gy-30);ctx.lineTo(cx-26,gy-21);ctx.stroke();
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx-2,gy-30);ctx.lineTo(cx-16,gy-50);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-2,gy-30);ctx.lineTo(cx-32,gy-43);ctx.stroke();
    // 翼先の鉤爪
    ctx.fillStyle='#330604';
    ctx.beginPath();ctx.moveTo(cx-27,gy-52);ctx.lineTo(cx-32,gy-57);ctx.lineTo(cx-25,gy-50);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx-36,gy-36);ctx.lineTo(cx-42,gy-37);ctx.lineTo(cx-35,gy-32);ctx.closePath();ctx.fill();

    // ─── 後ろ脚2本（二足歩行アニメ） ───
    const la=ph===0?3:-2, ra=ph===0?-2:3;
    // 右脚（やや暗め）
    ctx.fillStyle='#aa1204';
    ctx.beginPath();ctx.moveTo(cx+2,gy-18);ctx.lineTo(cx+8,gy-18);ctx.lineTo(cx+9+ra/3,gy-9);ctx.lineTo(cx+3+ra/3,gy-9);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+3+ra/3,gy-9);ctx.lineTo(cx+8+ra/3,gy-9);ctx.lineTo(cx+7+ra*0.6,gy);ctx.lineTo(cx+3+ra*0.6,gy);ctx.closePath();ctx.fill();
    ctx.fillStyle='#881002';ctx.fillRect(cx+1+ra,gy,7,3);
    ctx.fillStyle='#0a0404';ctx.fillRect(cx+ra,gy+3,3,5);ctx.fillRect(cx+3+ra,gy+4,3,6);ctx.fillRect(cx+6+ra,gy+3,3,5);
    // 左脚（明るめ）
    ctx.fillStyle='#cc1806';
    ctx.beginPath();ctx.moveTo(cx-6,gy-18);ctx.lineTo(cx,gy-18);ctx.lineTo(cx+1+la/3,gy-9);ctx.lineTo(cx-5+la/3,gy-9);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx-5+la/3,gy-9);ctx.lineTo(cx+la/3,gy-9);ctx.lineTo(cx-1+la*0.6,gy);ctx.lineTo(cx-5+la*0.6,gy);ctx.closePath();ctx.fill();
    ctx.fillStyle='#aa1404';ctx.fillRect(cx-6+la,gy,7,3);
    ctx.fillStyle='#0a0404';ctx.fillRect(cx-7+la,gy+3,3,5);ctx.fillRect(cx-4+la,gy+4,3,6);ctx.fillRect(cx-1+la,gy+3,3,5);

    // ─── 胴体（直立、前傾） ───
    ctx.fillStyle='#bb1606';ctx.beginPath();ctx.ellipse(cx+1,gy-19,8,6,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cc1a06';ctx.beginPath();ctx.ellipse(cx+2,gy-28,10,11,0.18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ee2808';ctx.beginPath();ctx.ellipse(cx,gy-29,7,8,0.12,0,Math.PI*2);ctx.fill();
    // 腹甲（オレンジ、縞付き）
    ctx.fillStyle='#dd6e10';ctx.beginPath();ctx.ellipse(cx+3,gy-26,5,9,0.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f09020';ctx.fillRect(cx,gy-34,5,15);
    ctx.fillStyle='#bb5a0c';for(let i=0;i<6;i++)ctx.fillRect(cx-1,gy-33+i*2.4,7,1);

    // ─── 前腕（短く） ───
    ctx.fillStyle='#cc1806';
    ctx.beginPath();ctx.moveTo(cx+8,gy-30);ctx.lineTo(cx+12,gy-30);ctx.lineTo(cx+13,gy-22);ctx.lineTo(cx+9,gy-22);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx-9,gy-30);ctx.lineTo(cx-5,gy-30);ctx.lineTo(cx-4,gy-22);ctx.lineTo(cx-8,gy-22);ctx.closePath();ctx.fill();
    ctx.fillStyle='#0a0404';
    ctx.fillRect(cx+8,gy-22,3,5);ctx.fillRect(cx+10,gy-21,3,6);ctx.fillRect(cx+12,gy-22,3,5);
    ctx.fillRect(cx-11,gy-22,3,5);ctx.fillRect(cx-9,gy-21,3,6);ctx.fillRect(cx-7,gy-22,3,5);

    // ─── 背びれ（4本） ───
    ctx.fillStyle='#991004';
    [[cx-4,13],[cx-1,18],[cx+2,16],[cx+5,11]].forEach(([fx,fh])=>{
        ctx.beginPath();ctx.moveTo(fx-2,gy-28);ctx.lineTo(fx,gy-28-fh);ctx.lineTo(fx+2,gy-28);ctx.closePath();ctx.fill();
    });

    // ─── 首（S字カーブ、長め） ───
    ctx.fillStyle='#cc1806';
    ctx.beginPath();
    ctx.moveTo(cx-2,gy-36);ctx.lineTo(cx+5,gy-36);
    ctx.quadraticCurveTo(cx+14,gy-41,cx+11,gy-49);
    ctx.lineTo(cx+5,gy-49);
    ctx.quadraticCurveTo(cx+8,gy-41,cx-1,gy-37);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='#ee2808';
    ctx.beginPath();
    ctx.moveTo(cx-1,gy-36);ctx.lineTo(cx+4,gy-36);
    ctx.quadraticCurveTo(cx+12,gy-41,cx+9,gy-49);
    ctx.lineTo(cx+6,gy-49);
    ctx.quadraticCurveTo(cx+9,gy-41,cx,gy-37);
    ctx.closePath();ctx.fill();

    // ─── 頭（大型、西洋ドラゴン） ───
    ctx.fillStyle='#880e04';ctx.beginPath();ctx.ellipse(cx+13,gy-54,14,10,0.25,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cc1806';ctx.beginPath();ctx.ellipse(cx+13,gy-55,13,9,0.25,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ee2808';ctx.beginPath();ctx.ellipse(cx+11,gy-56,11,8,0.18,0,Math.PI*2);ctx.fill();
    // 眉稜（brow ridge）
    ctx.fillStyle='#aa1404';
    ctx.beginPath();ctx.moveTo(cx+3,gy-60);ctx.quadraticCurveTo(cx+10,gy-64,cx+16,gy-60);ctx.lineTo(cx+15,gy-58);ctx.quadraticCurveTo(cx+9,gy-62,cx+4,gy-58);ctx.closePath();ctx.fill();
    // 下顎
    ctx.fillStyle='#bb1504';ctx.beginPath();ctx.ellipse(cx+14,gy-49,11,5,0.22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#dd2008';ctx.beginPath();ctx.ellipse(cx+13,gy-50,9,4,0.15,0,Math.PI*2);ctx.fill();
    // スナウト（前に突き出す）
    ctx.fillStyle='#cc1806';
    ctx.beginPath();ctx.moveTo(cx+21,gy-57);ctx.lineTo(cx+30,gy-54);ctx.lineTo(cx+30,gy-48);ctx.lineTo(cx+21,gy-50);ctx.closePath();ctx.fill();
    ctx.fillStyle='#ee2808';
    ctx.beginPath();ctx.moveTo(cx+22,gy-56);ctx.lineTo(cx+29,gy-54);ctx.lineTo(cx+29,gy-50);ctx.lineTo(cx+22,gy-51);ctx.closePath();ctx.fill();
    ctx.fillStyle='#1a0606';ctx.beginPath();ctx.arc(cx+27,gy-53,1.8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#660a04';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx+15,gy-51);ctx.lineTo(cx+29,gy-53);ctx.stroke();
    // 上牙（2本）
    ctx.fillStyle='#f0eedc';
    ctx.beginPath();ctx.moveTo(cx+19,gy-51);ctx.lineTo(cx+18,gy-44);ctx.lineTo(cx+22,gy-51);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+23,gy-51);ctx.lineTo(cx+22,gy-45);ctx.lineTo(cx+26,gy-51);ctx.closePath();ctx.fill();
    // 下牙
    ctx.fillStyle='#e4e0cc';
    ctx.beginPath();ctx.moveTo(cx+20,gy-51);ctx.lineTo(cx+21,gy-56);ctx.lineTo(cx+23,gy-51);ctx.closePath();ctx.fill();

    // ─── 目（黄スリット） ───
    ctx.fillStyle='#0a0202';ctx.beginPath();ctx.ellipse(cx+8,gy-57,6,5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f8e000';ctx.beginPath();ctx.ellipse(cx+8,gy-57,5,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a0202';ctx.beginPath();ctx.ellipse(cx+8,gy-57,1.5,3.8,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(cx+6,gy-59,1.3,0,Math.PI*2);ctx.fill();

    // ─── 角（2本、後方へ） ───
    ctx.fillStyle='#440804';
    ctx.beginPath();ctx.moveTo(cx+8,gy-62);ctx.lineTo(cx+4,gy-76);ctx.lineTo(cx+12,gy-62);ctx.closePath();ctx.fill();
    ctx.fillStyle='#661008';
    ctx.beginPath();ctx.moveTo(cx+8,gy-62);ctx.lineTo(cx+6,gy-73);ctx.lineTo(cx+10,gy-62);ctx.closePath();ctx.fill();
    ctx.fillStyle='#440804';
    ctx.beginPath();ctx.moveTo(cx+5,gy-60);ctx.lineTo(cx-1,gy-72);ctx.lineTo(cx+7,gy-59);ctx.closePath();ctx.fill();

    // ─── 炎ブレス ───
    if(P.atkCd>25){
        const tf=Math.min(1,(P.atkCd-25)/10);
        const fx=cx+31,fy=gy-52;
        for(let i=6;i>=1;i--){
            ctx.globalAlpha=(0.1+i*0.15)*tf;
            ctx.fillStyle=['#ffffff','#ffff88','#ffee00','#ffaa00','#ff5500','#cc1100'][6-i];
            ctx.beginPath();ctx.ellipse(fx+i*5,fy,i*5,i*3,0,0,Math.PI*2);ctx.fill();
        }
        ctx.globalAlpha=tf*0.9;ctx.fillStyle='#ffffff';
        ctx.beginPath();ctx.ellipse(fx+5,fy,7,5,0,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
    }
    ctx.restore();
}

function drawGoblinPC(bx,by){
    if(P.inv>0&&Math.floor(P.inv/4)%2===0)return;
    const cx=bx+7,gy=by+22,ph=Math.floor(P.fr/5)%2;
    ctx.save();if(P.dir<0){ctx.translate(cx*2,0);ctx.scale(-1,1);}
    // 靴
    ctx.fillStyle='#080810';ctx.fillRect(cx-7,gy-4,6,4);ctx.fillRect(cx+1,gy-4,6,4);
    // 足（速い！）
    ctx.fillStyle='#1a1a2a';ctx.fillRect(cx-6,gy-(ph?10:8),4,ph?10:8);ctx.fillRect(cx+2,gy-(ph?8:10),4,ph?8:10);
    // 胴体（小さい）
    ctx.fillStyle='#101018';ctx.fillRect(cx-6,by+11,12,12);// 輪郭
    ctx.fillStyle='#1c1c2c';ctx.fillRect(cx-5,by+12,10,10);
    // ベルト
    ctx.fillStyle='#402808';ctx.fillRect(cx-5,by+19,10,2);ctx.fillStyle='#c0a030';ctx.fillRect(cx-1,by+19,2,2);
    // ダガー（腰）
    ctx.fillStyle='#808090';ctx.fillRect(cx-3,by+15,2,7);ctx.fillRect(cx+1,by+15,2,7);
    ctx.fillStyle='#402808';ctx.fillRect(cx-3,by+20,2,3);ctx.fillRect(cx+1,by+20,2,3);
    // 右手ダガー（攻撃）
    const sw=P.atk>0,kx=cx+7,ky=by+13;
    ctx.fillStyle='#111122';ctx.fillRect(kx,ky-1,3,sw?11:6);
    ctx.fillStyle='#b0c0c8';ctx.fillRect(kx,ky,2,sw?10:5);
    ctx.fillStyle='#d8e8f0';ctx.fillRect(kx,ky,1,sw?8:4);
    ctx.fillStyle='#808090';ctx.fillRect(kx-1,ky+(sw?8:3),4,2);
    ctx.fillStyle='#402808';ctx.fillRect(kx,ky+(sw?10:5),2,3);
    if(sw){ctx.globalAlpha=0.35;ctx.fillStyle='#c0e0ff';ctx.fillRect(kx-3,ky-3,8,15);ctx.globalAlpha=1;}
    // 大きな緑の頭（アウトライン）
    ctx.fillStyle='#0a2006';ctx.beginPath();ctx.arc(cx,by+4,11,0,Math.PI*2);ctx.fill();
    // 頭本体
    ctx.fillStyle='#28a018';ctx.beginPath();ctx.arc(cx,by+4,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#38c025';ctx.beginPath();ctx.arc(cx,by+3,8,0,Math.PI*2);ctx.fill();
    // 大耳（両側にでかく）
    ctx.fillStyle='#0a2006';ctx.beginPath();ctx.arc(cx-12,by+4,6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+12,by+4,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#28a018';ctx.beginPath();ctx.arc(cx-12,by+4,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+12,by+4,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cc6644';ctx.beginPath();ctx.arc(cx-12,by+4,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+12,by+4,2.5,0,Math.PI*2);ctx.fill();
    // 目（でかい黄色）
    ctx.fillStyle='#111111';ctx.beginPath();ctx.arc(cx-3,by+3,3.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+3,by+3,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f0d000';ctx.beginPath();ctx.arc(cx-3,by+3,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+3,by+3,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111111';ctx.beginPath();ctx.arc(cx-2.5,by+3,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+3.5,by+3,1.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(cx-3,by+2,0.8,0,Math.PI*2);ctx.fill();
    // 意地悪な眉
    ctx.strokeStyle='#0a2006';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx-7,by-1);ctx.lineTo(cx-1,by+1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+7,by-1);ctx.lineTo(cx+1,by+1);ctx.stroke();
    // ニヤリ口
    ctx.fillStyle='#0a1808';ctx.fillRect(cx-5,by+8,10,4);
    ctx.fillStyle='#222222';ctx.beginPath();ctx.arc(cx,by+8,5,0,Math.PI);ctx.fill();
    ctx.fillStyle='#f0f0f0';ctx.fillRect(cx-3,by+7,2,3);ctx.fillRect(cx+1,by+7,2,3);
    // 鼻（球）
    ctx.fillStyle='#1a7010';ctx.beginPath();ctx.arc(cx,by+6,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111111';ctx.fillRect(cx-1,by+5,1,1);ctx.fillRect(cx+0,by+5,1,1);
    ctx.restore();
}

function drawGolem(bx,by){

    ctx.fillStyle='#6600cc';
    [[cx-24,y+46],[cx-28,y+44],[cx-20,y+50]].forEach(([cx2,cy2])=>{

    ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(cx-24,y-24,48,6);
